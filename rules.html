<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>愛發筆 — 取碼原則</title>
<style>
  :root {
    --bg:#faf9f7; --card:#fff; --ink:#1c1a17; --muted:#7c7568; --line:#e3ded4;
    --accent:#b4531f; --warn:#d98324; --ok:#2e7d4f;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#16150f; --card:#1f1e18; --ink:#ece7dc; --muted:#9a9284; --line:#33312a;
            --accent:#e0894f; --warn:#e0a95c; --ok:#6bbd8e; }
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
    font:15px/1.6 -apple-system,"PingFang TC","Helvetica Neue",sans-serif; }
  header { position:sticky; top:0; background:var(--bg); border-bottom:1px solid var(--line);
    padding:12px 20px; display:flex; gap:12px; align-items:center; z-index:5; }
  h1 { font-size:16px; margin:0; font-weight:650; }
  nav { display:flex; gap:5px; }
  nav a { font-size:13px; color:var(--muted); text-decoration:none; padding:4px 9px;
    border:1px solid var(--line); border-radius:7px; }
  nav a.on { color:#fff; background:var(--accent); border-color:var(--accent); }
  .grow { flex:1; }
  button { font:inherit; font-size:13px; padding:6px 12px; border-radius:7px;
    border:1px solid var(--line); background:var(--card); color:var(--ink); cursor:pointer; }
  button:hover { border-color:var(--accent); color:var(--accent); }
  button.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
  #status { font-size:13px; color:var(--muted); min-width:70px; }
  #status.dirty { color:var(--warn); } #status.saved { color:var(--ok); }

  main { max-width:820px; margin:0 auto; padding:20px; }
  .intro { color:var(--muted); font-size:13px; margin-bottom:14px; }
  .rule { background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:12px 14px; margin-bottom:10px; }
  .rule.off { opacity:.5; }
  .rh { display:flex; align-items:center; gap:9px; }
  .name { font-weight:650; font-size:15px; border:none; background:transparent; color:var(--ink);
    font-family:inherit; flex:1; padding:2px 4px; border-radius:5px; }
  .name:focus { outline:1px solid var(--line); background:var(--bg); }
  .tag { font-size:10px; padding:1px 6px; border-radius:20px; border:1px solid var(--line);
    color:var(--muted); white-space:nowrap; }
  .tag.enforced { color:var(--ok); border-color:var(--ok); }
  .tag.manual { color:var(--muted); }
  .desc, .note { width:100%; border:1px solid transparent; background:transparent; color:var(--ink);
    font:inherit; font-size:14px; padding:3px 5px; border-radius:6px; resize:vertical; }
  .note { font-size:12px; color:var(--muted); }
  .desc:hover, .note:hover { border-color:var(--line); }
  .desc:focus, .note:focus { outline:none; border-color:var(--accent); background:var(--bg); }
  .params { display:flex; gap:12px; flex-wrap:wrap; margin-top:6px; font-size:12px;
    color:var(--muted); align-items:center; }
  .params label { display:flex; gap:5px; align-items:center; }

  /* 約定分類：這條原則本來就不是一句話，是一張表 */
  .groups { margin-top:10px; border-top:1px dashed var(--line); padding-top:10px; }
  .grp { border:1px solid var(--line); border-radius:10px; padding:8px 10px; margin-bottom:8px;
    background:var(--bg); }
  .grh { display:flex; gap:8px; align-items:center; margin-bottom:6px; }
  .gname { font-weight:650; font-size:14px; width:150px; flex:none;
    border:1px solid transparent; background:transparent; color:var(--ink); padding:3px 5px;
    border-radius:6px; }
  .gnote { flex:1; font-size:12px; color:var(--muted);
    border:1px solid transparent; background:transparent; padding:3px 5px; border-radius:6px; }
  .gname:hover, .gnote:hover { border-color:var(--line); }
  .gname:focus, .gnote:focus { outline:none; border-color:var(--accent); background:var(--card); }
  .gadd input { width:100%; font-size:12px; padding:4px 7px; border-radius:7px;
    border:1px dashed var(--line); background:transparent; color:var(--ink); margin-bottom:6px; }
  .gtbl { width:100%; border-collapse:collapse; font-size:12px; }
  .gtbl th { text-align:left; font-size:10px; color:var(--muted); font-weight:600;
    padding:2px 6px; border-bottom:1px solid var(--line); }
  .gtbl td { padding:2px 6px; border-bottom:1px solid var(--line); }
  .gtbl td.gc { font:20px/1.3 "PingFang TC",serif; width:34px; }
  .gcode { width:78px; font:700 13px ui-monospace,monospace; color:var(--accent);
    text-transform:uppercase; padding:2px 5px; border-radius:6px;
    border:1px solid var(--line); background:var(--card); }
  .gnow .ok { color:var(--ok); font:600 12px ui-monospace,monospace; }
  .gnow .bad { color:var(--bad); font:600 12px ui-monospace,monospace; }
  .gnow .now { font:600 12px ui-monospace,monospace; color:var(--muted); }
  .gnow .muted { color:var(--muted); font-style:italic; }
  .tiny { font-size:10px; padding:1px 5px; margin-left:5px; border-radius:5px;
    border:1px solid var(--line); background:var(--card); color:var(--muted);
    cursor:pointer; text-decoration:none; }
  .tiny:hover { border-color:var(--accent); color:var(--accent); }
  .tiny.hot { color:var(--accent); border-color:var(--accent); font-weight:600; }
  .tiny.hot:hover { background:var(--accent); color:#fff; }
  /* 拖曳排序 */
  .gtbl tbody tr.dragging { opacity:.4; }
  .gtbl tbody tr.over td { border-top:2px solid var(--accent); }
  .gtbl td.gc { cursor:grab; }
  /* 偏旁碼：空著就是「跟單獨成字時一樣」，所以低調一點，填了才顯眼 */
  .gcomp { color:var(--warn); border-style:dashed; }
  .gcomp:not(:placeholder-shown) { border-style:solid; border-color:var(--warn); }
  .gnew { font-size:12px; padding:3px 9px; border-radius:7px; }
  .params input[type=number] { width:64px; padding:3px 5px; border:1px solid var(--line);
    border-radius:6px; background:var(--bg); color:var(--ink); font:inherit; font-size:12px; }
  .mv { cursor:pointer; color:var(--muted); font-size:12px; padding:0 3px; }
  .mv:hover { color:var(--accent); }
  .add { width:100%; padding:10px; border:1px dashed var(--line); border-radius:12px;
    color:var(--muted); background:transparent; }
</style>
</head>
<body>
<header>
  <h1>愛發筆</h1>
  <nav>
    <a href="/">字根表</a><a href="/annotate">逐字取碼</a><a href="/stats">碼表分析</a><a href="/rules" class="on">取碼原則</a><a href="/type">試打</a>
  </nav>
  <div class="grow"></div>
  <span id="status">已載入</span>
  <button class="primary" id="save">儲存</button>
</header>

<main>
  <div class="intro">
    標「<span class="tag enforced">會執行</span>」的原則會實際影響「逐字取碼」頁的自動預測；
    標「<span class="tag manual">僅記錄</span>」的是你自己取碼時遵守的準則，程式暫時不會執行。
    <b>注意：程式讀的是下面的「參數」，不是文字說明。</b>
    改了說明文字而沒有對應的參數，預測不會跟著變 —— 那種情況要我改程式。
    改動即時生效（另一頁會自動同步）。
  </div>
  <div id="list"></div>
  <button class="add" id="add">＋ 新增一條原則</button>
</main>

<script src="/assets/shape.js"></script>
<script src="/assets/zigen.js"></script>
<script>
const $ = s => document.querySelector(s);
const el = (t, c, x) => { const e = document.createElement(t);
  if (c) e.className = c; if (x != null) e.textContent = x; return e; };
let data = null, dirty = false, stamp = null;
const touch = () => { dirty = true; $('#status').textContent = '未儲存'; $('#status').className = 'dirty'; };

const PARAMS = {
  merge_over_split: [['seg_penalty', '每多一個字根的成本（越大越傾向合併）', 0.01, 0, 1]],
  skip_isolated_hv: [
    ['penalty', '略過一筆的成本（越小越容易略過）', 0.05, 0, 2],
    ['last_stroke_letters.橫', '孤立的末筆「橫」改取', 'text'],
    ['last_stroke_letters.豎', '孤立的末筆「豎」改取', 'text'],
  ],
  max_code_length: [
    ['max', '最終碼長上限', 1, 1, 8],
    ['head', '超過時保留前幾碼', 1, 1, 8],
    ['tail', '再加最後幾碼', 1, 0, 4],
  ],
  tier_priority: [['penalty', '降一個等級的成本（越大越堅持用優等）', 0.01, 0, 1]],
};

function render() {
  const list = $('#list'); list.innerHTML = '';
  data.rules.forEach((r, i) => {
    const d = el('div', 'rule' + (r.enabled ? '' : ' off'));

    const h = el('div', 'rh');
    const on = el('input'); on.type = 'checkbox'; on.checked = !!r.enabled;
    on.onchange = () => { r.enabled = on.checked; touch(); render(); };
    h.append(on);

    const nm = el('input', 'name'); nm.value = r.name;
    nm.oninput = () => { r.name = nm.value; touch(); };
    h.append(nm);

    const tag = el('span', 'tag ' + (r.kind || 'manual'),
      r.kind === 'enforced' ? '會執行' : '僅記錄');
    tag.title = '點擊切換：會執行的原則需要程式支援，改成「會執行」不會自動實作邏輯';
    tag.onclick = () => { r.kind = r.kind === 'enforced' ? 'manual' : 'enforced'; touch(); render(); };
    h.append(tag);

    const up = el('span', 'mv', '↑');
    up.onclick = () => { if (i > 0) { [data.rules[i-1], data.rules[i]] = [data.rules[i], data.rules[i-1]]; touch(); render(); } };
    const x = el('span', 'mv', '✕');
    x.onclick = () => { if (confirm(`刪除「${r.name}」？`)) { data.rules.splice(i, 1); touch(); render(); } };
    h.append(up, x);
    d.append(h);

    const desc = el('textarea', 'desc'); desc.value = r.desc || '';
    desc.rows = 2; desc.placeholder = '原則內容…';
    desc.oninput = () => { r.desc = desc.value; touch(); };
    d.append(desc);

    const ps = PARAMS[r.id];
    if (ps && r.params) {
      const box = el('div', 'params');
      const getP = (o, k) => k.split('.').reduce((x, p) => (x || {})[p], o);
      const setP = (o, k, v) => {
        const ps2 = k.split('.');
        let x = o;
        for (const p of ps2.slice(0, -1)) x = (x[p] ||= {});
        x[ps2[ps2.length - 1]] = v;
      };
      for (const [key, label, step, min, max] of ps) {
        const l = el('label');
        l.append(el('span', '', label));
        const inp = el('input');
        if (step === 'text') {
          inp.type = 'text'; inp.maxLength = 1; inp.style.width = '40px';
          inp.style.textTransform = 'uppercase';
          inp.value = getP(r.params, key) ?? '';
          inp.oninput = () => { setP(r.params, key, inp.value.toUpperCase()); touch(); };
        } else {
          inp.type = 'number';
          inp.value = r.params[key]; inp.step = step; inp.min = min; inp.max = max;
          inp.oninput = () => { r.params[key] = +inp.value; touch(); };
        }
        l.append(inp);
        box.append(l);
      }
      d.append(box);
    }

    const note = el('textarea', 'note'); note.value = r.note || '';
    note.rows = 1; note.placeholder = '備註（程式如何處理這條原則…）';
    note.oninput = () => { r.note = note.value; touch(); };
    d.append(note);

    /* 約定原則不是一句話能講完的，它是一張表：哪一類字、約定怎麼取。
       所以這條原則底下直接編分類（數字類、木字類、大字類…）。 */
    if (r.id === 'convention' || r.groups) renderGroups(d, r);

    list.append(d);
  });
  syncStatus();          /* 列都進 document 了，這時才算得出「碼表現況」 */
}

/* ---------- 約定分類 ---------- */
function renderGroups(box, r) {
  r.groups = r.groups || [];
  const wrap = el('div', 'groups');

  for (const [gi, g] of r.groups.entries()) {
    const gd = el('div', 'grp');

    const gh = el('div', 'grh');
    const nm = el('input', 'gname'); nm.value = g.name || '';
    nm.placeholder = '分類名（例：木字類）';
    nm.oninput = () => { g.name = nm.value; touch(); };
    const nt = el('input', 'gnote'); nt.value = g.note || '';
    nt.placeholder = '這一類的約定怎麼取（例：逐筆取碼，不套用能合不分）';
    nt.oninput = () => { g.note = nt.value; touch(); };
    const del = el('span', 'mv', '✕');
    del.title = '刪掉這一類';
    del.onclick = () => { if (confirm(`刪除「${g.name || '未命名'}」？`)) {
      r.groups.splice(gi, 1); touch(); render(); } };
    gh.append(nm, nt, del);
    gd.append(gh);

    /* 一次貼一串字進來，比一個一個加快得多 */
    const add = el('div', 'gadd');
    const inp = el('input');
    inp.placeholder = '貼一串字（木本末未才牙）→ Enter';
    inp.onkeydown = e => {
      if (e.key !== 'Enter') return;
      const chars = [...inp.value].filter(c => /[㐀-鿿]/.test(c));
      g.chars = g.chars || [];
      for (const c of chars)
        if (!g.chars.some(x => x.c === c)) g.chars.push({ c, code: '' });
      inp.value = ''; touch(); render();
    };
    add.append(inp);
    gd.append(add);

    const tbl = el('table', 'gtbl');
    tbl.innerHTML = '<thead><tr><th>字</th><th>單獨成字的碼</th><th>碼表現況</th>' +
      '<th>作為偏旁時的碼</th><th></th></tr></thead>';
    const tb = el('tbody');
    for (const [ci, row] of (g.chars || []).entries()) {
      const tr = el('tr');
      /* 拖曳排序（也可以拖到別的分類去） */
      tr.draggable = true;
      tr.dataset.gi = gi; tr.dataset.ci = ci;
      tr.ondragstart = e => {
        e.dataTransfer.setData('text/plain', JSON.stringify({ gi, ci }));
        e.dataTransfer.effectAllowed = 'move';
        tr.classList.add('dragging');
      };
      tr.ondragend = () => tr.classList.remove('dragging');
      tr.ondragover = e => { e.preventDefault(); tr.classList.add('over'); };
      tr.ondragleave = () => tr.classList.remove('over');
      tr.ondrop = e => {
        e.preventDefault();
        tr.classList.remove('over');
        const from = JSON.parse(e.dataTransfer.getData('text/plain') || '{}');
        if (from.gi == null) return;
        const src = r.groups[from.gi].chars;
        const [moved] = src.splice(from.ci, 1);
        if (!moved) return;
        const dst = r.groups[gi].chars;
        /* 同一組往後移時，前面少了一個，插入位置要往前一格 */
        const at = (from.gi === gi && from.ci < ci) ? ci - 1 : ci;
        dst.splice(at, 0, moved);
        touch(); render();
      };
      /* 字 */
      const t1 = el('td'); t1.className = 'gc'; t1.textContent = row.c;
      t1.title = '拖我可以換順序（也可以拖到別的分類）';
      tr.append(t1);
      /* 約定碼 */
      const t2 = el('td');
      const ci2 = el('input', 'gcode'); ci2.value = row.code || '';
      ci2.placeholder = '—';
      ci2.oninput = () => { row.code = ci2.value.toUpperCase().replace(/[^A-Z]/g, '');
                            ci2.value = row.code; touch(); syncStatus(); };
      t2.append(ci2); tr.append(t2);
      /* 碼表現況：這個字現在實際取的碼 */
      const t3 = el('td'); t3.className = 'gnow'; tr.append(t3);
      /* 作為偏旁時的碼：例 二 單獨成字取 II，但當偏旁時兩橫只算一個 I。
         空著＝跟單獨成字時一樣（大多數字都是這樣，不必每個都填）。 */
      const t4 = el('td');
      const cc = el('input', 'gcode gcomp'); cc.value = row.compCode || '';
      cc.placeholder = '同左';
      cc.title = '這個字當作別的字的偏旁時，取的碼（空著＝跟單獨成字時一樣）';
      cc.oninput = () => {
        row.compCode = cc.value.toUpperCase().replace(/[^A-Z]/g, '') || undefined;
        cc.value = row.compCode || '';
        /* 填了不一樣的碼，就是「單獨成字時另有約定」—— 這個旗標讓取碼頁知道
           別拿它去當偏旁範本（跟該字的 notComponent 是同一件事） */
        row.standaloneOnly = (row.compCode && row.compCode !== row.code) || undefined;
        touch();
      };
      t4.append(cc); tr.append(t4);
      /* 刪掉這一列 */
      const t5 = el('td');
      const x = el('span', 'mv', '✕');
      x.onclick = () => { g.chars.splice(ci, 1); touch(); render(); };
      t5.append(x); tr.append(t5);
      tb.append(tr);
    }
    tbl.append(tb);
    gd.append(tbl);
    wrap.append(gd);
  }

  const nb = el('button', 'gnew', '＋ 新增一類');
  nb.onclick = () => { r.groups.push({ name: '', note: '', chars: [] }); touch(); render(); };
  wrap.append(nb);
  box.append(wrap);
  /* 這裡不能直接 syncStatus()：這幾列還沒接進 document，
     querySelectorAll 找不到它們，狀態欄會一片空白。等 render() 收尾時再算。 */
}

/* 「碼表現況」：約定碼跟這個字實際取的碼對不對得上。
   對不上不代表誰錯 —— 但你總得看得見，而且要能一鍵把約定寫進碼表，
   不然這張表寫了跟沒寫一樣。 */
function syncStatus() {
  for (const tr of document.querySelectorAll('.gtbl tbody tr')) {
    const ch = tr.querySelector('.gc').textContent;
    const want = (tr.querySelector('.gcode:not(.gcomp)').value || '').toUpperCase();
    const now = codes[ch] && codes[ch].code ? finalOf(codes[ch].code) : '';
    const cell = tr.querySelector('.gnow');
    cell.innerHTML = '';
    if (!now && !want) {
      cell.append(el('span', 'muted', '還沒取碼'));
    } else if (!now && want) {
      cell.append(el('span', 'muted', '碼表還沒有'));
      const add = el('button', 'tiny hot', '寫進碼表');
      add.onclick = () => writeCode(ch, want);
      cell.append(add);
    } else if (!want) {
      cell.append(el('span', 'now', now));
      const use = el('button', 'tiny', '填入');
      use.title = '把碼表現況填進約定碼';
      use.onclick = () => { const i = tr.querySelector('.gcode:not(.gcomp)');
        i.value = now; i.dispatchEvent(new Event('input')); };
      cell.append(use);
    } else if (want === now) {
      cell.append(el('span', 'ok', `${now} ✓`));
    } else {
      cell.append(el('span', 'bad', `${now} ≠ 約定`));
      const fix = el('button', 'tiny hot', '以約定為準');
      fix.title = `把碼表裡的 ${now} 改成約定的 ${want}`;
      fix.onclick = () => writeCode(ch, want);
      cell.append(fix);
      const a = el('a', 'tiny', '去取碼頁');
      a.href = '/annotate?c=' + encodeURIComponent(ch);
      a.target = '_blank';
      cell.append(a);
    }
  }
}

/* ---------- 把約定碼寫進碼表 ----------
   碼表存的不只是字母，還有「哪幾筆是哪一碼」。所以不能只塞一串字母進去 ——
   要找出一組「拆出來剛好等於這個碼」的筆畫分組。
   作法：用字根表把這個字的所有可能拆法跑一遍，挑出碼相符的那一個。
   找不到就代表現有字根拼不出這個碼 —— 那是真的要去取碼頁手動拆。 */
let lib = null, zigen = null;
async function ensureLib() {
  if (lib) return lib;
  zigen = await fetch('/api/zigen').then(r => r.json());
  lib = await Zigen.buildLibrary(zigen);
  return lib;
}
function ruleOf(id) {
  return data.rules.find(r => r.id === id && r.enabled && r.kind === 'enforced');
}

async function writeCode(ch, want) {
  const now = codes[ch] && codes[ch].code ? finalOf(codes[ch].code) : '';
  if (!confirm(now
      ? `把「${ch}」的碼從 ${now} 改成約定的 ${want}？\n\n（會直接寫進碼表）`
      : `把「${ch}」以 ${want} 寫進碼表？\n\n（會用字根表找出對應的筆畫分組）`)) return;

  $('#status').textContent = `${ch}：找拆法…`;
  await ensureLib();
  const g = await Zigen.getGlyph(ch);
  if (!g) { $('#status').textContent = `${ch}：沒有筆畫資料`; return; }

  const merge = ruleOf('merge_over_split'), sk = ruleOf('skip_isolated_hv'),
        tp = ruleOf('tier_priority');
  const out = Zigen.predict(g.medians, lib, {
    thr: zigen.meta.merge_threshold || Zigen.SAME_SHAPE,
    segPenalty: merge ? merge.params.seg_penalty : 0.05,
    skip: sk ? { penalty: sk.params.penalty, allow: sk.params.allow,
                 lastLetters: sk.params.last_stroke_letters } : null,
    tierPenalty: tp ? (tp.params?.penalty ?? 0.05) : 0,
    maxNodes: 200000,
  });
  /* 完整覆蓋、而且碼（縮短後）剛好等於約定的那一個 */
  const hit = out.find(r => r.covered === r.total &&
    finalOf(r.segments.map(s => s.letter).join('')) === want);

  const rec = { ...(codes[ch] || {}) };
  if (hit) {
    const full = hit.segments.map(s => s.letter).join('');
    rec.segments = hit.segments.map(s => ({ strokes: [...s.strokes], letter: s.letter }));
    rec.skipped = (hit.skipped && hit.skipped.length) ? [...hit.skipped] : undefined;
    rec.code = full;
    rec.final = finalOf(full);
  } else {
    if (!confirm(`現有字根拼不出「${ch}」= ${want}。\n\n` +
        '要先只把碼寫進去嗎？（沒有筆畫分組，之後請到取碼頁手動拆）')) {
      $('#status').textContent = '沒有寫入'; return;
    }
    rec.code = want; rec.final = want;
    delete rec.segments; delete rec.skipped;
  }
  codes[ch] = rec;

  const st = await fetch('/api/state').then(r => r.json());
  const res = await fetch('/api/codes', { method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'X-Base-Stamp': st.codes },
    body: JSON.stringify(codes) });
  if (!res.ok) {
    codes = await fetch('/api/codes').then(r => r.json());
    $('#status').textContent = '碼表被別的分頁改過了，已重新載入 —— 請再試一次';
    render(); return;
  }
  $('#status').textContent = hit
    ? `${ch} = ${want} 已寫進碼表 ✓`
    : `${ch} = ${want} 已寫進碼表（還缺筆畫分組）`;
  $('#status').className = 'saved';
  render();
}

$('#add').onclick = () => {
  data.rules.push({ id: 'custom_' + Date.now(), name: '新原則', desc: '',
                    kind: 'manual', enabled: true });
  touch(); render();
};
async function save() {
  $('#status').textContent = '儲存中…';
  const r = await fetch('/api/rules', { method: 'PUT',
    headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data, null, 2) });
  if (r.ok) { dirty = false; $('#status').textContent = '已儲存 ✓'; $('#status').className = 'saved';
              stamp = await fetch('/api/state').then(r => r.json()).then(s => s.rules); }
  else $('#status').textContent = '儲存失敗';
}
$('#save').onclick = save;
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 's') { e.preventDefault(); save(); }
});
setInterval(() => { if (dirty) save(); }, 15000);
window.onbeforeunload = e => { if (dirty) return e.returnValue = '有未儲存的修改'; };
/* 約定分類要對照碼表現況，所以這一頁也要讀碼表（唯讀，不寫） */
let codes = {};
const finalOf = code => Zigen.shorten(code, data && data.rules &&
  data.rules.find(r => r.id === 'max_code_length' && r.enabled && r.kind === 'enforced'));

Promise.all([fetch('/api/rules').then(r => r.json()),
             fetch('/api/state').then(r => r.json()),
             fetch('/api/codes').then(r => r.json()).catch(() => ({}))]).then(([d, s, c]) => {
  data = d; stamp = s.rules; codes = c; render();
});
</script>
</body>
</html>
