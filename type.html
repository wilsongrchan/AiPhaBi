<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>愛發筆 — 試打</title>
<style>
  :root {
    --bg:#faf9f7; --card:#fff; --ink:#1c1a17; --muted:#7c7568; --line:#e3ded4;
    --accent:#b4531f; --ok:#2e7d4f; --bad:#c0392b; --bar:#efece6;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#16150f; --card:#1f1e18; --ink:#ece7dc; --muted:#9a9284; --line:#33312a;
            --accent:#e0894f; --ok:#6bbd8e; --bad:#e57373; --bar:#2b2922; }
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
    font:15px/1.6 -apple-system,"PingFang TC","Helvetica Neue",sans-serif; }
  header { position:sticky; top:0; z-index:5; background:var(--bg);
    border-bottom:1px solid var(--line); padding:12px 20px; display:flex; gap:12px;
    align-items:center; }
  h1 { font-size:16px; margin:0; font-weight:650; }
  nav { display:flex; gap:5px; }
  nav a { font-size:13px; color:var(--muted); text-decoration:none; padding:4px 9px;
    border:1px solid var(--line); border-radius:7px; }
  nav a.on { color:#fff; background:var(--accent); border-color:var(--accent); }
  .grow { flex:1; }
  main { max-width:880px; margin:0 auto; padding:20px; }
  .sub { font-size:13px; color:var(--muted); margin-bottom:14px; }

  /* 打字區：真的像個輸入法 —— 打字、看候選、選字、上屏 */
  .paper { min-height:180px; background:var(--card); border:1px solid var(--line);
    border-radius:12px; padding:16px 18px; font-size:22px; line-height:1.8;
    font-family:"PingFang TC",serif; white-space:pre-wrap; word-break:break-all;
    outline:none; cursor:text; }
  .paper:focus { border-color:var(--accent); }
  .paper .caret { display:inline-block; width:2px; height:24px; background:var(--accent);
    vertical-align:-4px; animation:blink 1s steps(1) infinite; }
  @keyframes blink { 50% { opacity:0; } }
  .paper:not(:focus) .caret { animation:none; opacity:.3; }

  /* 候選列 */
  .ime { position:sticky; bottom:0; margin-top:12px; min-height:52px; }
  .imebox { display:none; align-items:center; gap:10px; flex-wrap:wrap;
    background:var(--card); border:1px solid var(--accent); border-radius:12px;
    padding:8px 12px; box-shadow:0 6px 20px rgba(0,0,0,.10); }
  .imebox.on { display:flex; }
  .imecode { font:700 17px ui-monospace,monospace; color:var(--accent); letter-spacing:.12em; }
  .cands { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
  .cand { display:flex; align-items:baseline; gap:3px; border:1px solid transparent;
    border-radius:8px; padding:2px 7px; cursor:pointer; }
  .cand:hover { background:var(--bar); }
  .cand.on { border-color:var(--accent); background:var(--bar); }
  .cand i { font:600 11px ui-monospace,monospace; color:var(--muted); font-style:normal; }
  .cand b { font:24px/1.2 "PingFang TC",serif; font-weight:400; }
  .cand em { font:600 10px ui-monospace,monospace; color:var(--muted); font-style:normal; }
  .imehint { font-size:11px; color:var(--muted); margin-left:auto; white-space:nowrap; }
  .none { font-size:13px; color:var(--bad); }

  /* 「連未取碼的字也算」：現場用字根表推它的碼，打得出來就表示這套規則自己接得住 */
  .toolbar { display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:8px; }
  .tog { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--muted);
    cursor:pointer; }
  .tog b { color:var(--ink); }
  .prog { font-size:12px; color:var(--muted); font-family:ui-monospace,monospace; }
  .cand.pred b { color:var(--muted); }
  .cand.pred { border-style:dashed; border-color:var(--line); }
  .cand.pred em { color:var(--warn,#d98324); }
  .predlink { font-size:11px; color:var(--accent); text-decoration:none; margin-left:6px; }

  button { font:inherit; font-size:13px; padding:6px 12px; border-radius:7px;
    border:1px solid var(--line); background:var(--card); color:var(--ink); cursor:pointer; }
  button:hover { border-color:var(--accent); color:var(--accent); }

  /* 貼連結擷取來的練習文字：跟打字用的紙面分開，唯讀，只是拿來唸 */
  .sample { background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:10px 14px; margin-bottom:12px; max-height:220px; overflow:auto; }
  .sample-head { display:flex; align-items:center; justify-content:space-between;
    font-size:12px; color:var(--muted); margin-bottom:6px; }
  .sample-head button { font-size:11px; padding:2px 8px; }
  .sample-text { font-size:16px; line-height:1.9; font-family:"PingFang TC",serif;
    white-space:pre-wrap; word-break:break-all; }

  .stat { display:flex; gap:16px; flex-wrap:wrap; font-size:12px; color:var(--muted);
    margin-top:14px; }
  .stat b { color:var(--ink); font-family:ui-monospace,monospace; }
  kbd { border:1px solid var(--line); border-bottom-width:2px; border-radius:4px;
    padding:0 4px; font:600 11px ui-monospace,monospace; }
</style>
</head>
<body>
<header>
  <h1>愛發筆</h1>
  <nav>
    <a href="/">字根表</a><a href="/annotate">逐字取碼</a><a href="/stats">碼表分析</a>
    <a href="/rules">取碼原則</a><a href="/type" class="on">試打</a>
  </nav>
  <div class="grow"></div>
  <span class="sub" id="meta" style="margin:0"></span>
</header>

<main>
  <div class="sub">
    真的用愛發筆打字看看。點下面的紙面，直接按 <kbd>A</kbd>–<kbd>Z</kbd> 打碼；
    <kbd>space</kbd> 上第一個字、<kbd>1</kbd>–<kbd>9</kbd> 選字、
    <kbd>⌫</kbd> 刪碼、<kbd>esc</kbd> 清掉這一串碼。
    標點直接按（<kbd>,</kbd>→，　<kbd>.</kbd>→。　<kbd>?</kbd>→？　<kbd>[</kbd><kbd>]</kbd>→「」　<kbd>"</kbd>→「」輪流）。
    沒有正在打碼時，數字鍵就是打數字。
    打不出來的字表示還沒取碼。
  </div>

  <div class="toolbar">
    <label class="tog">
      <input type="checkbox" id="usePred">
      <span>把<b>還沒取碼</b>的字也算進來（用字根表現場推它的碼）</span>
    </label>
    <span class="prog" id="predprog"></span>
  </div>

  <div class="toolbar">
    <input type="url" id="srcUrl" placeholder="貼一個文章連結…" style="flex:1;min-width:220px;
      padding:6px 10px;border:1px solid var(--line);border-radius:7px;
      background:var(--card);color:var(--ink);font-size:13px">
    <button id="fetchUrl">擷取文字</button>
    <span class="prog" id="fetchStatus"></span>
  </div>

  <div class="sample" id="sampleBox" style="display:none">
    <div class="sample-head">
      <span>練習文字 —— 唸這段，自己打（不會自動貼進紙面）</span>
      <button id="sampleClose">收起</button>
    </div>
    <div class="sample-text" id="sampleText"></div>
  </div>

  <div class="paper" id="paper" tabindex="0"></div>

  <div class="ime">
    <div class="imebox" id="imebox">
      <span class="imecode" id="imecode"></span>
      <div class="cands" id="cands"></div>
      <span class="imehint" id="imehint"></span>
    </div>
  </div>

  <div class="stat" id="stat"></div>
</main>

<script src="/assets/shape.js"></script>
<script src="/assets/zigen.js"></script>
<script>
const $ = s => document.querySelector(s);
const el = (t, c, x) => { const e = document.createElement(t);
  if (c) e.className = c; if (x != null) e.textContent = x; return e; };

let codes = {}, rules = null, rank = new Map();
let table = new Map();     /* 碼 → [{ch, kind}]，依字頻排序 */
let text = '', code = '', pick = 0, pos = 0;   /* pos：游標在 text 裡的字元位置 */

/* ---------- 存檔：換頁／切分頁再回來，紙面跟練習文字都還在 ----------
   這頁本來就沒有存檔按鈕、也不進碼表，純粹是「打字練習」的暫存狀態，
   放 localStorage 就夠，不必驚動伺服器。 */
const STATE_KEY = 'aiphabi_type_state';
function saveState() {
  try {
    localStorage.setItem(STATE_KEY, JSON.stringify({
      text, pos,
      srcUrl: $('#srcUrl').value,
      sampleText: $('#sampleText').textContent,
      sampleOn: $('#sampleBox').style.display !== 'none',
    }));
  } catch {}
}
function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(STATE_KEY) || 'null');
    if (!s) return;
    text = s.text || ''; pos = Math.max(0, Math.min(s.pos ?? text.length, text.length));
    if (s.srcUrl) $('#srcUrl').value = s.srcUrl;
    if (s.sampleText) { $('#sampleText').textContent = s.sampleText; }
    if (s.sampleOn) $('#sampleBox').style.display = 'block';
  } catch {}
}

const maxRule = () => rules && rules.rules.find(r =>
  r.id === 'max_code_length' && r.enabled && r.kind === 'enforced');
const finalOf = c => Zigen.shorten(c, maxRule());

/* 一個字打得出來的所有碼：主碼（縮短後）＋完整碼＋手動收的兼容碼。
   跟取碼頁、匯出、Rime 碼表完全一致 —— 這裡是同一份規則的第四個消費者，
   所以規則寫在資料裡，不寫在任何一頁。 */
function buildTable() {
  table = new Map();
  const add = (c, ch, kind) => {
    if (!table.has(c)) table.set(c, []);
    const list = table.get(c);
    if (!list.some(x => x.ch === ch)) list.push({ ch, kind });
  };
  for (const [ch, r] of Object.entries(codes)) {
    if (!r.code) continue;
    const fin = finalOf(r.code);
    add(fin, ch, '主');
    if (r.code !== fin) add(r.code, ch, '完整');
    for (const a of r.alts || []) {
      const f = finalOf(a.code);
      add(f, ch, '兼容');
      if (a.code !== f) add(a.code, ch, '兼容');
    }
  }
  /* 重碼時常用字排前面 —— 少按一次選字鍵 */
  for (const list of table.values())
    list.sort((a, b) => (rank.get(a.ch) ?? 1e9) - (rank.get(b.ch) ?? 1e9));

  const chars = new Set(Object.values(codes).filter(r => r.code).length ? Object.keys(codes).filter(c => codes[c].code) : []);
  const dup = [...table.values()].filter(l => l.length > 1).length;
  $('#meta').innerHTML = `碼表 <b>${chars.size}</b> 字 · <b>${table.size}</b> 個碼`;
  $('#stat').innerHTML =
    `<span>已收 <b>${chars.size}</b> 字</span>` +
    `<span>可打出的碼 <b>${table.size}</b> 個（含完整碼與兼容碼）</span>` +
    `<span>其中 <b>${dup}</b> 個碼要選字</span>`;
}

/* ---------- 未取碼的字：現場推它的碼 ----------
   打得出來，就表示這套字根表 + 原則自己接得住這個字；打出來的碼跟你心裡的拆法
   不一樣，那就是規則還沒說清楚的地方 —— 這正是最值得看的東西。
   只推最常用的那幾千字（照字頻），不然要把 9574 個字全跑一遍。 */
/* 只推最常用的 3500 個未取碼字：實測約 4 秒推完、覆蓋 99.8%。
   再往下是罕用字，筆畫多，搜尋成本陡增，不划算。 */
const PRED_LIMIT = 3500;
let zigen = null, lib = null, learned = { stroke_kinds: [] };
let predTable = new Map();      /* 碼 → [{ch, code}]，預測出來的 */
let predicting = false, predDone = 0;

function rule(id) {
  return rules && rules.rules.find(r => r.id === id && r.enabled && r.kind === 'enforced');
}

async function buildPredictions() {
  if (predicting || !lib) return;
  predicting = true;
  const todo = [...rank.keys()]
    .filter(ch => !codes[ch] || !codes[ch].code)
    .slice(0, PRED_LIMIT);
  const merge = rule('merge_over_split'), sk = rule('skip_isolated_hv'),
        tp = rule('tier_priority');
  const thr = zigen.meta.merge_threshold || Zigen.SAME_SHAPE;

  for (let i = 0; i < todo.length; i++) {
    const ch = todo[i];
    const g = await Zigen.getGlyph(ch);
    if (g && g.medians) {
      const out = Zigen.predict(g.medians, lib, {
        thr,
        segPenalty: merge ? merge.params.seg_penalty : 0.05,
        skip: sk ? { penalty: sk.params.penalty, allow: sk.params.allow,
                     learned: learned.stroke_kinds,
                     lastLetters: sk.params.last_stroke_letters } : null,
        tierPenalty: tp ? (tp.params?.penalty ?? 0.05) : 0,
      });
      /* 只收「整個字都拆得完」的預測 —— 拆一半的碼不是碼 */
      const best = out.find(r => r.covered === r.total);
      if (best) {
        const code = best.segments.map(s => s.letter).join('');
        const fin = finalOf(code);
        for (const c of new Set([fin, code])) {
          if (!predTable.has(c)) predTable.set(c, []);
          predTable.get(c).push({ ch, code, full: code });
        }
      }
    }
    predDone = i + 1;
    if (i % 25 === 0) {
      $('#predprog').textContent =
        `推導中… ${predDone} / ${todo.length} 字（邊推邊可以打，推到的字馬上就打得出來）`;
      render();
      await new Promise(r => setTimeout(r, 0));      /* 讓畫面喘口氣 */
    }
  }
  const got = new Set([...predTable.values()].flat().map(x => x.ch)).size;
  $('#predprog').textContent =
    `完成：${todo.length} 個未取碼的字裡，用現有字根推得出 ${got} 個` +
    `（${(got / todo.length * 100).toFixed(0)}%）`;
  predicting = false;
  render();
}

$('#usePred').onchange = () => {
  if ($('#usePred').checked) {
    if (!predTable.size && !predicting) buildPredictions();
    else render();
  } else { $('#predprog').textContent = ''; render(); }
};

/* ---------- 貼連結 → 抓那頁的文字，當練習文字用 ----------
   伺服器端抓（瀏覽器直接 fetch 外站會被 CORS 擋），土法 HTML 轉文字，
   抓不準「這是不是正文」——排版乾淨的文章頁效果最好，別期望太多。
   只是拿來唸、自己打，不會自動貼進紙面（那樣就不是練打字了）。 */
async function fetchSample() {
  const url = $('#srcUrl').value.trim();
  if (!url) return;
  $('#fetchStatus').textContent = '擷取中…';
  try {
    const r = await fetch('/api/extract?url=' + encodeURIComponent(url));
    const j = await r.json();
    if (!r.ok || j.error) throw new Error(j.error || `HTTP ${r.status}`);
    if (!j.text) throw new Error('沒擷取到文字');
    $('#sampleText').textContent = j.text;
    $('#sampleBox').style.display = 'block';
    $('#fetchStatus').textContent = `已擷取 ${j.text.length} 字`;
    saveState();
  } catch (e) {
    $('#fetchStatus').textContent = '擷取失敗：' + e.message;
  }
}
$('#fetchUrl').onclick = fetchSample;
$('#srcUrl').onkeydown = e => { if (e.key === 'Enter') { e.preventDefault(); fetchSample(); } };
$('#sampleClose').onclick = () => { $('#sampleBox').style.display = 'none'; saveState(); };

/* 候選：完全相符的排前面，其次是「還沒打完」的（前綴相符） */
function candidates() {
  if (!code) return [];
  const usePred = $('#usePred').checked;
  const exact = (table.get(code) || []).map(x => ({ ...x, exact: true }));
  const pre = [];
  if (exact.length < 9) {
    for (const [c, list] of table) {
      if (c === code || !c.startsWith(code)) continue;
      for (const x of list) {
        if (exact.some(e => e.ch === x.ch) || pre.some(e => e.ch === x.ch)) continue;
        pre.push({ ...x, exact: false, code: c });
      }
      if (exact.length + pre.length >= 12) break;
    }
  }
  /* 預測出來的字排在已取碼的字後面 —— 你親手取的碼永遠優先 */
  const pd = [];
  if (usePred) {
    for (const x of predTable.get(code) || []) {
      if (exact.some(e => e.ch === x.ch)) continue;
      pd.push({ ...x, exact: true, pred: true, kind: '預測' });
    }
    pd.sort((a, b) => (rank.get(a.ch) ?? 1e9) - (rank.get(b.ch) ?? 1e9));
  }
  return [...exact, ...pd, ...pre].slice(0, 9);
}

function render() {
  const paper = $('#paper');
  paper.innerHTML = '';
  paper.append(document.createTextNode(text.slice(0, pos)));
  paper.append(el('span', 'caret'));
  paper.append(document.createTextNode(text.slice(pos)));
  saveState();

  const box = $('#imebox');
  if (!code) { box.classList.remove('on'); return; }
  box.classList.add('on');
  $('#imecode').textContent = code;

  const cands = candidates();
  const cs = $('#cands'); cs.innerHTML = '';
  if (!cands.length) {
    cs.append(el('span', 'none', '打不出字 —— 這個碼還沒有對應的字'));
    $('#imehint').textContent = '⌫ 刪一碼　esc 清掉';
    return;
  }
  cands.forEach((x, i) => {
    const d = el('div', 'cand' + (i === pick ? ' on' : '') + (x.pred ? ' pred' : ''));
    d.append(el('i', '', String(i + 1)));
    d.append(el('b', '', x.ch));
    d.append(el('em', '', x.exact ? (x.kind === '主' ? '' : x.kind) : x.code));
    d.onclick = () => commit(i);
    /* 預測出來的字：一鍵跳去取碼頁，看它跟你心裡的拆法一不一樣 */
    if (x.pred) {
      const a = el('a', 'predlink', '去取碼 →');
      a.href = '/annotate?c=' + encodeURIComponent(x.ch);
      a.target = '_blank';
      a.onclick = e => e.stopPropagation();
      d.append(a);
    }
    cs.append(d);
  });
  $('#imehint').textContent = 'space 上第一個　1–9 選字';
}

/* 在游標處插入，而不是永遠加在最後 —— 這樣游標移過去之後打字才會插對地方 */
function insertAtPos(s) {
  text = text.slice(0, pos) + s + text.slice(pos);
  pos += s.length;
}

function commit(i) {
  const cands = candidates();
  const c = cands[i];
  if (!c) return;
  insertAtPos(c.ch);
  code = ''; pick = 0;
  render();
}

/* 正體中文全形標點。字母鍵全都給字根用了，標點就落在原本的標點鍵上。
   成對的（引號）輪流出左右，跟真的輸入法一樣。 */
const PUNCT = {
  ',': '，', '.': '。', '?': '？', '!': '！', ';': '；', ':': '：',
  '\\': '、', '/': '、', '(': '（', ')': '）', '[': '「', ']': '」',
  '{': '『', '}': '』', '<': '《', '>': '》', '~': '～', '^': '……',
  '_': '——', '-': '－', '@': '＠', '#': '＃', '%': '％', '&': '＆',
  '*': '＊', '+': '＋', '=': '＝', '|': '｜', '$': '＄',
};
const PAIRS = { '"': ['「', '」'], "'": ['『', '』'] };
const pairOpen = {};          /* 這個引號現在該出左邊還是右邊 */

$('#paper').onkeydown = e => {
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  const k = e.key;
  if (PUNCT[k] || PAIRS[k]) {
    e.preventDefault();
    /* 打標點時如果還有沒上屏的碼，先把候選上屏 —— 真的輸入法都是這樣 */
    if (code) { const c = candidates()[pick]; if (c) { insertAtPos(c.ch); } code = ''; pick = 0; }
    if (PAIRS[k]) {
      pairOpen[k] = !pairOpen[k];
      insertAtPos(PAIRS[k][pairOpen[k] ? 0 : 1]);
    } else insertAtPos(PUNCT[k]);
    render();
    return;
  }
  if (/^[a-zA-Z]$/.test(k)) {
    e.preventDefault();
    code += k.toUpperCase(); pick = 0; render();
  } else if (k === ' ') {
    e.preventDefault();
    if (code) commit(pick); else { insertAtPos(' '); render(); }
  } else if (/^[1-9]$/.test(k) && code) {
    e.preventDefault();
    commit(+k - 1);
  } else if (/^[0-9]$/.test(k) && !code) {
    /* 沒有正在打碼時，1–9 就不是選字鍵了 —— 數字鍵單純打數字（半形） */
    e.preventDefault();
    insertAtPos(k); render();
  } else if (k === 'Backspace') {
    e.preventDefault();
    if (code) code = code.slice(0, -1);
    else if (pos > 0) { text = text.slice(0, pos - 1) + text.slice(pos); pos--; }
    pick = 0; render();
  } else if (k === 'Escape') {
    e.preventDefault();
    code = ''; pick = 0; render();
  } else if (k === 'Enter') {
    e.preventDefault();
    if (code) { code = ''; pick = 0; } else insertAtPos('\n');
    render();
  } else if (k === 'ArrowRight' && code) {
    e.preventDefault(); pick = Math.min(pick + 1, candidates().length - 1); render();
  } else if (k === 'ArrowLeft' && code) {
    e.preventDefault(); pick = Math.max(0, pick - 1); render();
  } else if (k === 'ArrowRight' && !code) {
    /* 沒在打碼時，左右鍵才是移動游標（打碼時留給切候選） */
    e.preventDefault(); pos = Math.min(text.length, pos + 1); render();
  } else if (k === 'ArrowLeft' && !code) {
    e.preventDefault(); pos = Math.max(0, pos - 1); render();
  }
};

/* 點紙面 → 游標移到點的位置（打字才不是永遠加在最後） */
function offsetFromPoint(clientX, clientY) {
  let range = null;
  if (document.caretRangeFromPoint) {
    range = document.caretRangeFromPoint(clientX, clientY);
  } else if (document.caretPositionFromPoint) {
    const p = document.caretPositionFromPoint(clientX, clientY);
    if (p) { range = document.createRange(); range.setStart(p.offsetNode, p.offset); }
  }
  const paper = $('#paper');
  if (!range || !paper.contains(range.startContainer)) return null;
  let idx = 0;
  const walker = document.createTreeWalker(paper, NodeFilter.SHOW_TEXT);
  let node;
  while ((node = walker.nextNode())) {
    if (node === range.startContainer) return idx + range.startOffset;
    idx += node.textContent.length;
  }
  return idx;
}
$('#paper').onclick = e => {
  $('#paper').focus();
  const idx = offsetFromPoint(e.clientX, e.clientY);
  if (idx != null) { pos = Math.max(0, Math.min(text.length, idx)); code = ''; pick = 0; render(); }
};

Promise.all([
  fetch('/api/codes').then(r => r.json()),
  fetch('/api/rules').then(r => r.json()),
  fetch('/api/freq').then(r => r.json()),
  fetch('/api/zigen').then(r => r.json()),
  fetch('/api/learned').then(r => r.json()).catch(() => ({ stroke_kinds: [] })),
]).then(async ([c, rl, f, z, ln]) => {
  codes = c; rules = rl; zigen = z;
  learned = ln && ln.stroke_kinds ? ln : { stroke_kinds: [] };
  f.order.forEach((ch, i) => rank.set(ch, i));
  lib = await Zigen.buildLibrary(zigen);      /* 推未取碼的字要用 */
  buildTable();
  loadState();                                /* 換頁／切分頁再回來，接著打 */
  render();
  $('#paper').focus();
});

/* 碼表改了就跟著更新（跟其他頁一樣） */
let stamp = null;
setInterval(async () => {
  const s = JSON.stringify(await fetch('/api/state').then(r => r.json()));
  if (stamp && s !== stamp) {
    codes = await fetch('/api/codes').then(r => r.json());
    rules = await fetch('/api/rules').then(r => r.json());
    buildTable(); render();
  }
  stamp = s;
}, 3000);
</script>
