<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>愛發筆輸入法 — 字根表編輯器</title>
<style>
  :root {
    --bg:#faf9f7; --card:#fff; --ink:#1c1a17; --muted:#7c7568;
    --line:#e3ded4; --accent:#b4531f; --warn:#d98324; --dupe:#c0392b; --ok:#2e7d4f;
    --ghost:#d9d3c8;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#16150f; --card:#1f1e18; --ink:#ece7dc; --muted:#9a9284;
            --line:#33312a; --accent:#e0894f; --warn:#e0a95c; --dupe:#e57373; --ok:#6bbd8e;
            --ghost:#3b3830; }
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
    font:15px/1.5 -apple-system,"PingFang TC","Helvetica Neue",sans-serif; }
  header { position:sticky; top:0; z-index:10; background:var(--bg);
    border-bottom:1px solid var(--line); padding:12px 20px;
    display:flex; gap:14px; align-items:center; flex-wrap:wrap; }
  h1 { font-size:17px; margin:0; font-weight:650; }
  nav { display:flex; gap:5px; }
  nav a { font-size:13px; color:var(--muted); text-decoration:none; padding:4px 9px;
    border:1px solid var(--line); border-radius:7px; }
  nav a.on { color:#fff; background:var(--accent); border-color:var(--accent); }
  .stats { color:var(--muted); font-size:13px; display:flex; gap:14px; flex-wrap:wrap; }
  .stats b { color:var(--ink); font-weight:600; }
  .grow { flex:1; }
  input[type=search] { padding:6px 10px; border:1px solid var(--line); border-radius:7px;
    background:var(--card); color:var(--ink); width:170px; font-size:14px; }
  button { font:inherit; font-size:13px; padding:6px 12px; border-radius:7px;
    border:1px solid var(--line); background:var(--card); color:var(--ink); cursor:pointer; }
  button:hover { border-color:var(--accent); color:var(--accent); }
  button.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
  button.primary:hover { opacity:.88; color:#fff; }
  #status { font-size:13px; min-width:76px; color:var(--muted); }
  #status.saved { color:var(--ok); } #status.dirty { color:var(--warn); }

  main { padding:18px 44px 18px 20px; display:grid; gap:14px;
    grid-template-columns:repeat(auto-fill,minmax(460px,1fr)); align-items:start; }

  /* 右側 A–Z 快速跳字母 */
  #jump { position:fixed; right:6px; top:50%; transform:translateY(-50%); z-index:20;
    display:flex; flex-direction:column; gap:1px; padding:5px 3px; border-radius:10px;
    background:color-mix(in srgb, var(--card) 88%, transparent);
    border:1px solid var(--line); backdrop-filter:blur(4px); }
  #jump a { font:600 10px/1 ui-monospace,monospace; color:var(--muted); text-decoration:none;
    width:17px; height:15px; display:grid; place-items:center; border-radius:4px; }
  #jump a:hover { background:var(--accent); color:#fff; }
  #jump a.empty { opacity:.3; }
  #jump a.has { color:var(--ink); }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px 16px 14px; }
  .card.hidden { display:none; }
  .key { font:650 26px/1 ui-monospace,Menlo,monospace; margin-bottom:2px; }

  .intent { border-left:2px solid var(--line); padding:6px 0 6px 10px; margin:8px 0; }
  .intent-head { display:flex; align-items:center; gap:6px; }
  .num { font:600 12px ui-monospace,monospace; color:var(--accent);
    border:1px solid var(--accent); border-radius:50%; width:19px; height:19px;
    display:grid; place-items:center; flex:none; }
  .desc { flex:1; border:none; background:transparent; color:var(--ink); font:inherit;
    font-size:14px; padding:2px 4px; border-radius:5px; }
  .desc:hover { background:var(--bg); }
  .desc:focus { outline:1px solid var(--line); background:var(--bg); }
  .desc:placeholder-shown { color:var(--muted); font-style:italic; }
  .shapes { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }

  .chip { position:relative; display:flex; flex-direction:column; align-items:center;
    border:1px solid var(--line); border-radius:8px; background:var(--bg);
    padding:3px 8px 2px; min-width:46px; }
  .chip.unc { border-color:var(--warn); border-style:dashed; }
  .chip.dupe { box-shadow:inset 0 -3px 0 var(--dupe); }
  .chip .z { font-size:26px; line-height:1.15; font-family:"PingFang TC","Songti TC",serif;
    min-width:20px; text-align:center; outline:none; }
  .chip svg.gly { width:30px; height:30px; display:block; }
  .chip svg.gly .on { fill:var(--ink); }
  .chip svg.gly .off { fill:var(--ghost); opacity:.5; }
  .chip .ex { font-size:11px; color:var(--muted); outline:none; min-width:16px; text-align:center; }
  .chip .ex:empty::before { content:"（例）"; opacity:.45; }
  .chip .tools { position:absolute; top:-7px; right:-7px; display:none; gap:2px; }
  .chip:hover .tools { display:flex; }
  .chip .tools span { cursor:pointer; font-size:10px; width:16px; height:16px; border-radius:50%;
    background:var(--card); border:1px solid var(--line); display:grid; place-items:center; }
  .chip .tools .x:hover { color:var(--dupe); border-color:var(--dupe); }
  .chip.unc .tools .u { color:var(--warn); border-color:var(--warn); }
  .chip .set { position:absolute; top:-6px; left:-6px; font-size:9px; padding:0 3px;
    border-radius:4px; border:1px solid var(--line); background:var(--card); cursor:pointer;
    color:var(--muted); }
  .chip .cnt { position:absolute; bottom:-7px; right:-6px; font:600 9px ui-monospace,monospace;
    padding:0 3px; border-radius:4px; border:1px solid var(--line); background:var(--card);
    color:var(--accent); cursor:pointer; }
  .chip .cnt:hover { border-color:var(--accent); }
  .chip .alt { position:absolute; bottom:-7px; left:-6px; font:600 9px ui-monospace,monospace;
    padding:0 3px; border-radius:4px; border:1px solid var(--ok); background:var(--card);
    color:var(--ok); cursor:pointer; }
  .chip .thr { position:absolute; top:-7px; left:50%; transform:translateX(-50%);
    font:600 9px ui-monospace,monospace; padding:0 3px; border-radius:4px;
    border:1px solid var(--warn); background:var(--card); color:var(--warn); cursor:pointer;
    white-space:nowrap; }
  .empty { color:var(--muted); font-size:13px; font-style:italic; padding:6px 0; }
  .chip.dragging { opacity:.35; }
  .chip.ghost { position:fixed; z-index:100; pointer-events:none; opacity:.9;
    transform:translate(-50%,-50%); box-shadow:0 6px 20px rgba(0,0,0,.25); }
  .shapes { min-height:38px; border-radius:8px; }
  .shapes.drop { background:color-mix(in srgb, var(--accent) 12%, transparent);
    outline:1px dashed var(--accent); }
  .ins { width:3px; align-self:stretch; min-height:40px; border-radius:2px;
    background:var(--accent); }
  /* 刪字根前的確認 */
  #zdel { position:fixed; inset:0; background:rgba(0,0,0,.45); display:none; place-items:center;
    z-index:90; }
  #zdel.on { display:grid; }
  .zsheet { background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:16px 18px; width:min(660px,94vw); max-height:82vh; display:flex; flex-direction:column; }
  .zsheet h3 { margin:0 0 4px; font-size:15px; }
  .zsub { font-size:12px; color:var(--muted); line-height:1.6; margin-bottom:10px; }
  .zsub b { color:var(--ink); }
  .zlist { overflow:auto; flex:1; display:flex; flex-wrap:wrap; gap:6px; }
  .zitem { display:flex; align-items:center; gap:5px; border:1px solid var(--line);
    border-radius:9px; padding:3px 7px; background:var(--bg); }
  .zitem .zc { font-size:20px; font-family:"PingFang TC",serif; color:var(--ink);
    text-decoration:none; }
  .zitem .zc:hover { color:var(--accent); }
  .zitem svg { width:26px; height:26px; }
  .zitem svg .on { fill:var(--accent); } .zitem svg .off { fill:var(--ghost); opacity:.35; }
  .zitem .zcd { font:600 11px ui-monospace,monospace; color:var(--muted); }
  .zrow { display:flex; gap:6px; align-items:center; margin-top:12px; flex-wrap:wrap; }

  .sugbox { margin-top:5px; }
  .sug { display:flex; align-items:center; gap:7px; font-size:11px; color:var(--muted);
    padding:3px 6px; border:1px dashed var(--line); border-radius:8px; margin-top:4px; }
  .sug .sgly svg { width:26px; height:26px; display:block; }
  .sug .sgly svg .on { fill:var(--ink); } .sug .sgly svg .off { fill:var(--ghost); opacity:.4; }
  .sug .stext { flex:1; } .sug b { color:var(--ink); }
  .sug i { color:var(--warn); font-style:normal; }

  /* 精簡檢視：一行一個字母，只看形狀與數量 */
  main.compact { display:block; padding:14px 20px; }
  .row { display:flex; align-items:center; gap:10px; padding:7px 12px; border-radius:10px;
    border:1px solid var(--line); background:var(--card); margin-bottom:6px; }
  .row .key { font:650 20px/1 ui-monospace,Menlo,monospace; width:26px; margin:0; flex:none; }
  .row .n { font:600 11px ui-monospace,monospace; color:var(--muted); width:28px; flex:none; }
  .row .shapes { flex:1; min-height:0; margin:0; gap:5px; }
  .row .chip { min-width:auto; padding:2px 5px 1px; }
  .row .chip .ex, .row .chip .set, .row .chip .cnt { display:none; }
  .row .tsep { width:1px; align-self:stretch; background:var(--line); margin:0 3px; }
  .row .tsep-l { font-size:9px; color:var(--muted); align-self:center; }
  .row.empty-row { opacity:.45; }

  /* 選取 → 合併 */
  .chip.picked { outline:2px solid var(--accent); outline-offset:1px; }
  #mergebar { position:fixed; left:50%; bottom:18px; transform:translateX(-50%); z-index:60;
    display:none; gap:10px; align-items:center; background:var(--card); color:var(--ink);
    border:1px solid var(--accent); border-radius:12px; padding:9px 14px;
    box-shadow:0 8px 26px rgba(0,0,0,.22); font-size:13px; }
  #mergebar.on { display:flex; }
  #mergebar .prev { display:flex; gap:4px; }
  #mergebar .prev svg { width:26px; height:26px; }
  #mergebar .prev svg .on { fill:var(--ink); } #mergebar .prev svg .off { fill:var(--ghost); opacity:.35; }
  .grip { cursor:grab; color:var(--line); font-size:12px; line-height:1; user-select:none;
    padding:0 1px; }
  .grip:hover { color:var(--accent); }
  .intent.dragging { opacity:.35; }
  .intent.ghost-intent { position:fixed; z-index:100; pointer-events:none; opacity:.95;
    background:var(--card); border:1px solid var(--accent); border-radius:10px;
    transform:translate(-30px,-14px); box-shadow:0 8px 24px rgba(0,0,0,.28); }
  .ins-intent { height:3px; border-radius:2px; background:var(--accent); margin:3px 0; }
  .tier.drop-i { background:color-mix(in srgb, var(--accent) 7%, transparent); border-radius:8px; }
  .addbtns { display:flex; flex-direction:column; gap:3px; justify-content:center; }
  .addbtns button { padding:2px 7px; font-size:12px; }
  .tier-label { font-size:11px; color:var(--muted); letter-spacing:.08em; margin:2px 0 4px;
    text-transform:none; font-weight:600; }
  .tier { border-top:1px solid var(--line); padding-top:7px; margin-top:9px; }
  .tier:first-of-type { border-top:none; margin-top:2px; }
  .mini { font-size:12px; padding:3px 8px; color:var(--muted); }
  .codes { display:flex; flex-wrap:wrap; gap:6px; }
  .code-item { display:flex; align-items:center; gap:3px; border:1px solid var(--line);
    border-radius:6px; padding:2px 5px; background:var(--bg); }
  .code-item .c { font-size:18px; width:20px; text-align:center; outline:none; }
  .code-item .cd { font:600 12px ui-monospace,Menlo,monospace; color:var(--accent);
    text-transform:uppercase; min-width:32px; outline:none; }
  .code-item .x { cursor:pointer; color:var(--muted); font-size:11px; }
  .notes { width:100%; margin-top:8px; border:1px solid var(--line); border-radius:7px;
    background:var(--bg); color:var(--ink); padding:5px 8px; font:inherit; font-size:13px;
    resize:vertical; min-height:30px; }
  .dupe-panel { margin:0 44px 4px 20px; padding:10px 13px; border:1px solid var(--dupe);
    border-radius:10px; background:var(--card); font-size:13px; }
  .dupe-panel > b { color:var(--dupe); }
  .dupe-panel .hint { color:var(--muted); font-size:11px; margin-left:6px; }
  .dupe-row { display:flex; align-items:center; gap:9px; padding:5px 0;
    border-top:1px solid var(--line); margin-top:5px; }
  .dupe-row .dgly { flex:none; width:30px; }
  .dupe-row .dgly svg { width:30px; height:30px; display:block; }
  .dupe-row .dgly svg .on { fill:var(--dupe); } .dupe-row .dgly svg .off { fill:var(--ghost); opacity:.3; }
  .dupe-row .dkeys { flex:none; font:600 12px ui-monospace,monospace; color:var(--muted);
    min-width:70px; }
  .dupe-row .dkeys b { color:var(--dupe); }
  .dupe-row .dchars { display:flex; flex-wrap:wrap; gap:3px; }
  .dupe-row .dchars a { font-size:19px; font-family:"PingFang TC",serif; color:var(--ink);
    text-decoration:none; border:1px solid var(--line); border-radius:6px; padding:0 4px;
    line-height:1.35; }
  .dupe-row .dchars a:hover { border-color:var(--accent); color:var(--accent); }
  .dupe-panel button.primary { margin-left:10px; padding:3px 10px; font-size:12px; }

  /* 逐組對照 */
  #review { position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; place-items:center;
    z-index:95; }
  #review.on { display:grid; }
  .rvsheet { background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:18px 20px; width:min(740px,95vw); max-height:88vh; overflow:auto; }
  .rvsheet h3 { margin:0 0 5px; font-size:15px; font-weight:600; }
  .rvsub { font-size:12px; color:var(--muted); line-height:1.6; margin-bottom:14px; }
  .rvsub b { color:var(--ink); }
  .rvcards { display:flex; gap:12px; flex-wrap:wrap; }
  .rvcard { flex:1; min-width:220px; border:1px solid var(--line); border-radius:12px;
    padding:10px 12px; background:var(--bg); }
  .rvhead { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  .rvL { font:700 22px ui-monospace,monospace; color:var(--accent); }
  .rvdesc { font-size:12px; color:var(--ink); flex:1; }
  .rvn { font:600 11px ui-monospace,monospace; color:var(--muted); }
  .rvstage { display:flex; align-items:center; gap:4px; justify-content:center; }
  .rvarrow { padding:2px 8px; font-size:15px; line-height:1; color:var(--muted); }
  .rvarrow:disabled { opacity:.25; }
  .rvglyph svg { width:150px; height:150px; display:block;
    border:1px solid var(--line); border-radius:10px; background:var(--card); }
  .rvglyph svg .on { fill:var(--accent); }
  .rvglyph svg .off { fill:var(--ghost); opacity:.45; }
  .rvsrc { font-size:11px; color:var(--muted); text-align:center; margin-top:6px; }
  .rvsrc b { font-size:15px; color:var(--ink); font-family:"PingFang TC",serif; }
  .rvsrc a { color:var(--accent); text-decoration:none; margin-left:2px; }
  .rvtag { font:600 10px ui-monospace,monospace; color:var(--muted);
    border:1px solid var(--line); border-radius:4px; padding:0 4px; }
  .rvpos { display:block; font:600 10px ui-monospace,monospace; color:var(--muted); margin-top:2px; }
  .rvchars { display:flex; flex-wrap:wrap; gap:3px; margin-top:8px; justify-content:center; }
  .rvchars button { font-size:17px; font-family:"PingFang TC",serif; color:var(--ink);
    border:1px solid var(--line); border-radius:6px; padding:1px 5px; line-height:1.3; }
  .rvchars button:hover { border-color:var(--accent); color:var(--accent); }
  .rvchars button.on { background:var(--accent); border-color:var(--accent); color:#fff; }
  .rvacts { display:flex; gap:6px; margin-top:14px; flex-wrap:wrap; }
  .dnone { font-size:11px; color:var(--muted); }
  .dupe-row .dacts { margin-left:auto; display:flex; gap:4px; flex:none; }
  .dupe-row .dacts button { font-size:11px; padding:2px 7px; }

  /* ---------- modal ---------- */
  #modal { position:fixed; inset:0; background:rgba(0,0,0,.45); display:none; place-items:center; z-index:50; }
  #modal.on { display:grid; }
  .sheet { background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:16px; width:min(680px,95vw); }
  .tabs { display:flex; gap:6px; margin-bottom:8px; }
  .tabs button.on { background:var(--accent); border-color:var(--accent); color:#fff; }
  .sub { color:var(--muted); font-size:12px; margin-bottom:10px; }
  .pane { display:none; } .pane.on { display:block; }
  .row { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
  .draw-row { display:flex; gap:14px; }
  #pad { border:1px solid var(--line); border-radius:10px; background:var(--bg);
    touch-action:none; cursor:crosshair; flex:none; }
  .pad-side { flex:1; display:flex; flex-direction:column; gap:6px; min-width:0; }
  .cands { display:flex; flex-wrap:wrap; gap:5px; align-content:flex-start;
    max-height:220px; overflow:auto; }
  .cand { display:flex; flex-direction:column; align-items:center; border:1px solid var(--line);
    border-radius:8px; background:var(--bg); cursor:pointer; padding:2px 6px; min-width:42px; }
  .cand:hover { border-color:var(--accent); }
  .cand .g { font-size:26px; font-family:"PingFang TC","Songti TC",serif; line-height:1.15; }
  .cand .s { font-size:9px; color:var(--muted); font-family:ui-monospace,monospace; }
  .manual { flex:1; min-width:90px; padding:5px 8px; border:1px solid var(--line);
    border-radius:7px; background:var(--bg); color:var(--ink); font-size:20px;
    font-family:"PingFang TC",serif; }

  /* stroke picker */
  .pick-row { display:flex; gap:16px; align-items:flex-start; }
  #srcIn { width:70px; font-size:26px; text-align:center; padding:4px;
    border:1px solid var(--line); border-radius:8px; background:var(--bg); color:var(--ink);
    font-family:"PingFang TC",serif; }
  #strokeGrid { display:flex; flex-wrap:wrap; gap:6px; max-width:400px; }
  .sk { width:62px; height:62px; border:1px solid var(--line); border-radius:8px;
    background:var(--bg); cursor:pointer; position:relative; }
  .sk.sel { border-color:var(--accent); background:color-mix(in srgb, var(--accent) 9%, transparent); }
  .sk svg { width:100%; height:100%; }
  .sk .prev { fill:var(--ghost); opacity:.45; }
  .sk .this { fill:var(--muted); }
  .sk.sel .this { fill:var(--accent); }
  .sk b { position:absolute; top:1px; left:4px; font:600 9px ui-monospace,monospace;
    color:var(--muted); }
  #preview { width:120px; height:120px; border:1px dashed var(--line); border-radius:10px; flex:none; }
  #preview .on { fill:var(--ink); } #preview .off { fill:var(--ghost); opacity:.35; }
</style>
</head>
<body>
<header>
  <h1>愛發筆</h1>
  <nav>
    <a href="/" class="on">字根表</a><a href="/annotate">逐字取碼</a><a href="/stats">碼表分析</a><a href="/rules">取碼原則</a>
  </nav>
  <div class="stats" id="stats"></div>
  <div class="grow"></div>
  <button id="compact">精簡檢視</button>
  <input type="search" id="q" placeholder="搜尋字根／例字／意圖…">
  <label style="font-size:13px;color:var(--muted)"
    title="全域門檻：愈大愈容易把相似筆畫視為同一字根。個別字根可以有更嚴格的專屬門檻（chip 上的橘色數字）。">
    全域門檻 <input type="range" id="thr" min="0.05" max="0.6" step="0.01" style="width:80px;vertical-align:middle">
    <span id="thrv" style="font:600 11px ui-monospace,monospace"></span>
  </label>
  <span id="status">已載入</span>
  <button id="export">匯出 .txt</button>
  <button class="primary" id="save">儲存</button>
</header>
<div id="dupes"></div>
<nav id="jump"></nav>
<main id="app"></main>
<div id="review">
  <div class="rvsheet">
    <h3 id="rvtitle"></h3>
    <div class="rvsub" id="rvsub"></div>
    <div class="rvcards" id="rvcards"></div>
    <div class="rvacts" id="rvacts"></div>
  </div>
</div>

<div id="zdel">
  <div class="zsheet">
    <h3 id="ztitle"></h3>
    <div class="zsub" id="zsub"></div>
    <div class="zlist" id="zlist"></div>
    <div class="zrow">
      <button id="zcancel">取消，不刪</button>
      <div class="grow"></div>
      <button id="zdrop">刪字根，並刪掉那些字的這一碼</button>
      <button id="zrelet">刪字根，那一碼改成…</button>
      <button class="primary" id="zkeep">刪字根，碼維持原樣</button>
    </div>
  </div>
</div>

<div id="mergebar">

        若找不到對應字形，請改用「筆畫選取」。</div>
      <div class="draw-row">
        <canvas id="pad" width="240" height="240"></canvas>

            <button id="undo">復原一筆</button>
            <button id="clear">清除</button>
            <span id="recog-status" style="font-size:12px;color:var(--muted)"></span>
          </div>
          <div class="cands" id="cands"></div>
          <div class="row" style="margin-top:auto">
            <input class="manual" id="manual" placeholder="或直接貼上／打字…">

<script src="/assets/shape.js"></script>
<script src="/assets/zigen.js"></script>
<script>
/* ============================== state ============================== */
let data = null, dirty = false;
const $ = s => document.querySelector(s);
const el = (t, c, x) => { const e = document.createElement(t);
  if (c) e.className = c; if (x != null) e.textContent = x; return e; };
const touch = () => { dirty = true; $('#status').textContent = '未儲存'; $('#status').className = 'dirty'; };

/* A shape is EITHER  {z:"日"}  (a Unicode glyph)
   OR                 {glyph:{src:"笑", strokes:[0,1,2]}}  (a stroke subset of a source char).
   The second form is what lets 字根 exist that Unicode has no codepoint for. */
const shapeKey = s => s.z || `${s.glyph.src}#${s.glyph.strokes.join(',')}`;
const TIERS = [
  ['primary',   '優等字根'],
  ['secondary', '次等 · 孤立字根'],
  ['tertiary',  '三等 · 保全字根'],
];
const tierOf = it => it.tier || 'primary';
const intentionsOf = (L, tier) => L.intentions.filter(it => tierOf(it) === tier);
const allShapes = () => data.letters.flatMap(L =>
  L.intentions.flatMap(it => it.shapes.map(s => ({ letter: L.letter, s, tier: tierOf(it) }))));

/* 重複＝「同一個形狀掛在不同字母下」。
   注意不能比定義（明[1234] 與 早[1234] 都是「日」，定義卻不同），要比形狀。 */
let dupCache = [];
/* 一個字根在「不是同一個」清單裡的識別：字母 + 形狀定義 */
const pairKey = x => `${x.letter}:${shapeKey(x.s)}`;

async function computeDuplicates() {
  const thr = data.meta.merge_threshold || Zigen.SAME_SHAPE;
  const items = [];
  for (const { letter, s } of allShapes()) {
    if (!s.glyph) continue;
    const g = await Zigen.getGlyph(s.glyph.src);
    if (!g) continue;
    const med = s.glyph.strokes.map(i => g.medians[i]);
    if (med.some(m => !m)) continue;
    const v = Shape.strokeVec(med);
    if (v) items.push({ letter, s, v, n: med.length });
  }
  /* 你說過「不是同一個」的配對，就別再當成重複 */
  const distinct = new Set((data.meta.distinct || []).map(p => p.join('|')));
  const isDistinct = (a, b) =>
    distinct.has([a, b].sort().join('|'));

  const groups = [];
  for (const it of items) {
    const g = groups.find(g => g.n === it.n &&
      Shape.dist(g.items[0].v, it.v) < thr &&
      !g.items.some(x => isDistinct(pairKey(x), pairKey(it))));
    if (g) g.items.push(it);
    else groups.push({ n: it.n, items: [it] });
  }
  dupCache = groups
    .map(g => ({ s: g.items[0].s, keys: [...new Set(g.items.map(x => x.letter))].sort(),
                 shapes: g.items, d: g.items.length > 1
                   ? Shape.dist(g.items[0].v, g.items[1].v) : 0 }))
    .filter(g => g.keys.length > 1);
  return dupCache;
}
const duplicates = () => dupCache;

/* ---------- glyph stroke data (makemeahanzi, 9574 chars, 繁+簡) ---------- */
const glyphCache = new Map();
async function getGlyph(c) {
  if (glyphCache.has(c)) return glyphCache.get(c);
  const p = fetch('/api/glyph?c=' + encodeURIComponent(c))
    .then(r => r.ok ? r.json() : null).then(j => j && j.strokes);   /* 只需筆畫輪廓畫圖 */
  glyphCache.set(c, p);
  return p;
}
const SVG_TF = Shape.SVG_TF;   /* makemeahanzi paths live in a y-up 1024 em box */
function glyphSvg(strokes, sel, cls = 'gly') {
  const on = [], off = [];
  strokes.forEach((d, i) => (sel.includes(i) ? on : off).push(d));
  const box = sel.length ? bboxOf(strokes, sel) : '0 0 1024 1024';
  return `<svg class="${cls}" viewBox="${box}"><g transform="${SVG_TF}">` +
    off.map(d => `<path class="off" d="${d}"/>`).join('') +
    on.map(d => `<path class="on" d="${d}"/>`).join('') + '</g></svg>';
}
/* crop to the selected strokes so a 3-stroke 字根 isn't a speck in a full em box */
function bboxOf(strokes, sel) {
  let x0 = 1e9, y0 = 1e9, x1 = -1e9, y1 = -1e9;
  for (const i of sel) for (const m of strokes[i].matchAll(/(-?\d+(?:\.\d+)?)\s+(-?\d+(?:\.\d+)?)/g)) {
    const x = +m[1], y = 900 - +m[2];          // undo the y-flip
    if (x < x0) x0 = x; if (x > x1) x1 = x;
    if (y < y0) y0 = y; if (y > y1) y1 = y;
  }
  if (x1 < x0) return '0 0 1024 1024';
  const pad = 60, w = x1 - x0 + pad * 2, h = y1 - y0 + pad * 2, m = Math.max(w, h);
  return `${x0 - pad - (m - w) / 2} ${y0 - pad - (m - h) / 2} ${m} ${m}`;
}

/* ============================== render ============================== */
let compact = false;

function render() {
  const app = $('#app'); app.innerHTML = '';
  app.classList.toggle('compact', compact);
  renderMergeBar();
  if (compact) return renderCompact();

  const dup = new Set(duplicates().flatMap(d => d.shapes.map(x => shapeKey(x.s))));
  const q = $('#q').value.trim();

  for (const L of data.letters) {
    const card = el('div', 'card');
    card.append(el('div', 'key', L.letter));

    for (const [tier, label] of TIERS) {
      const sec = el('div', 'tier');
      intentZone(sec, L, tier);                      /* 空的等級也能接住意圖 */
      sec.append(el('div', 'tier-label', label));

      intentionsOf(L, tier).forEach(it => {
        const ii = L.intentions.indexOf(it);
        const box = el('div', 'intent');
        intentZone(box, L, tier);                    /* 意圖可以被拖到這裡的前後 */
        const ih = el('div', 'intent-head');
        const grip = el('span', 'grip', '⠿');
        grip.title = '拖曳可移動整個意圖（換順序、換等級、換字母）';
        grip.onpointerdown = ev => {
          if (ev.button !== 0) return;
          startIntentDrag(ev, box, L, it);
        };
        ih.append(grip);
        ih.append(el('div', 'num', String(intentionsOf(L, tier).indexOf(it) + 1)));
        const desc = el('input', 'desc');
        desc.value = it.desc || '';
        desc.placeholder = it.auto
          ? '未分類（逐字取碼自動學來）— 寫下取形意圖即可歸類'
          : '取形意圖，例：「人」下有一橫或有一點';
        desc.oninput = () => { it.desc = desc.value; if (desc.value) delete it.auto; touch(); };
        ih.append(desc);
        const del = el('span', '', '✕');
        del.style.cssText = 'cursor:pointer;color:var(--muted);font-size:11px;padding:0 4px';
        del.title = '刪除此意圖';
        del.onclick = () => {
          if (it.shapes.length && !confirm(`「${it.desc || '未命名'}」底下還有 ${it.shapes.length} 個字根，一併刪除？`)) return;
          L.intentions.splice(ii, 1); touch(); render();
        };
        ih.append(del);
        box.append(ih);

        const shapes = dropZone(el('div', 'shapes'), it.shapes);
        it.shapes.forEach((s, si) => shapes.append(chip(it.shapes, si, s, dup, L, it)));
        shapes.append(addButtons(it.shapes));
        box.append(shapes);

        /* 未分類的字根：照你已分好的意圖，建議它該歸哪一個 */
        if (it.auto && it.shapes.length) {
          const sbox = el('div', 'sugbox');
          box.append(sbox);
          renderSuggestions(sbox, L, it);
        }
        sec.append(box);
      });

      if (!intentionsOf(L, tier).length) {
        const row = lazyZone(el('div', 'shapes'), L, tier);
        row.append(addButtons2(L, tier));
        sec.append(row);
      }

      const addI = el('button', 'mini', '＋ 新增意圖');
      addI.onclick = () => {
        L.intentions.push({ desc: '', tier, shapes: [] });
        touch(); render();
      };
      sec.append(addI);
      card.append(sec);
    }

    const nt = el('textarea', 'notes');
    nt.value = L.notes || ''; nt.placeholder = '備註…';
    nt.oninput = () => { L.notes = nt.value; touch(); };
    card.append(nt);

    const hay = JSON.stringify(L);
    if (q && !hay.includes(q) && L.letter !== q.toUpperCase()) card.classList.add('hidden');
    app.append(card);
  }
  renderStats();
  renderJump();
  refreshDupes();
}

/* 精簡檢視：一行一個字母，只列形狀（等級之間用直線隔開，意圖不再分隔），
   一眼看出每個字母有幾個字根。 */
function renderCompact() {
  const app = $('#app');
  const dup = new Set(duplicates().flatMap(d => d.shapes.map(x => shapeKey(x.s))));
  const q = $('#q').value.trim();

  for (const L of data.letters) {
    const n = L.intentions.reduce((k, it) => k + it.shapes.length, 0);
    const row = el('div', 'row' + (n ? '' : ' empty-row'));
    row.append(el('div', 'key', L.letter));
    row.append(el('div', 'n', n ? `×${n}` : '—'));

    const box = el('div', 'shapes');
    let first = true;
    for (const [tier, label] of TIERS) {
      const shapes = L.intentions.filter(it => tierOf(it) === tier)
        .flatMap(it => it.shapes.map(s => ({ s, arr: it.shapes })));
      if (!shapes.length) continue;
      if (!first) {
        box.append(el('div', 'tsep'));
        box.append(el('div', 'tsep-l', tier === 'secondary' ? '次' : '三'));
      }
      first = false;
      for (const { s, arr } of shapes)
        box.append(chip(arr, arr.indexOf(s), s, dup, L, null));
    }
    if (!n) box.append(el('span', 'empty', '（還沒有字根）'));
    row.append(box);

    if (q && !JSON.stringify(L).includes(q) && L.letter !== q.toUpperCase())
      row.classList.add('hidden');
    app.append(row);
  }
  renderStats();
  renderJump();
  refreshDupes();
}

/* 重複要比形狀（要抓筆畫資料），所以非同步算完再重畫一次 */
let dupRun = 0;
async function refreshDupes() {
  const run = ++dupRun;
  await computeDuplicates();
  if (run !== dupRun) return;
  await renderDupes(dupCache);
  /* 重複的 chip 要標出來；算完才知道，所以這裡補上 */
  const keys = new Set(dupCache.flatMap(d => d.shapes.map(x => shapeKey(x.s))));
  document.querySelectorAll('.chip').forEach(c => {
    const k = c.dataset.key;
    c.classList.toggle('dupe', !!k && keys.has(k));
  });
  renderStats();
}

const SETS = { both: '繁簡', trad: '繁', simp: '簡' };
function chip(arr, i, s, dup, L, it) {
  const c = el('div', 'chip' + (s.uncertain ? ' unc' : '') + (dup.has(shapeKey(s)) ? ' dupe' : ''));
  c.dataset.key = shapeKey(s);
  if (dup.has(shapeKey(s))) c.title = '此字根同時屬於其他字母 — 取碼會有歧義';

  /* 拖放：把字根拖到別的意圖、別的等級、甚至別的字母。
     用 pointer 事件而非原生 HTML5 drag —— chip 內有 contenteditable 欄位，
     原生拖放會被它吃掉，根本起不了拖。移動超過 5px 才算拖，否則仍是點擊編輯。 */
  c.onpointerdown = ev => {
    if (ev.button !== 0) return;
    if (ev.target.closest('.tools, .set, .cnt')) return;
    /* ⌘／Ctrl／Shift + 點＝選取，用來把「其實是同一個」的字根合併 */
    if (ev.metaKey || ev.ctrlKey || ev.shiftKey) {
      ev.preventDefault();
      togglePick(L.letter, s);
      return;
    }
    startDrag(ev, c, arr, i, s);
  };
  if (picked.has(s)) c.classList.add('picked');

  if (s.glyph) {                                   /* stroke-subset 字根 */
    const holder = el('div');
    holder.innerHTML = '<svg class="gly" viewBox="0 0 1024 1024"></svg>';
    getGlyph(s.glyph.src).then(st => {
      if (st) holder.innerHTML = glyphSvg(st, s.glyph.strokes);
    });
    holder.title = `${s.glyph.src} 第 ${s.glyph.strokes.map(n => n + 1).join(',')} 筆`;
    holder.style.cursor = 'pointer';
    holder.onclick = () => openPicker(arr, s);      /* click to re-pick strokes */
    c.append(holder);
  } else {
    c.append(editable('z', s.z, v => {
      if (!v) { arr.splice(i, 1); touch(); render(); return; }
      s.z = v; touch(); render();
    }));
  }

  c.append(editable('ex', s.ex || '', v => { s.ex = v; touch(); }));

  if (s.thr != null) {
    const t = el('span', 'thr', s.thr.toFixed(2).replace(/^0/, ''));
    t.title = `這個字根的專屬門檻 ${s.thr}（全域是 ${data.meta.merge_threshold || Zigen.SAME_SHAPE}）\n` +
      '越小越嚴格 —— 只有非常像的形狀才算同一個。點擊可改，清空則回到全域。';
    t.onclick = () => {
      const v = prompt(
        `這個字根的專屬門檻（全域 ${data.meta.merge_threshold || Zigen.SAME_SHAPE}）。\n` +
        '越小越嚴格。留空＝改回用全域門檻。', String(s.thr));
      if (v === null) return;
      if (!v.trim()) delete s.thr;
      else if (!isNaN(+v)) s.thr = +v;
      touch(); render();
    };
    c.append(t);
  }

  if (s.alts && s.alts.length) {
    const v = el('span', 'alt', `+${s.alts.length}`);
    v.title = `已合併 ${s.alts.length} 個同形變體 —— 比對時都算這個字根\n點擊可拆開`;
    v.onclick = () => {
      if (!confirm(`把 ${s.alts.length} 個變體拆回獨立的字根？`)) return;
      const L2 = data.letters.find(x => x.intentions.some(it => it.shapes.includes(s)));
      const it = L2.intentions.find(it => it.shapes.includes(s));
      for (const a of s.alts) it.shapes.push({ glyph: a, ex: a.src, count: 1, seen: [a.src] });
      delete s.alts;
      touch(); render();
    };
    c.append(v);
  }

  /* 學來的字根：出現次數 + 出現過的字；點次數可把它移到別的意圖 */
  if (s.count) {
    const n = el('span', 'cnt', `×${s.count}`);
    n.title = `出現於：${(s.seen || []).join(' ')}\n點擊可移到其他意圖`;
    n.onclick = () => moveShape(arr, i, s, L, it);
    c.append(n);
  }

  const set = el('span', 'set', SETS[s.set || 'both']);
  set.title = '適用字集（繁簡／繁／簡）';
  set.onclick = () => {
    const order = ['both', 'trad', 'simp'];
    s.set = order[(order.indexOf(s.set || 'both') + 1) % 3];
    if (s.set === 'both') delete s.set;
    touch(); render();
  };
  c.append(set);

  const tools = el('div', 'tools');
  const u = el('span', 'u', '⚠'); u.title = '待核對';
  u.onclick = () => { s.uncertain = !s.uncertain; if (!s.uncertain) delete s.uncertain; touch(); render(); };
  const x = el('span', 'x', '✕');
  x.onclick = () => deleteShape(arr, i, s, L);
  tools.append(u, x);
  c.append(tools);
  return c;
}

/* 刪字根之前，先看看有沒有字在用它 —— 不然那些字的碼就變成孤兒 */
async function deleteShape(arr, i, s, L) {
  const letter = L ? L.letter : null;
  const users = s.glyph ? await charsUsing(s, letter) : [];
  if (!users.length) { arr.splice(i, 1); touch(); render(); return; }

  const box = $('#zlist'); box.innerHTML = '';
  $('#ztitle').textContent = `刪除 ${letter} 的這個字根？`;
  $('#zsub').innerHTML =
    `有 <b>${users.length}</b> 個已取碼的字用到它。刪掉字根之後，這些字的碼還是會留著 ${letter}，` +
    '但字根表裡已經沒有這個形狀 —— 它們會在逐字取碼頁顯示「字根比對」警告。<br>' +
    '你可以：維持它們的碼（之後自己處理）、把這一碼改成別的字母、或整碼刪掉。';
  for (const u of users) {
    const g = await Zigen.getGlyph(u.ch);
    const it = el('div', 'zitem');
    const a = el('a', 'zc', u.ch);
    a.href = '/annotate?c=' + encodeURIComponent(u.ch);
    a.target = '_blank';
    a.title = '在逐字取碼頁打開';
    it.append(a);
    const sv = el('span');
    sv.innerHTML = `<svg viewBox="0 0 1024 1024"><g transform="${Shape.SVG_TF}">` +
      g.strokes.map((d, k) =>
        `<path class="${u.seg.strokes.includes(k) ? 'on' : 'off'}" d="${d}"/>`).join('') +
      '</g></svg>';
    it.append(sv);
    it.append(el('span', 'zcd', u.code || ''));
    box.append(it);
  }

  const finish = async mode => {
    $('#zdel').classList.remove('on');
    if (mode === 'cancel') return;

    if (mode === 'reletter' || mode === 'drop') {
      const to = mode === 'reletter'
        ? (prompt(`把這 ${users.length} 個字的這一碼改成哪個字母？`, '') || '').trim().toUpperCase()
        : null;
      if (mode === 'reletter' && !/^[A-Z]$/.test(to)) return;
      const codes = await loadCodes();
      for (const u of users) {
        u.rec.segments = mode === 'reletter'
          ? u.rec.segments.map(sg => sg === u.seg ? { ...sg, letter: to } : sg)
          : u.rec.segments.filter(sg => sg !== u.seg);
        u.rec.code = u.rec.segments.map(sg => sg.letter).join('');
        delete u.rec.final;
      }
      await fetch('/api/codes', { method: 'PUT',
        headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(codes, null, 2) });
      $('#status').textContent = `已更新 ${users.length} 個字`;
      $('#status').className = 'saved';
    }
    arr.splice(i, 1);
    touch(); render();
  };
  $('#zkeep').onclick = () => finish('keep');
  $('#zrelet').onclick = () => finish('reletter');
  $('#zdrop').onclick = () => finish('drop');
  $('#zcancel').onclick = () => finish('cancel');
  $('#zdel').classList.add('on');
}

async function renderSuggestions(box, L, auto) {
  box.innerHTML = '';
  for (const sh of [...auto.shapes]) {
    const sug = await suggestIntention(L, sh);
    if (!sug || sug.d > 0.4) continue;             /* 差太遠就別亂建議 */
    const row = el('div', 'sug');
    const holder = el('span', 'sgly');
    holder.innerHTML = '<svg viewBox="0 0 1024 1024"></svg>';
    getGlyph(sh.glyph.src).then(st => {
      if (st) holder.innerHTML = glyphSvg(st, sh.glyph.strokes);
    });
    row.append(holder);
    const txt = el('span', 'stext');
    const conf = sug.d < 0.2 ? '很像' : sug.d < 0.3 ? '像' : '有點像';
    txt.innerHTML = `建議歸入 <b>「${sug.it.desc}」</b> — ${conf} ${sug.like}` +
      `（距離 ${sug.d.toFixed(2)}）`;
    row.append(txt);
    const yes = el('button', 'mini', '歸入');
    yes.onclick = () => {
      const k = auto.shapes.indexOf(sh);
      if (k >= 0) auto.shapes.splice(k, 1);
      sug.it.shapes.push(sh);
      touch(); render();
    };
    row.append(yes);
    box.append(row);
  }
}

/* 把一個字根移到同一字母下的另一個意圖（學來的字根預設落在「未分類」） */
function moveShape(arr, i, s, L, from) {
  const label = t => TIERS.find(x => x[0] === t)[1];
  const opts = L.intentions.map((it, n) =>
    `${n + 1}. [${label(tierOf(it))}] ${it.desc || (it.auto ? '未分類' : '（未命名）')}`).join('\n');
  const ans = prompt(`把這個字根移到 ${L.letter} 的哪個意圖？（也可以直接用拖的）\n\n${opts}\n\n輸入編號：`);
  if (ans === null) return;
  const target = L.intentions[parseInt(ans, 10) - 1];
  if (!target || target === from) return;
  arr.splice(i, 1);
  target.shapes.push(s);
  touch(); render();
}

/* 手打／手寫加入的字根，若該字有筆畫資料就存成筆畫式（src + 全部筆畫），
   否則只能存 Unicode 字形 —— 那樣不會參與比對與預測。 */
async function pushChar(arr, ch) {
  const st = await getGlyph(ch);
  arr.push(st ? { glyph: { src: ch, strokes: st.map((_, i) => i) }, ex: ch }
              : { z: ch, ex: '', nomatch: true });
}

/* 放置目標：每一列 shapes 登記自己對應的陣列；
   空的等級也給一個放置區（{lazy} —— 真的放東西進來時才建立意圖，免得留下空意圖） */
const zones = new WeakMap();
const dropZone = (row, arr) => { zones.set(row, { arr }); return row; };
const lazyZone = (row, L, tier) => { zones.set(row, { lazy: { L, tier } }); return row; };
function zoneArray(row) {
  const z = zones.get(row);
  if (!z) return null;
  if (z.arr) return z.arr;
  const { L, tier } = z.lazy;
  let bucket = L.intentions.find(i => i.auto && tierOf(i) === tier);
  if (!bucket) { bucket = { desc: '', auto: true, tier, shapes: [] }; L.intentions.push(bucket); }
  return bucket.shapes;
}

/* ---------- 逐組對照：「這個我判成 E，那個你標成 F —— 到底一不一樣？」 ----------
   一次只看一組，兩邊都畫出「當初定義它的那個字」，把該字根的筆畫塗橘色，
   看得到上下文才判斷得了。裁決之後就記住，不再重複問。 */
let reviewIdx = 0;

async function openReview(i) {
  const list = dupCache;
  if (!list.length) { $('#review').classList.remove('on'); return; }
  reviewIdx = Math.max(0, Math.min(i, list.length - 1));
  const g = list[reviewIdx];
  const thr = data.meta.merge_threshold || Zigen.SAME_SHAPE;

  $('#rvtitle').innerHTML =
    `第 <b>${reviewIdx + 1}</b> / ${list.length} 組　—　` +
    `這個形狀你同時放在 ${g.keys.map(k => `<b>${k}</b>`).join(' 和 ')} 底下`;
  $('#rvsub').innerHTML =
    `我看起來它們是同一個形狀（距離 <b>${(g.d || 0).toFixed(3)}</b>，門檻 ${thr}）。` +
    '每張圖是那個字根在「你當初定義它的那個字」裡的位置（橘色）。<br>' +
    '真的是同一個 → 選一個字母統一；你認為不同 → 按「確實不同」，我記住，以後不再問。';

  const box = $('#rvcards'); box.innerHTML = '';
  for (const item of g.shapes) {
    /* 這個字根可以在哪些字裡看到：定義它的那個字 + 所有用到它的字。
       點小字＝大圖換成那個字，並把該字根的筆畫塗橘 —— 看得到它在真實的字裡長怎樣。 */
    const users = await charsUsing(item.s, item.letter);
    const views = [
      { ch: item.s.glyph.src, strokes: item.s.glyph.strokes, tag: '定義來源' },
      ...users
        .filter(u => u.ch !== item.s.glyph.src)
        .map(u => ({ ch: u.ch, strokes: u.seg.strokes, tag: u.code || '' })),
    ];
    let at = 0;

    const card = el('div', 'rvcard');
    const head = el('div', 'rvhead');
    head.append(el('span', 'rvL', item.letter));
    const L = data.letters.find(x => x.letter === item.letter);
    const it = L.intentions.find(i2 => i2.shapes.includes(item.s));
    head.append(el('span', 'rvdesc', it ? (it.desc || '未分類') : ''));
    head.append(el('span', 'rvn', `×${item.s.count || 1}`));
    card.append(head);

    const stage = el('div', 'rvstage');
    const prev = el('button', 'rvarrow', '‹');
    const glyph = el('div', 'rvglyph');
    const next = el('button', 'rvarrow', '›');
    stage.append(prev, glyph, next);
    card.append(stage);

    const cap = el('div', 'rvsrc');
    card.append(cap);

    const chars = el('div', 'rvchars');
    card.append(chars);

    const draw = async () => {
      const v = views[at];
      const gl = await Zigen.getGlyph(v.ch);
      glyph.innerHTML = `<svg viewBox="0 0 1024 1024"><g transform="${Shape.SVG_TF}">` +
        gl.strokes.map((d, k) =>
          `<path class="${v.strokes.includes(k) ? 'on' : 'off'}" d="${d}"/>`).join('') +
        '</g></svg>';
      cap.innerHTML =
        `<b>${v.ch}</b> 第 ${v.strokes.map(k => k + 1).join('、')} 筆` +
        (v.tag ? `　<span class="rvtag">${v.tag}</span>` : '') +
        `　<a href="/annotate?c=${encodeURIComponent(v.ch)}" target="_blank" ` +
        'title="在逐字取碼頁打開">↗</a>' +
        `<span class="rvpos">${at + 1} / ${views.length}</span>`;
      for (const [k, a] of [...chars.children].entries())
        a.classList.toggle('on', k === at);
      prev.disabled = next.disabled = views.length < 2;
    };

    views.forEach((v, k) => {
      const a = el('button', '', v.ch);
      a.title = v.tag ? `${v.ch}　${v.tag}` : v.ch;
      a.onclick = () => { at = k; draw(); };
      chars.append(a);
    });
    prev.onclick = () => { at = (at - 1 + views.length) % views.length; draw(); };
    next.onclick = () => { at = (at + 1) % views.length; draw(); };
    await draw();

    box.append(card);
  }

  const acts = $('#rvacts'); acts.innerHTML = '';
  for (const k of g.keys) {
    const b = el('button', 'primary', `都算 ${k}`);
    b.title = `把另一邊的字根、以及已取碼的字，全部改成 ${k}`;
    b.onclick = async () => { await mergeGroupTo(g, k); afterResolve(); };
    acts.append(b);
  }
  const diff = el('button', '', '確實不同，記住');
  diff.onclick = async () => { await markDistinct(g); afterResolve(); };
  const skip = el('button', '', '先跳過');
  skip.onclick = () => openReview(reviewIdx + 1);
  const close = el('button', '', '關閉');
  close.onclick = () => $('#review').classList.remove('on');
  acts.append(diff, skip, close);

  $('#review').classList.add('on');
}

async function afterResolve() {
  await computeDuplicates();
  render();
  if (dupCache.length) openReview(Math.min(reviewIdx, dupCache.length - 1));
  else {
    $('#review').classList.remove('on');
    $('#status').textContent = '重複都處理完了 ✓';
    $('#status').className = 'saved';
  }
}

async function mergeGroupTo(group, to) {
  for (const item of group.shapes) {
    if (item.letter === to) continue;
    const from = item.letter;
    const L = data.letters.find(x => x.letter === from);
    for (const it of L.intentions) {
      const k = it.shapes.indexOf(item.s);
      if (k < 0) continue;
      it.shapes.splice(k, 1);
      const dest = data.letters.find(x => x.letter === to);
      let bucket = dest.intentions.find(i2 => i2.auto && tierOf(i2) === 'primary');
      if (!bucket) { bucket = { desc: '', auto: true, tier: 'primary', shapes: [] };
                     dest.intentions.push(bucket); }
      bucket.shapes.push(item.s);
      break;
    }
    await reletter([item.s], from, to);        /* 已取碼的字一起改 */
  }
  touch();
}

/* 「確實不同」→ 記住配對；門檻太鬆就提議調緊（這是它從你的裁決學到的） */
async function markDistinct(group) {
  data.meta.distinct = data.meta.distinct || [];
  const keys = group.shapes.map(pairKey);
  for (let i = 0; i < keys.length; i++)
    for (let j = i + 1; j < keys.length; j++) {
      const pair = [keys[i], keys[j]].sort();
      if (!data.meta.distinct.some(x => x[0] === pair[0] && x[1] === pair[1]))
        data.meta.distinct.push(pair);
    }
  /* 只收緊「這兩個字根」，不要動全域門檻 ——
     把全域壓到 0.03 只會讓預測連「日」都認不出來。 */
  if (group.d) {
    const tight = Math.max(0.01, +(group.d * 0.9).toFixed(4));
    for (const item of group.shapes) {
      const cur = item.s.thr;
      if (cur == null || tight < cur) item.s.thr = tight;
    }
    $('#status').textContent = `已把這 ${group.shapes.length} 個字根的門檻收到 ${tight}`;
    $('#status').className = 'saved';
  }
  touch();
}

/* ---------- 哪些已取碼的字用到這個字根？ ---------- */
async function charsUsing(shape, letter) {
  const codes = await loadCodes();
  const thr = data.meta.merge_threshold || Zigen.SAME_SHAPE;
  const forms = [];
  for (const f of [shape.glyph, ...(shape.alts || [])].filter(Boolean)) {
    const g = await Zigen.getGlyph(f.src);
    if (!g) continue;
    const med = f.strokes.map(i => g.medians[i]);
    if (med.some(m => !m)) continue;
    const v = Shape.strokeVec(med);
    if (v) forms.push({ v, n: med.length });
  }
  if (!forms.length) return [];

  const out = [];
  for (const [ch, rec] of Object.entries(codes)) {
    if (!rec.segments) continue;
    const g = await Zigen.getGlyph(ch);
    if (!g) continue;
    for (const sg of rec.segments) {
      if (letter && sg.letter !== letter) continue;
      const v = Shape.strokeVec(sg.strokes.map(i => g.medians[i]));
      if (!v) continue;
      if (forms.some(f => f.n === sg.strokes.length && Shape.dist(v, f.v) < thr)) {
        out.push({ ch, rec, seg: sg, code: rec.code });
        break;
      }
    }
  }
  return out;
}

/* ---------- 建議：這個新字根該歸到哪個意圖？ ----------
   不是猜語意，而是照你已經分好的來學：拿它跟同一字母下、已命名意圖裡的字根
   逐一比形狀，最像的那個意圖就是建議。像到什麼程度也一併寫出來，你自己判斷。 */
let sugLib = null;

async function buildSugLib() {
  const out = [];
  for (const L of data.letters)
    for (const it of L.intentions) {
      if (!it.desc) continue;                     /* 只跟「你命名過的」意圖比 */
      for (const sh of it.shapes) {
        if (!sh.glyph) continue;
        for (const form of [sh.glyph, ...(sh.alts || [])]) {
          const g = await Zigen.getGlyph(form.src);
          if (!g) continue;
          const med = form.strokes.map(i => g.medians[i]);
          if (med.some(m => !m)) continue;
          const v = Shape.strokeVec(med);
          if (v) out.push({ letter: L.letter, it, vec: v, n: med.length,
                            label: `${form.src}[${form.strokes.map(i => i + 1).join('')}]` });
        }
      }
    }
  sugLib = out;
}

async function suggestIntention(L, shape) {
  if (!sugLib) await buildSugLib();
  if (!shape.glyph) return null;
  const g = await Zigen.getGlyph(shape.glyph.src);
  if (!g) return null;
  const med = shape.glyph.strokes.map(i => g.medians[i]);
  if (med.some(m => !m)) return null;
  const v = Shape.strokeVec(med);
  if (!v) return null;

  /* 只跟「同一個字母」底下、你已經命名過的意圖比 —— 
     字根屬於哪個字母是你定的，把它建議到別的字母的意圖只會添亂。 */
  const pool = sugLib.filter(e => e.letter === L.letter);
  if (!pool.length) return null;
  const best = pool.map(e => ({ e, d: Shape.dist(v, e.vec) }))
    .sort((a, b) => a.d - b.d)[0];
  return { it: best.e.it, d: best.d, like: best.e.label };
}

/* ---------- 換了字母 → 已取碼的字要不要一起改？ ----------
   字根從 Y 移到 T，只改字根表是不夠的：那些用了這個字根取碼的字，碼裡還是 Y。
   所以移動後把碼表掃一遍，找出真的用到這個形狀的字，問你要不要一併改。 */
let codesCache = null;
const loadCodes = async () => (codesCache ||= await fetch('/api/codes').then(r => r.json()));

function letterOfArray(arr) {
  for (const L of data.letters)
    for (const it of L.intentions) if (it.shapes === arr) return L.letter;
  return null;
}
function letterOfZone(zone) {
  const z = zones.get(zone);
  return z && z.lazy ? z.lazy.L.letter : null;
}

/* 這些形狀（含變體）的向量 */
async function vecsOf(shapes) {
  const out = [];
  for (const s of shapes) {
    if (!s.glyph) continue;
    for (const form of [s.glyph, ...(s.alts || [])]) {
      const g = await Zigen.getGlyph(form.src);
      if (!g) continue;
      const med = form.strokes.map(i => g.medians[i]);
      if (med.some(m => !m)) continue;
      const v = Shape.strokeVec(med);
      if (v) out.push({ v, n: med.length });
    }
  }
  return out;
}

async function reletter(shapes, from, to) {
  const vecs = await vecsOf(shapes);
  if (!vecs.length) return;
  const codes = await loadCodes();
  const thr = data.meta.merge_threshold || Zigen.SAME_SHAPE;

  const hits = [];
  for (const [ch, rec] of Object.entries(codes)) {
    if (!rec.segments) continue;
    const g = await Zigen.getGlyph(ch);
    if (!g) continue;
    let changed = false;
    const segs = rec.segments.map(sg => {
      if (sg.letter !== from) return sg;
      const v = Shape.strokeVec(sg.strokes.map(i => g.medians[i]));
      if (!v) return sg;
      const ok = vecs.some(x => x.n === sg.strokes.length && Shape.dist(v, x.v) < thr);
      if (!ok) return sg;
      changed = true;
      return { ...sg, letter: to };
    });
    if (changed) hits.push({ ch, rec, segs });
  }
  if (!hits.length) return;

  const sample = hits.slice(0, 12).map(h => h.ch).join('');
  const more = hits.length > 12 ? ` 等 ${hits.length} 個字` : '';
  if (!confirm(
      `這個字根從 ${from} 改成 ${to}。\n\n` +
      `有 ${hits.length} 個已取碼的字用到它（${sample}${more}），` +
      `它們的碼裡還是 ${from}。\n\n要一併把這些字的碼改成 ${to} 嗎？\n\n` +
      `（選「取消」的話碼表不動，但那些字會在逐字取碼頁顯示「字根比對」警告。）`)) return;

  for (const h of hits) {
    h.rec.segments = h.segs;
    h.rec.code = h.segs.map(s => s.letter).join('');
    delete h.rec.final;                       /* 由完整碼現算，不留舊值 */
  }
  const r = await fetch('/api/codes', { method: 'PUT',
    headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(codes, null, 2) });
  $('#status').textContent = r.ok ? `已更新 ${hits.length} 個字的碼` : '碼表更新失敗';
  $('#status').className = r.ok ? 'saved' : 'dirty';
}

/* ---------- 合併字根：你認為是同一個形狀的，就併成一條 ----------
   併起來之後，被併掉的形狀變成該字根的「變體」(alts)，比對時一樣算數 —— 
   所以合併不是丟掉資料，而是告訴系統「這幾個形狀是同一個字根」。 */
const picked = new Set();
let pickLetter = null;

function togglePick(letter, s) {
  if (pickLetter && letter !== pickLetter) { picked.clear(); }   /* 只能合併同一字母底下的 */
  pickLetter = letter;
  picked.has(s) ? picked.delete(s) : picked.add(s);
  if (!picked.size) pickLetter = null;
  render();
}

function renderMergeBar() {
  const bar = $('#mergebar');
  bar.classList.toggle('on', picked.size > 0);
  if (!picked.size) return;
  $('#mergetext').innerHTML = `已選 <b>${picked.size}</b> 個字根（${pickLetter}）`;
  const prev = $('#mergeprev'); prev.innerHTML = '';
  for (const s of picked) {
    const holder = el('span');
    holder.innerHTML = '<svg viewBox="0 0 1024 1024"></svg>';
    if (s.glyph) getGlyph(s.glyph.src).then(st => {
      if (st) holder.innerHTML = glyphSvg(st, s.glyph.strokes);
    });
    prev.append(holder);
  }
  $('#domerge').disabled = picked.size < 2;
}

function mergePicked() {
  if (picked.size < 2) return;
  const list = [...picked];
  /* 代表：出現次數最多的那個（最有代表性）；其餘變成它的變體 */
  list.sort((a, b) => (b.count || 0) - (a.count || 0));
  const keep = list[0], rest = list.slice(1);

  const L = data.letters.find(x => x.letter === pickLetter);
  const nStrokes = s => s.glyph ? s.glyph.strokes.length : 0;
  if (rest.some(s => nStrokes(s) !== nStrokes(keep)) &&
      !confirm('這幾個字根的筆畫數不一樣，確定要當成同一個字根合併？')) return;

  keep.alts = keep.alts || [];
  for (const s of rest) {
    if (s.glyph) keep.alts.push(s.glyph);
    for (const a of s.alts || []) keep.alts.push(a);
    keep.count = (keep.count || 1) + (s.count || 1);
    keep.seen = [...new Set([...(keep.seen || []), ...(s.seen || [])])].slice(0, 24);
    for (const it of L.intentions) {
      const k = it.shapes.indexOf(s);
      if (k >= 0) it.shapes.splice(k, 1);
    }
  }
  picked.clear(); pickLetter = null;
  touch(); render();
}

/* ---------- 拖曳整個意圖：換順序、換等級、換字母 ---------- */
const intentZones = new WeakMap();
const intentZone = (elm, L, tier) => { intentZones.set(elm, { L, tier }); return elm; };

function startIntentDrag(ev, boxEl, fromL, it) {
  ev.preventDefault();
  const x0 = ev.clientX, y0 = ev.clientY;
  let ghost = null, target = null, before = null, scroller = null;

  const move = e => {
    if (!ghost) {
      if (Math.hypot(e.clientX - x0, e.clientY - y0) < 5) return;
      ghost = boxEl.cloneNode(true);
      ghost.classList.add('ghost-intent');
      ghost.style.width = boxEl.offsetWidth + 'px';
      document.body.append(ghost);
      boxEl.classList.add('dragging');
      document.activeElement && document.activeElement.blur();
    }
    ghost.style.left = e.clientX + 'px';
    ghost.style.top = e.clientY + 'px';
    clearInterval(scroller);
    scroller = setInterval(() => edgeScroll(e.clientY), 30);
    ghost.style.display = 'none';
    const under = document.elementFromPoint(e.clientX, e.clientY);
    ghost.style.display = '';

    const hitIntent = under && under.closest('.intent');
    const hitTier = under && under.closest('.tier');
    const zone = (hitIntent && intentZones.has(hitIntent)) ? hitIntent
               : (hitTier && intentZones.has(hitTier)) ? hitTier : null;
    document.querySelectorAll('.tier.drop-i, .intent.drop-i')
      .forEach(x => x.classList.remove('drop-i'));
    intentMarker.remove();
    target = null; before = null;
    if (!zone || zone === boxEl) return;

    const info = intentZones.get(zone);
    target = info;
    if (zone.classList.contains('intent')) {
      /* 落在某個意圖上：看指標在它的上半還是下半，決定插在它前面或後面 */
      const r = zone.getBoundingClientRect();
      before = e.clientY < r.top + r.height / 2 ? zone : zone.nextElementSibling;
      zone.parentNode.insertBefore(intentMarker, before);
    } else {
      zone.classList.add('drop-i');
      const last = [...zone.querySelectorAll(':scope > .intent')].pop();
      zone.insertBefore(intentMarker, last ? last.nextSibling : zone.querySelector('.mini'));
      before = null;
    }
  };

  const up = () => {
    document.removeEventListener('pointermove', move);
    document.removeEventListener('pointerup', up);
    clearInterval(scroller);
    ghost && ghost.remove();
    intentMarker.remove();
    boxEl.classList.remove('dragging');
    document.querySelectorAll('.tier.drop-i, .intent.drop-i')
      .forEach(x => x.classList.remove('drop-i'));
    if (!ghost || !target) return;

    const { L: toL, tier } = target;
    const fromLetter = fromL.letter, toLetter = toL.letter;
    const moved = [...it.shapes];
    fromL.intentions.splice(fromL.intentions.indexOf(it), 1);
    it.tier = tier;
    if (it.auto && toL !== fromL) delete it.auto;
    /* 插在同等級的第幾個意圖之前（沒有就放到該等級最後） */
    const sibs = toL.intentions.filter(x => (x.tier || 'primary') === tier);
    let at = toL.intentions.length;
    if (before && before.classList && before.classList.contains('intent')) {
      const idx = [...before.parentNode.querySelectorAll(':scope > .intent')].indexOf(before);
      const anchor = sibs[idx];
      if (anchor) at = toL.intentions.indexOf(anchor);
    }
    toL.intentions.splice(at, 0, it);
    touch(); render();
    if (fromLetter !== toLetter) reletter(moved, fromLetter, toLetter);
  };
  document.addEventListener('pointermove', move);
  document.addEventListener('pointerup', up);
}
const intentMarker = (() => { const m = document.createElement('div');
  m.className = 'ins-intent'; return m; })();

/* 指標落在這一列的第幾個位置（chip 是 flex-wrap，先比 y 再比 x） */
function insertIndex(row, x, y) {
  const chips = [...row.querySelectorAll('.chip')].filter(c => !c.classList.contains('dragging'));
  for (let k = 0; k < chips.length; k++) {
    const r = chips[k].getBoundingClientRect();
    if (y < r.bottom && x < r.left + r.width / 2) return k;
  }
  return chips.length;
}

/* 插入位置的指示線 */
let marker = null;
function showMarker(row, at) {
  if (!marker) { marker = el('div', 'ins'); }
  if (!row || at < 0) { marker.remove(); return; }
  const chips = [...row.querySelectorAll('.chip')].filter(c => !c.classList.contains('dragging'));
  if (at >= chips.length) row.insertBefore(marker, row.querySelector('.addbtns'));
  else row.insertBefore(marker, chips[at]);
}

/* 拖曳時靠近視窗上下緣就自動捲動（字母卡片很長，不然拖不過去） */
function edgeScroll(y) {
  const M = 90, step = 18;
  if (y < M) window.scrollBy(0, -step);
  else if (y > window.innerHeight - M) window.scrollBy(0, step);
}

function startDrag(ev, chipEl, arr, i, s) {
  const x0 = ev.clientX, y0 = ev.clientY;
  let ghost = null, zone = null, at = -1, scroller = null;

  const move = e => {
    if (!ghost) {
      if (Math.hypot(e.clientX - x0, e.clientY - y0) < 5) return;   /* 還算點擊 */
      ghost = chipEl.cloneNode(true);
      ghost.classList.add('ghost');
      document.body.append(ghost);
      chipEl.classList.add('dragging');
      document.activeElement && document.activeElement.blur();
    }
    e.preventDefault();
    ghost.style.left = e.clientX + 'px';
    ghost.style.top = e.clientY + 'px';
    clearInterval(scroller);
    scroller = setInterval(() => edgeScroll(e.clientY), 30);
    ghost.style.display = 'none';
    const under = document.elementFromPoint(e.clientX, e.clientY);
    ghost.style.display = '';
    const row = under && under.closest('.shapes');
    if (row !== zone) {
      zone && zone.classList.remove('drop');
      zone = row && zones.has(row) ? row : null;      /* 同一列也可以，用來重新排序 */
      zone && zone.classList.add('drop');
    }
    at = zone ? insertIndex(zone, e.clientX, e.clientY) : -1;
    showMarker(zone, at);
  };
  const up = () => {
    document.removeEventListener('pointermove', move);
    document.removeEventListener('pointerup', up);
    clearInterval(scroller);
    ghost && ghost.remove();
    showMarker(null, -1);
    chipEl.classList.remove('dragging');
    zone && zone.classList.remove('drop');
    if (ghost && zone && at >= 0) {
      const dest = zoneArray(zone);
      if (!dest) return;
      const from = letterOfArray(arr), to = letterOfArray(dest) || letterOfZone(zone);
      /* 先移除再插入；同一列時，移除會讓後面的位置往前挪一格 */
      arr.splice(i, 1);
      const k = dest === arr && at > i ? at - 1 : at;
      dest.splice(Math.min(k, dest.length), 0, s);
      touch();
      render();
      if (from && to && from !== to) reletter([s], from, to);   /* 換了字母 → 問要不要一併改碼表 */
    }
  };
  document.addEventListener('pointermove', move);
  document.addEventListener('pointerup', up);
}

/* 空等級用的按鈕：真的加東西時才建立意圖 */
function addButtons2(L, tier) {
  const mk = () => {
    let bucket = L.intentions.find(i => i.auto && tierOf(i) === tier);
    if (!bucket) { bucket = { desc: '', auto: true, tier, shapes: [] }; L.intentions.push(bucket); }
    return bucket.shapes;
  };
  const box = el('div', 'addbtns');
  const type = el('input');
  type.placeholder = '＋';
  type.style.cssText = 'width:46px;border:1px dashed var(--line);border-radius:7px;' +
    'background:transparent;color:var(--muted);text-align:center;font-size:16px;padding:3px 0';
  type.onkeydown = async e => {
    if (e.key !== 'Enter' || e.isComposing) return;
    const arr = mk();
    for (const ch of [...type.value.trim()]) await pushChar(arr, ch);
    touch(); render();
  };
  const b1 = el('button', '', '筆'); b1.title = '筆畫選取';
  b1.onclick = () => openPicker(mk(), null);
  const b2 = el('button', '', '✍︎'); b2.title = '手寫辨認';
  b2.onclick = () => openDraw(mk());
  box.append(type, b1, b2);
  return box;
}

function addButtons(arr) {
  const box = el('div', 'addbtns');
  const type = el('input');
  type.placeholder = '＋'; type.title = '打字／貼上 Unicode 字形';
  type.style.cssText = 'width:46px;border:1px dashed var(--line);border-radius:7px;' +
    'background:transparent;color:var(--muted);text-align:center;font-size:16px;padding:3px 0';
  type.onkeydown = async e => {
    if (e.key !== 'Enter' || e.isComposing) return;
    for (const ch of [...type.value.trim()]) await pushChar(arr, ch);
    touch(); render();
  };
  const b1 = el('button', '', '筆'); b1.title = '筆畫選取（無 Unicode 的字根）';
  b1.onclick = () => openPicker(arr, null);
  const b2 = el('button', '', '✍︎'); b2.title = '手寫辨認';
  b2.onclick = () => openDraw(arr);
  box.append(type, b1, b2);
  return box;
}

function editable(cls, val, onchange) {
  const s = el('span', cls, val);
  s.contentEditable = 'true'; s.spellcheck = false;
  s.onblur = () => onchange(s.textContent.trim());
  s.onkeydown = e => { if (e.key === 'Enter' && !e.isComposing) { e.preventDefault(); s.blur(); } };
  return s;
}

/* 右側 A–Z：點一下跳到那個字母（沒字根的淡一點） */
function renderJump() {
  const nav = $('#jump'); nav.innerHTML = '';
  for (const L of data.letters) {
    const n = L.intentions.reduce((k, it) => k + it.shapes.length, 0);
    const a = el('a', n ? 'has' : 'empty', L.letter);
    a.href = '#';
    a.title = n ? `${L.letter}：${n} 個字根` : `${L.letter}：還沒有字根`;
    a.onclick = ev => {
      ev.preventDefault();
      const card = [...document.querySelectorAll('.card, .row')]
        .find(c => c.querySelector('.key')?.textContent === L.letter);
      card?.scrollIntoView({ behavior: 'smooth', block: 'center' });
      card?.animate([{ outline: '2px solid var(--accent)' }, { outline: '2px solid transparent' }],
        { duration: 1200 });
    };
    nav.append(a);
  }
}

function renderStats() {
  const sh = allShapes();
  const dup = duplicates();
  const uses = sh.reduce((n, x) => n + (x.s.count || 0), 0);
  const byTier = t => sh.filter(x => x.tier === t).length;
  $('#stats').innerHTML =
    `字根 <b>${sh.length}</b>（優 <b>${byTier('primary')}</b> ·` +
    ` 次 <b>${byTier('secondary')}</b> · 三 <b>${byTier('tertiary')}</b>）　` +
    `累計指派 <b>${uses}</b>　` +
    `意圖 <b>${data.letters.reduce((n, L) => n + L.intentions.filter(i => !i.auto).length, 0)}</b>　` +
    `重複 <b style="color:var(--dupe)">${dup.length}</b>`;
}

/* 重複的字根：面板只放一條橫幅，細節交給「逐組檢視」的對照視窗 ——
   一次看一組、看得到形狀在原字裡的位置，才有辦法真的裁決。 */
async function renderDupes(dup) {
  const box = $('#dupes');
  box.innerHTML = '';
  if (!dup.length) return;
  const panel = el('div', 'dupe-panel');
  panel.innerHTML =
    `<b>字根重複 ${dup.length} 組</b>` +
    '<span class="hint">同一個形狀掛在不同字母下，取碼會有歧義。' +
    '一組一組看，決定它們到底是同一個、還是真的不同。</span>';
  const go = el('button', 'primary', `逐組檢視（${dup.length}）`);
  go.onclick = () => openReview(0);
  panel.append(go);
  box.append(panel);
}

/* ====================== modal: stroke picker ====================== */
let targetArr = null, editing = null, srcStrokes = null, sel = [];

function showPane(which) {
  $('#paneStroke').classList.toggle('on', which === 'stroke');
  $('#paneDraw').classList.toggle('on', which === 'draw');
  $('#tabStroke').classList.toggle('on', which === 'stroke');
  $('#tabDraw').classList.toggle('on', which === 'draw');
}
$('#tabStroke').onclick = () => showPane('stroke');
$('#tabDraw').onclick = () => showPane('draw');

async function openPicker(arr, shape) {
  targetArr = arr; editing = shape;
  $('#modal').classList.add('on'); showPane('stroke');
  const src = shape && shape.glyph ? shape.glyph.src : '';
  $('#srcIn').value = src;
  sel = shape && shape.glyph ? [...shape.glyph.strokes] : [];
  await loadSrc(src);
  $('#addStroke').textContent = editing ? '更新字根' : '加入字根';
  if (!src) $('#srcIn').focus();
}

async function loadSrc(c) {
  const grid = $('#strokeGrid'); grid.innerHTML = ''; srcStrokes = null;
  $('#preview').innerHTML = '';
  if (!c) { $('#srcMsg').textContent = ''; return; }
  const st = await getGlyph(c);
  if (!st) { $('#srcMsg').textContent = '沒有筆畫資料'; return; }
  srcStrokes = st;
  $('#srcMsg').textContent = `${st.length} 筆`;
  st.forEach((d, i) => {
    const b = el('div', 'sk' + (sel.includes(i) ? ' sel' : ''));
    b.innerHTML = `<svg viewBox="0 0 1024 1024"><g transform="${SVG_TF}">` +
      st.slice(0, i).map(p => `<path class="prev" d="${p}"/>`).join('') +
      `<path class="this" d="${d}"/></g></svg><b>${i + 1}</b>`;
    b.onclick = () => {
      const k = sel.indexOf(i);
      k < 0 ? sel.push(i) : sel.splice(k, 1);
      sel.sort((a, b) => a - b);
      loadSrc(c);
    };
    grid.append(b);
  });
  $('#preview').outerHTML = glyphSvg(st, sel, '').replace('<svg', '<svg id="preview"');
}
$('#srcIn').oninput = e => {
  const c = [...e.target.value.trim()][0] || '';
  if (c) { sel = []; loadSrc(c); }
};
$('#addStroke').onclick = () => {
  const c = [...$('#srcIn').value.trim()][0];
  if (!c || !srcStrokes || !sel.length) return;
  const shape = { glyph: { src: c, strokes: [...sel] }, ex: (editing && editing.ex) || c };
  if (editing) { delete editing.z; delete editing.glyph; delete editing.uncertain;
                 Object.assign(editing, shape); }
  else targetArr.push(shape);
  touch(); $('#modal').classList.remove('on'); render();
};

/* ====================== modal: handwriting ====================== */
let inventory = null, strokes = [], cur = null;
const RANGES = [[0x31C0, 0x31E3], [0x2E80, 0x2EF3], [0x2F00, 0x2FD5], [0x3105, 0x312F]];
const EXTRA =
  'マミムメモユヨワフノヘレ' +
  '一丨丿丶乙乚亅二三十丁厂匚卜厶又口囗土士夂夕大女子宀寸小尢尸屮山川工己巾干幺广廴廾弋弓彐彡彳' +
  '心忄戈戶手扌支攴文斗斤方无日曰月木欠止歹殳毋比毛氏气水氵火灬爪父爻爿片牙牛犬犭玄玉王瓜瓦甘生用田' +
  '疋疒癶白皮皿目矛矢石示礻禸禾穴立竹米糸糹缶网罒羊羽老而耒耳聿肉臣自至臼舌舛舟艮色艸艹虍虫血行衣衤' +
  '襾見角言谷豆豕豸貝赤走足身車辛辰辵邑酉釆里金長門阜隶隹雨青非面革韋韭音頁風飛食首香馬骨高髟鬥鬯鬲' +
  '鬼魚鳥鹵鹿麥麻黃黍黑黹黽鼎鼓鼠鼻齊齒龍龜龠' +
  /* 簡體字根：偏旁與簡化部件 */
  '讠饣纟钅门贝见车页风马鸟鱼龙齿齐长东两卡义为学兴𰃦㣺灬钅铁银' +
  '亼亽𠆢𠂉冂冖凵刀刂力勹匕卩叀彑巛幵廿卅丬凸凹丩乇丰亍亠丆';

function buildInventory(status) {
  const set = new Set();
  for (const [a, b] of RANGES) for (let c = a; c <= b; c++) set.add(String.fromCodePoint(c));
  for (const ch of EXTRA) set.add(ch);
  for (const { s } of allShapes()) if (s.z) for (const ch of [...s.z]) set.add(ch);
  const ctx = Shape.scratch(), tofu = Shape.tofuVec(ctx), inv = [];
  for (const ch of set) {
    const v = Shape.fromChar(ch, ctx);
    if (!v) continue;                                   /* 字型沒有此字 */
    if (tofu && Shape.dist(v, tofu) < 0.06) continue;   /* 畫成豆腐框 */
    inv.push({ ch, vec: v });
  }
  if (status) status.textContent = `字形庫 ${inv.length} 個`;
  return inv;
}

const pad = $('#pad'), pctx = pad.getContext('2d', { willReadFrequently: true });
function drawPad() {
  const cs = getComputedStyle(document.body);
  pctx.clearRect(0, 0, 240, 240);
  pctx.strokeStyle = cs.getPropertyValue('--line'); pctx.lineWidth = 1; pctx.setLineDash([4, 4]);
  pctx.beginPath(); pctx.moveTo(120, 0); pctx.lineTo(120, 240);
  pctx.moveTo(0, 120); pctx.lineTo(240, 120); pctx.stroke(); pctx.setLineDash([]);
  pctx.strokeStyle = pctx.fillStyle = cs.getPropertyValue('--ink');
  pctx.lineWidth = 9; pctx.lineCap = pctx.lineJoin = 'round';
  for (const st of strokes) {
    if (st.length < 2) { pctx.beginPath(); pctx.arc(st[0].x, st[0].y, 4.5, 0, 7); pctx.fill(); continue; }
    pctx.beginPath(); pctx.moveTo(st[0].x, st[0].y);
    for (const p of st.slice(1)) pctx.lineTo(p.x, p.y);
    pctx.stroke();
  }
}
const posOf = e => { const r = pad.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; };
pad.addEventListener('pointerdown', e => { pad.setPointerCapture(e.pointerId); cur = [posOf(e)]; strokes.push(cur); drawPad(); });
pad.addEventListener('pointermove', e => { if (cur) { cur.push(posOf(e)); drawPad(); } });
pad.addEventListener('pointerup', () => { cur = null; recognize(); });

function padFeature() {
  if (!strokes.length) return null;
  const cv = document.createElement('canvas'); cv.width = cv.height = 240;
  const c = cv.getContext('2d', { willReadFrequently: true });
  c.strokeStyle = c.fillStyle = '#000'; c.lineWidth = 9; c.lineCap = c.lineJoin = 'round';
  for (const st of strokes) {
    if (st.length < 2) { c.beginPath(); c.arc(st[0].x, st[0].y, 4.5, 0, 7); c.fill(); continue; }
    c.beginPath(); c.moveTo(st[0].x, st[0].y);
    for (const p of st.slice(1)) c.lineTo(p.x, p.y);
    c.stroke();
  }
  return Shape.featurize(c.getImageData(0, 0, 240, 240));
}
function recognize() {
  const box = $('#cands'); box.innerHTML = '';
  const v = padFeature();
  if (!v || !inventory) return;
  for (const t of Shape.topMatches(v, inventory, 18)) {
    const b = el('div', 'cand');
    b.append(el('div', 'g', t.ch));
    b.append(el('div', 's', 'U+' + t.ch.codePointAt(0).toString(16).toUpperCase()));
    b.onclick = () => pick(t.ch);
    box.append(b);
  }
}
function openDraw(arr) {
  targetArr = arr; editing = null; strokes = []; cur = null;
  $('#cands').innerHTML = ''; $('#manual').value = '';
  $('#modal').classList.add('on'); showPane('draw'); drawPad();
  if (!inventory) {
    $('#recog-status').textContent = '建立字形庫…';
    setTimeout(() => { inventory = buildInventory($('#recog-status')); }, 30);
  } else $('#recog-status').textContent = `字形庫 ${inventory.length} 個`;
}
async function pick(ch) {
  if (!targetArr) return;
  for (const c of [...ch]) await pushChar(targetArr, c);
  touch(); $('#modal').classList.remove('on'); render();
}
$('#undo').onclick = () => { strokes.pop(); drawPad(); recognize(); };
$('#clear').onclick = () => { strokes = []; drawPad(); $('#cands').innerHTML = ''; };
$('#closeModal').onclick = () => $('#modal').classList.remove('on');
$('#useManual').onclick = () => { const v = $('#manual').value.trim(); if (v) pick(v); };
$('#modal').onclick = e => { if (e.target.id === 'modal') $('#modal').classList.remove('on'); };

/* ============================== io ============================== */
async function save() {
  codesCache = null;
  sugLib = null;
  $('#status').textContent = '儲存中…';
  const r = await fetch('/api/zigen', { method: 'PUT',
    headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data, null, 2) });
  if (r.ok) { dirty = false; $('#status').textContent = '已儲存 ✓'; $('#status').className = 'saved'; }
  else { $('#status').textContent = '儲存失敗'; $('#status').className = 'dirty'; }
}
function exportTxt() {
  const out = [`# ${data.meta.name} 字根表 v${data.meta.version}`, ''];
  const show = s => (s.z || `${s.glyph.src}[${s.glyph.strokes.map(n => n + 1).join('')}]`) +
    (s.ex ? `(${s.ex})` : '');
  for (const L of data.letters) {
    out.push(L.letter);
    L.intentions.forEach((it, i) => {
      out.push(`  ${i + 1}. ${it.desc}`);
      out.push('     ' + it.shapes.map(show).join('  '));
    });
    if (L.secondary.length) out.push('  [次等] ' + L.secondary.map(show).join(' '));
    if (L.tertiary.length) out.push('  [三等] ' + L.tertiary.map(show).join(' '));
    out.push('');
  }
  const a = el('a');
  a.href = URL.createObjectURL(new Blob([out.join('\n')], { type: 'text/plain' }));
  a.download = 'zigen.txt'; a.click();
}
$('#save').onclick = save;
$('#export').onclick = exportTxt;
$('#compact').onclick = () => {
  compact = !compact;
  $('#compact').classList.toggle('primary', compact);
  render();
};
$('#domerge').onclick = mergePicked;
$('#cancelmerge').onclick = () => { picked.clear(); pickLetter = null; render(); };
$('#q').oninput = render;
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 's') { e.preventDefault(); save(); }
  if (e.key === 'Escape') $('#modal').classList.remove('on');
});
/* 合併門檻：決定「逐字取碼」把多相似的筆畫組合視為同一字根 */
const thr = $('#thr'), thrv = $('#thrv');
thr.oninput = () => {
  data.meta.merge_threshold = +thr.value;
  thrv.textContent = (+thr.value).toFixed(3);
  touch();
};

/* 與「逐字取碼」頁互通：對方學到新字根時自動重載 */
let stamp = null;
const fetchStamp = () => fetch('/api/state').then(r => r.json()).then(s => s.zigen);
setInterval(async () => {
  if (dirty) return;
  const s = await fetchStamp();
  if (s === stamp) return;
  stamp = s;
  data = await fetch('/api/zigen').then(r => r.json());
  sugLib = null;
  render();
  $('#status').textContent = '已同步 ↻'; $('#status').className = 'saved';
}, 3000);

setInterval(() => { if (dirty) save(); }, 15000);
window.onbeforeunload = e => { if (dirty) return e.returnValue = '有未儲存的修改'; };
Promise.all([fetch('/api/zigen').then(r => r.json()), fetchStamp()]).then(([d, s]) => {
  data = d; stamp = s;
  thr.value = data.meta.merge_threshold || 0.25;
  thrv.textContent = (+thr.value).toFixed(3);
  render();
});
