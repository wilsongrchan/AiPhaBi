<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>愛發筆 — 逐字取碼</title>
<style>
  :root {
    --bg:#faf9f7; --card:#fff; --ink:#1c1a17; --muted:#7c7568; --line:#e3ded4;
    --accent:#b4531f; --warn:#d98324; --ok:#2e7d4f; --ghost:#cfc8bb; --bad:#c0392b;
    --prev:#9a9287;        /* 已寫下的筆畫／已略過的筆畫：實心灰，不是半透明 */
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#16150f; --card:#1f1e18; --ink:#ece7dc; --muted:#9a9284; --line:#33312a;
            --accent:#e0894f; --warn:#e0a95c; --ok:#6bbd8e; --ghost:#4a463c; --bad:#e57373;
            --prev:#8b8478; }
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); height:100vh; display:flex;
    flex-direction:column; font:15px/1.5 -apple-system,"PingFang TC","Helvetica Neue",sans-serif; }
  header { display:flex; align-items:center; gap:12px; padding:10px 18px;
    border-bottom:1px solid var(--line); flex-wrap:wrap; }
  h1 { font-size:16px; margin:0; font-weight:650; }
  nav { display:flex; gap:5px; }
  nav a { font-size:13px; color:var(--muted); text-decoration:none; padding:4px 9px;
    border:1px solid var(--line); border-radius:7px; }
  nav a.on { color:#fff; background:var(--accent); border-color:var(--accent); }
  .grow { flex:1; }
  button { font:inherit; font-size:13px; padding:6px 12px; border-radius:7px;
    border:1px solid var(--line); background:var(--card); color:var(--ink); cursor:pointer; }
  button:hover { border-color:var(--accent); color:var(--accent); }
  button.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
  button.primary:hover { color:#fff; opacity:.9; }
  button:disabled { opacity:.4; cursor:default; }
  #status { font-size:13px; color:var(--muted); min-width:64px; }
  #status.saved { color:var(--ok); } #status.dirty { color:var(--warn); }
  .prog { font-size:12px; color:var(--muted); }
  .prog b { color:var(--ink); }

  .cols { flex:1; display:grid; grid-template-columns:225px 1fr 330px; min-height:0; }
  .pane { padding:12px 14px; overflow:auto; }
  .pane + .pane { border-left:1px solid var(--line); }

  #search { width:100%; padding:6px 9px; border:1px solid var(--line); border-radius:7px;
    background:var(--card); color:var(--ink); font-size:14px; margin-bottom:8px; }
  .filters { display:flex; gap:4px; margin-bottom:8px; }
  .filters button { flex:1; padding:4px; font-size:12px; }
  .filters button.on { background:var(--accent); border-color:var(--accent); color:#fff; }
  .qlist { display:grid; grid-template-columns:repeat(auto-fill,minmax(50px,1fr)); gap:5px; }
  .qi { border:1px solid var(--line); border-radius:8px; background:var(--card); cursor:pointer;
    text-align:center; padding:3px 1px 2px; }
  .qi:hover { border-color:var(--accent); }
  .qi.on { border-color:var(--accent); background:color-mix(in srgb,var(--accent) 12%,transparent); }
  .qi .c { font-size:22px; font-family:"PingFang TC","Songti TC",serif; line-height:1.1; }
  .qi .cd { font:600 10px ui-monospace,monospace; color:var(--accent); min-height:13px; }
  .qi.todo .cd { color:var(--ghost); }
  .qi.warn { border-color:var(--bad);
    background:color-mix(in srgb, var(--bad) 10%, transparent); }
  .qi.warn .cd { color:var(--bad); }
  .qi.warn::after { content:"⚠"; position:absolute; top:-5px; right:-4px; font-size:9px;
    color:var(--bad); background:var(--card); border:1px solid var(--bad); border-radius:50%;
    width:13px; height:13px; line-height:11px; }
  .qi { position:relative; }

  .stage { display:flex; flex-direction:column; align-items:center; gap:9px; }
  #glyph { width:min(400px,46vh); height:min(400px,46vh); border:1px solid var(--line);
    border-radius:14px; background:var(--card); }
  /* 透明粗描邊把命中區域加寬，細筆畫才好點 */
  #glyph path { cursor:pointer; transition:fill .08s; stroke:transparent; stroke-width:26; }
  #glyph path.un { fill:var(--ghost); }
  #glyph path.un:hover { fill:var(--muted); }
  #glyph path.sel { fill:var(--accent); }
  #glyph path.skip { fill:var(--prev); opacity:1; }   /* 略過：灰色實心，一眼看得出 */
  #glyph path.hl { stroke:var(--accent); stroke-width:34; stroke-opacity:.35; }
  .so-row { margin-bottom:8px; }
  .so-t { font-size:11px; color:var(--muted); display:flex; gap:6px; align-items:baseline; }
  .so-t b { color:var(--ink); font-weight:600; }
  .so-g { display:flex; flex-wrap:wrap; gap:3px; margin-top:3px; }
  .so-s { width:34px; height:34px; border:1px solid var(--line); border-radius:5px;
    background:var(--card); position:relative; }
  .so-s svg { width:100%; height:100%; }
  .so-s .p { fill:var(--prev); opacity:1; }   /* 已寫下的筆畫 */
  .so-s .c { fill:var(--accent); }
  .so-s i { position:absolute; top:0; left:2px; font:600 8px ui-monospace,monospace;
    color:var(--muted); font-style:normal; }
  .so-miss { font-size:11px; color:var(--muted); }
  .so-miss a { color:var(--accent); }
  /* 官方倉頡對照 */
  .cj { display:flex; gap:5px; flex-wrap:wrap; align-items:center; }
  .cj .k { display:flex; flex-direction:column; align-items:center; gap:1px;
    border:1px solid var(--line); border-radius:7px; padding:2px 7px 1px; background:var(--card); }
  .cj .k .r { font-size:21px; line-height:1.1; font-family:"PingFang TC","Songti TC",serif; }
  .cj .k .l { font:700 10px ui-monospace,monospace; color:var(--accent); }
  .cj .code { font:700 13px ui-monospace,monospace; color:var(--muted); margin-left:4px; }
  .cj .none { font-size:11px; color:var(--muted); }
  .cjmap { margin-top:6px; }
  .cjimg { width:150px; height:150px; border:1px solid var(--line); border-radius:9px;
    background:#000; display:block; }
  .cjtoggle { padding:2px 7px; font-size:11px; color:var(--muted); }
  .cjnote { font-size:11px; color:var(--muted); margin-top:3px; line-height:1.45; }
  .cjnote b { color:var(--ink); }
  #glyph .grid { stroke:var(--line); stroke-dasharray:8 8; stroke-width:2; fill:none; }
  #glyph text { font:600 34px ui-monospace,monospace; fill:var(--muted); pointer-events:none; opacity:.5; }
  .cur { font-size:15px; color:var(--muted); display:flex; gap:10px; align-items:baseline; }
  .cur b { font-size:22px; color:var(--ink); font-family:"PingFang TC",serif; }
  .hintbar { font-size:12px; color:var(--muted); text-align:center; max-width:520px; }
  kbd { border:1px solid var(--line); border-bottom-width:2px; border-radius:4px; padding:0 4px;
    font:600 11px ui-monospace,monospace; }

  /* 預測 */
  .pred { width:100%; max-width:520px; border:1px solid var(--line); border-radius:10px;
    background:var(--card); padding:8px 11px; }
  .pred .t { font-size:11px; color:var(--muted); letter-spacing:.06em; display:flex; gap:8px;
    align-items:center; }
  .pred .opts { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
  .po { display:flex; align-items:center; gap:7px; border:1px solid var(--line); border-radius:8px;
    padding:4px 9px; background:var(--bg); cursor:pointer; }
  .po:hover { border-color:var(--accent); }
  .po .c { font:700 17px ui-monospace,monospace; color:var(--accent); letter-spacing:.08em; }
  .po .m { font-size:10px; color:var(--muted); }

  .sugg { display:flex; gap:5px; flex-wrap:wrap; margin:6px 0 2px; min-height:26px; }
  .sg { display:flex; align-items:center; gap:5px; border:1px solid var(--line); border-radius:8px;
    padding:3px 8px; background:var(--card); cursor:pointer; }
  .sg:hover { border-color:var(--accent); }
  .sg .L { font:700 16px ui-monospace,monospace; color:var(--accent); }
  .sg .m { font-size:10px; color:var(--muted); }
  .newz { font-size:12px; color:var(--muted); }
  .newz b { color:var(--warn); }

  .code { font:700 30px/1.2 ui-monospace,Menlo,monospace; letter-spacing:.1em; color:var(--accent);
    min-height:38px; word-break:break-all; display:flex; align-items:baseline;
    flex-wrap:wrap; gap:6px; }
  .code .full { font-size:19px; color:var(--muted); letter-spacing:.06em; }
  .code .arrow { font-size:15px; color:var(--muted); }
  .code .short { color:var(--accent); }
  .seg { display:flex; align-items:center; gap:8px; border:1px solid var(--line);
    border-radius:9px; padding:5px 8px; background:var(--card); margin-bottom:5px; }
  .seg .no { flex:none; width:18px; height:18px; border-radius:50%; color:#fff;
    font:700 10px/18px ui-monospace,monospace; text-align:center; }
  .seg svg { width:34px; height:34px; flex:none; }
  .seg.hl { border-color:var(--accent); background:color-mix(in srgb,var(--accent) 8%,transparent); }
  .seg svg .on { fill:var(--ink); } .seg svg .off { fill:var(--ghost); opacity:.3; }
  .seg input { width:34px; text-align:center; font:700 17px ui-monospace,monospace;
    text-transform:uppercase; border:1px solid var(--line); border-radius:6px; padding:2px;
    background:var(--bg); color:var(--accent); }
  .seg .n { font-size:11px; color:var(--muted); flex:1; }
  .seg .mv { cursor:pointer; color:var(--muted); font-size:12px; }
  .seg .mv:hover { color:var(--accent); }
  .lbl { font-size:11px; color:var(--muted); letter-spacing:.06em; margin:12px 0 4px; }
  .ref { font-size:12px; color:var(--muted); }
  .ref b { color:var(--warn); font-family:ui-monospace,monospace; }
  .ref .good { color:var(--ok); } .ref .bad { color:var(--dupe,#c0392b); }
  .clash { margin-top:6px; font-size:12px; line-height:1.5; padding:6px 9px; border-radius:8px;
    border:1px solid var(--bad,#c0392b); color:var(--ink);
    background:color-mix(in srgb, var(--bad,#c0392b) 8%, transparent); }
  .clash code { font:700 12px ui-monospace,monospace; color:var(--bad,#c0392b); }
  .chk { display:flex; gap:7px; align-items:flex-start; font-size:12px; line-height:1.5;
    padding:6px 8px; border-radius:8px; border:1px solid var(--line); margin-bottom:5px;
    background:var(--card); }
  .chk .ic { flex:none; font-size:11px; width:14px; text-align:center; }
  .chk.warn { border-color:var(--warn); }
  .chk.warn .ic { color:var(--warn); }
  .chk.info .ic { color:var(--muted); }
  .chk.ok { border-color:var(--ok); color:var(--muted); }
  .chk.ok .ic { color:var(--ok); }
  .chk .body { flex:1; }
  .chk b { color:var(--ink); }
  .chk .rule { color:var(--muted); font-size:11px; }
  .chk .act { flex:none; display:flex; gap:4px; }
  .chk .act button { padding:1px 6px; font-size:11px; }
  .chk .act button.apply { border-color:var(--accent); color:var(--accent); font-weight:600; }
  .chk .act button.apply:hover { background:var(--accent); color:#fff; }
  .chk.muted { opacity:.5; }
  .clash .ch { font-size:17px; font-family:"PingFang TC",serif; }
  /* 新字根 → 其他字要不要跟著改 */
  #propagate { position:fixed; inset:0; background:rgba(0,0,0,.45); display:none;
    place-items:center; z-index:80; }
  #propagate.on { display:grid; }
  .psheet { background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:16px 18px; width:min(620px,94vw); max-height:82vh; display:flex; flex-direction:column; }
  .psheet h3 { margin:0 0 3px; font-size:15px; }
  .psub { font-size:12px; color:var(--muted); margin-bottom:10px; line-height:1.5; }
  .plist { overflow:auto; flex:1; }
  .pitem { display:flex; align-items:center; gap:9px; padding:6px 4px;
    border-bottom:1px solid var(--line); }
  .pitem .c { font-size:22px; font-family:"PingFang TC",serif; width:26px; text-align:center; }
  .pitem svg { width:34px; height:34px; }
  .pitem svg .on { fill:var(--accent); } .pitem svg .off { fill:var(--ghost); opacity:.35; }
  .pitem .cd { font:700 13px ui-monospace,monospace; color:var(--muted); }
  .pitem .cd b { color:var(--accent); }
  .pitem .arrow { color:var(--muted); font-size:12px; }
  .prow { display:flex; gap:6px; align-items:center; margin-top:10px; }

  textarea { width:100%; border:1px solid var(--line); border-radius:7px; background:var(--card);
    color:var(--ink); padding:5px 8px; font:inherit; font-size:13px; min-height:40px; resize:vertical; }
</style>
</head>
<body>
<header>
  <h1>愛發筆</h1>
  <nav><a href="/">字根表</a><a href="/annotate" class="on">逐字取碼</a><a href="/stats">碼表分析</a><a href="/rules">取碼原則</a></nav>
  <div class="grow"></div>
  <span class="prog" id="prog"></span>
  <span class="prog" id="libinfo"></span>
  <span id="status">載入中…</span>
  <button id="export">匯出碼表</button>
</header>

<div id="propagate">
  <div class="psheet">
    <h3 id="ptitle"></h3>
    <div class="psub" id="psub"></div>
    <div class="plist" id="plist"></div>
    <div class="prow">
      <button id="pall">全選</button>
      <button id="pnone">全不選</button>
      <div class="grow"></div>
      <button id="pskip">維持原樣</button>
      <button class="primary" id="papply">套用勾選的</button>
    </div>
  </div>
</div>

<div class="cols">
  <div class="pane">
    <input id="search" placeholder="搜尋／跳到某字">
    <div class="filters">
      <button data-f="todo" class="on">未取碼</button>
      <button data-f="done">已取碼</button>
      <button data-f="all">全部</button>
    </div>
    <div class="qlist" id="qlist"></div>
    <div style="text-align:center;margin-top:8px"><button id="more">載入更多</button></div>
  </div>

  <div class="pane stage">
    <div class="cur" id="cur"></div>
    <svg id="glyph" viewBox="0 0 1024 1024"></svg>

    <div class="pred">
      <div class="t">
        <span id="predtitle">預測拆解（依你已建立的字根）</span>
        <span class="grow"></span>
        <button id="repredict" style="padding:2px 8px;font-size:11px">重新預測</button>
      </div>
      <div class="opts" id="predopts"><span class="newz">字根表還是空的 — 先手動取幾個字，我就能開始預測。</span></div>
    </div>

    <div class="hintbar">
      點筆畫 → 按 <kbd>A</kbd>–<kbd>Z</kbd> 指派字母，即成一個字根（並自動寫入字根表）。
      <kbd>space</kbd> 略過選取的筆畫（孤筆略過原則）　<kbd>/</kbd> 顯示筆順
      <kbd>⌫</kbd> 刪最後字根　<kbd>esc</kbd> 清除選取／全部清除　<kbd>enter</kbd> 儲存並下一字
    </div>
    <div style="display:flex;gap:6px">
      <button id="skipSel">略過選取 ␣</button>
      <button id="clearSel">清除選取</button>
      <button id="undoSeg">刪最後字根</button>
      <button id="clearAll">全部清除</button>
      <button id="nums">顯示筆順 /</button>
      <button class="primary" id="saveNext">儲存並下一字 ⏎</button>
    </div>
  </div>

  <div class="pane">
    <div class="lbl">取碼</div>
    <div class="code" id="code">—</div>
    <div class="ref" id="ref"></div>
    <div class="clash" id="clash" style="display:none"></div>

    <div class="lbl">選取中的筆畫</div>
    <div class="sugg" id="sugg"></div>
    <div class="newz" id="newz"></div>

    <div class="lbl">已取字根（按筆順）</div>
    <div id="segs"></div>

    <div class="lbl">檢查</div>
    <div id="checks"></div>

    <div class="lbl">備註</div>
    <textarea id="note" placeholder="例外／約定原則…"></textarea>

    <div class="lbl">官方倉頡（對照）</div>
    <div id="cj"></div>

    <div class="lbl">官方筆順參考</div>
    <div id="so"></div>
  </div>
</div>

<script src="/assets/shape.js"></script>
<script src="/assets/zigen.js"></script>
<script>
const $ = s => document.querySelector(s);
const el = (t, c, x) => { const e = document.createElement(t);
  if (c) e.className = c; if (x != null) e.textContent = x; return e; };

let order = [], codes = {}, zigen = null, lib = [], rules = null, learned = { stroke_kinds: [] };
let cur = '', strokes = [], medians = [], sel = [], segs = [], skipped = [], showNums = false;
let filter = 'todo', shown = 120, dirty = false, zigenDirty = false, stamp = null;

const touch = () => { dirty = true; $('#status').textContent = '未儲存'; $('#status').className = 'dirty'; };

/* 筆型：先看你糾正過的（learned），再看幾何 */
const kindOf = m => Zigen.strokeKind(m, learned.stroke_kinds);

async function teachKind(strokeIdx, kind) {
  const v = Shape.strokeVec([medians[strokeIdx]]);
  if (!v) return;
  learned.stroke_kinds.push({ vec: [...v], kind, from: cur, stroke: strokeIdx + 1 });
  await fetch('/api/learned', { method: 'PUT',
    headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(learned, null, 2) });
  $('#status').textContent = `已學會：這種筆是「${kind}」`;
  $('#status').className = 'saved';
  renderSegs(); predict(); auditAll();
}

/* 取碼原則（/rules 頁可改）— 只有 kind=enforced 且啟用的才會影響預測 */
const rule = id => {
  const r = rules && rules.rules.find(x => x.id === id);
  return r && r.enabled && r.kind === 'enforced' ? r : null;
};
const maxLen = () => (rule('max_code_length')?.params?.max) || zigen.meta.max_code_length || 4;

/* ---------- 畫字 ---------- */
function drawGlyph() {
  const g = $('#glyph');
  g.innerHTML = '<rect class="grid" x="2" y="2" width="1020" height="1020" rx="20"/>' +
    '<line class="grid" x1="512" y1="2" x2="512" y2="1022"/>' +
    '<line class="grid" x1="2" y1="512" x2="1022" y2="512"/>';
  const gg = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  gg.setAttribute('transform', Shape.SVG_TF);
  const segOf = i => segs.findIndex(s => s.strokes.includes(i));
  strokes.forEach((d, i) => {
    const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    p.setAttribute('d', d);
    const si = segOf(i);
    if (si >= 0) { p.setAttribute('fill', hue(si)); p.setAttribute('class', 'asg'); }
    else if (skipped.includes(i)) p.setAttribute('class', 'skip');
    else p.setAttribute('class', sel.includes(i) ? 'sel' : 'un');
    gg.append(p);
  });
  g.append(gg);
  /* 命中判定用「離哪一筆的中線最近」，不靠 SVG 疊放次序：
     十 的橫與豎交叉，靠圖形疊放會永遠點到後畫的那一筆。 */
  g.onclick = ev => {
    const i = nearestStroke(ev);
    if (i < 0 || segOf(i) >= 0) return;
    const sk = skipped.indexOf(i);
    if (sk >= 0) { skipped.splice(sk, 1); touch(); drawGlyph(); renderCode(); return; }
    const k = sel.indexOf(i);
    k < 0 ? sel.push(i) : sel.splice(k, 1);
    sel.sort((a, b) => a - b);
    drawGlyph(); suggest();
  };
  if (showNums) strokes.forEach((d, i) => {
    const c = pathCenter(d);
    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t.setAttribute('x', c.x); t.setAttribute('y', 900 - c.y + 12);
    t.setAttribute('text-anchor', 'middle'); t.textContent = i + 1;
    g.append(t);
  });
}
/* 把點擊位置換算到筆畫座標系，回傳中線最近的那一筆 */
function nearestStroke(ev) {
  const g = $('#glyph'), grp = g.querySelector('g');
  if (!grp || !medians.length) return -1;
  const pt = g.createSVGPoint();
  pt.x = ev.clientX; pt.y = ev.clientY;
  const q = pt.matrixTransform(grp.getScreenCTM().inverse());
  let best = -1, bd = Infinity;
  medians.forEach((m, i) => {
    for (let k = 0; k < m.length; k++) {
      const d = k === 0 ? Math.hypot(m[0][0] - q.x, m[0][1] - q.y)
                        : segDist(q, m[k - 1], m[k]);
      if (d < bd) { bd = d; best = i; }
    }
  });
  return bd < 90 ? best : -1;          /* 離所有筆畫都太遠 → 當作沒點到 */
}
function segDist(p, a, b) {
  const vx = b[0] - a[0], vy = b[1] - a[1];
  const L = vx * vx + vy * vy;
  const t = L ? Math.max(0, Math.min(1, ((p.x - a[0]) * vx + (p.y - a[1]) * vy) / L)) : 0;
  return Math.hypot(p.x - (a[0] + t * vx), p.y - (a[1] + t * vy));
}

const HUES = [18, 200, 140, 280, 45, 330, 95, 250];
const hue = i => `hsl(${HUES[i % HUES.length]} 62% 45%)`;
function pathCenter(d) {
  let n = 0, sx = 0, sy = 0;
  for (const m of d.matchAll(/(-?\d+(?:\.\d+)?)\s+(-?\d+(?:\.\d+)?)/g)) { sx += +m[1]; sy += +m[2]; n++; }
  return n ? { x: sx / n, y: sy / n } : { x: 512, y: 450 };
}
function subSvg(list) {
  let x0 = 1e9, y0 = 1e9, x1 = -1e9, y1 = -1e9;
  for (const i of list) for (const m of strokes[i].matchAll(/(-?\d+(?:\.\d+)?)\s+(-?\d+(?:\.\d+)?)/g)) {
    const x = +m[1], y = 900 - +m[2];
    if (x < x0) x0 = x; if (x > x1) x1 = x; if (y < y0) y0 = y; if (y > y1) y1 = y;
  }
  const p = 70, w = x1 - x0 + p * 2, h = y1 - y0 + p * 2, m = Math.max(w, h);
  const box = x1 < x0 ? '0 0 1024 1024'
    : `${x0 - p - (m - w) / 2} ${y0 - p - (m - h) / 2} ${m} ${m}`;
  return `<svg viewBox="${box}"><g transform="${Shape.SVG_TF}">` +
    strokes.map((d, i) => `<path class="${list.includes(i) ? 'on' : 'off'}" d="${d}"/>`).join('') +
    '</g></svg>';
}

/* ---------- 選取中的筆畫：既有字根建議 ---------- */
/* 建議字母：不是只看「最像的那一個字根」，而是拿你過去所有的指派來投票。
   每個字根按「有多像」和「你用過幾次」加權 —— 你把小點一直指派給 Q、
   把捺一直指派給 L，票就會越來越倒向你自己的習慣。 */
function suggest() {
  const box = $('#sugg'), nz = $('#newz');
  box.innerHTML = ''; nz.textContent = '';
  if (!sel.length) { box.innerHTML = '<span class="newz">先點選筆畫…</span>'; return; }
  const vec = Shape.strokeVec(sel.map(i => medians[i]));
  if (!vec) return;
  const thr = zigen.meta.merge_threshold || Zigen.SAME_SHAPE;

  const near = lib.filter(e => e.n === sel.length)
    .map(e => ({ e, d: Shape.dist(vec, e.vec) }))
    .sort((a, b) => a.d - b.d)
    .slice(0, 8);                                   /* 最像的幾個，一起投票 */

  const votes = new Map();
  for (const m of near) {
    const w = (1 / (m.d + 0.03)) * Math.sqrt(m.e.shape.count || 1);
    const v = votes.get(m.e.letter) || { letter: m.e.letter, w: 0, best: m };
    v.w += w;
    if (m.d < v.best.d) v.best = m;
    votes.set(m.e.letter, v);
  }
  const ranked = [...votes.values()].sort((a, b) => b.w - a.w).slice(0, 5);
  const total = ranked.reduce((n, v) => n + v.w, 0) || 1;

  for (const v of ranked) {
    const b = el('div', 'sg');
    b.append(el('span', 'L', v.letter));
    const pct = Math.round(v.w / total * 100);
    b.append(el('span', 'm', `${v.best.e.label}　${pct}%`));
    b.title = `最近的距離 ${v.best.d.toFixed(3)}　（依你過去的指派加權）`;
    b.onclick = () => commit(v.letter);
    box.append(b);
  }

  const top = ranked[0];
  const topThr = top && top.best.e.shape && top.best.e.shape.thr != null
    ? top.best.e.shape.thr : thr;
  if (!top || top.best.d >= topThr) {
    nz.innerHTML = '<b>新字根</b> — 按任一字母鍵，這個形狀就會加入該字母的字根表。';
  } else if (ranked.length > 1 && ranked[1].w / total > 0.3) {
    /* 兩個字母都很有話講 → 這正是 L 還是 Q 那種需要你裁決的情況 */
    nz.innerHTML = `<b>拿不定</b>：<b>${ranked[0].letter}</b> 與 <b>${ranked[1].letter}</b> ` +
      `都很像（${ranked[0].best.d.toFixed(3)} / ${ranked[1].best.d.toFixed(3)}）。你選哪個，我就往哪邊學。`;
  } else {
    nz.textContent = `與 ${top.letter} 的既有字根同形（距離 ${top.best.d.toFixed(3)}）。`;
  }
}

/* ---------- 指派 ---------- */
function commit(letter) {
  if (!sel.length) return;
  segs.push({ strokes: [...sel], letter: letter.toUpperCase() });
  sel = [];
  touch(); drawGlyph(); renderSegs(); suggest();
  predict();                     /* 立刻預測剩下的筆畫 */
}
/* 孤筆略過原則：選取的筆畫不取碼（例：無法與人成根的一橫一豎） */
function skipSelected() {
  if (!sel.length) return;
  skipped = [...new Set([...skipped, ...sel])].sort((a, b) => a - b);
  sel = [];
  touch(); drawGlyph(); renderSegs(); suggest();
  predict();
}
function renderSegs() {
  const box = $('#segs'); box.innerHTML = '';
  segs.forEach((s, i) => {
    const d = el('div', 'seg');
    d.dataset.i = i;
    const no = el('div', 'no', String(i + 1));       /* 序號＝警告訊息裡的「第 N 個字根」 */
    no.style.background = hue(i);
    d.append(no);
    const sv = el('div'); sv.innerHTML = subSvg(s.strokes);
    d.append(sv);
    const inp = el('input'); inp.value = s.letter; inp.maxLength = 1;
    inp.oninput = () => { s.letter = inp.value.toUpperCase(); touch(); renderCode(); };
    d.append(inp);
    d.append(el('span', 'n', `第 ${s.strokes.map(n => n + 1).join(',')} 筆`));
    const up = el('span', 'mv', '↑');
    up.onclick = () => { if (i > 0) { [segs[i - 1], segs[i]] = [segs[i], segs[i - 1]]; touch(); drawGlyph(); renderSegs(); } };
    const x = el('span', 'mv', '✕');
    x.onclick = () => { segs.splice(i, 1); touch(); drawGlyph(); renderSegs(); };
    d.append(up, x);
    box.append(d);
  });
  renderCode();
  renderChecks();
}
/* 打字實際要按的碼：超過上限時取前 head 碼 + 尾 tail 碼 */
const finalOf = code => Zigen.shorten(code, rules && rules.rules.find(r =>
  r.id === 'max_code_length' && r.enabled && r.kind === 'enforced'));

function renderCode() {
  const code = segs.map(s => s.letter).join('');
  const fin = finalOf(code);
  const max = maxLen();
  const cut = code.length > max;

  /* 完整碼保留在畫面上（看得到拆解），箭頭後是實際要按的碼 */
  $('#code').innerHTML = !code ? '—'
    : cut ? `<span class="full">${code}</span><span class="arrow">→</span>` +
            `<span class="short">${fin}</span>`
          : code;
  $('#code').classList.toggle('cut', cut);

  const left = strokes.length - segs.reduce((n, s) => n + s.strokes.length, 0) - skipped.length;
  const bits = [];
  if (cut) {
    /* 講出「實際的」縮碼規則，不要自己猜 head/tail —— 你在取碼原則頁改成
       「前 3 碼 + 末 2 碼」，這裡就該這樣說。 */
    const r = rule('max_code_length');
    const head = r?.params?.head ?? Math.max(1, max - 1);
    const tail = r?.params?.tail ?? 1;
    bits.push(`<span style="color:var(--warn)">${code.length} 碼超過上限 ${max}</span>` +
      `　取前 ${head} 碼` + (tail ? `加末 ${tail} 碼` : '') +
      ` → <b style="color:var(--accent)">${fin}</b>`);
  }
  if (skipped.length) bits.push(`略過 ${skipped.length} 筆`);
  bits.push(left ? `尚有 ${left} 筆未指派`
    : '<span style="color:var(--ok)">全部筆畫已處理</span>');
  $('#ref').innerHTML = bits.join('　');

  /* 重碼提醒：以「實際要按的碼」判斷，不是完整碼 */
  const clash = fin ? Object.entries(codes)
    .filter(([ch, r]) => ch !== cur && r.code && finalOf(r.code) === fin).map(([ch]) => ch) : [];
  const w = $('#clash');
  if (clash.length) {
    w.style.display = 'block';
    w.innerHTML = `⚠ <b>重碼</b>：<code>${fin}</code> 已經是 ` +
      clash.map(ch => `<span class="ch">${ch}</span>`).join('、') +
      ` 的碼。可以接受（打字時多選一次），或改用別的拆法／字根。`;
  } else w.style.display = 'none';
}

/* ---------- 檢查：這個拆解有沒有違反已訂的原則 ----------
   每一條都可以「忽略」——記在該字的 overrides 裡，下次不再提醒。 */
function bestMatch(strokeIdx, letter, med = medians) {
  const vec = Shape.strokeVec(strokeIdx.map(i => med[i]));
  if (!vec) return null;
  const pool = lib.filter(e => e.n === strokeIdx.length &&
    (letter === undefined || e.letter === letter));
  let best = null;
  for (const e of pool) {
    const d = Shape.dist(vec, e.vec);
    if (!best || d < best.d) best = { d, e };
  }
  return best;
}

/* ctx = {segs, skipped, medians, nStrokes} —— 目前這個字，或佇列裡任何一個字 */
function checks(ctx) {
  const { segs, skipped, medians, nStrokes } = ctx;
  const bestMatch2 = (idx, letter) => bestMatch(idx, letter, medians);
  const out = [];
  const thr = zigen.meta.merge_threshold || Zigen.SAME_SHAPE;
  /* 每個字根有自己的門檻（你說過「這不是 X」就會收緊）—— 檢查必須照它的，
     不然收緊了警告還在，等於沒學到。 */
  const thrOf = e => (e && e.shape && e.shape.thr != null) ? e.shape.thr : thr;
  const on = id => rules && rules.rules.find(r =>
    r.id === id && r.enabled && r.kind === 'enforced');
  const TIER_NAME = { primary: '優等', secondary: '次等', tertiary: '三等' };

  /* 1. 筆順原則：字根要按首筆先後排列 */
  if (on('stroke_order') && segs.length > 1) {
    const firsts = segs.map(s => Math.min(...s.strokes));
    const sorted = [...firsts].every((v, i) => i === 0 || firsts[i - 1] <= v);
    if (!sorted) out.push({ key: 'order', lvl: 'warn', rule: '筆順原則',
      msg: '字根沒有按首筆先後排列。' });
  }

  segs.forEach((sg, i) => {
    const mine = bestMatch2(sg.strokes, sg.letter);
    const any = bestMatch2(sg.strokes);

    /* 2. 這組筆畫跟你選的字母的既有字根對不上，但很像別的字母的字根 */
    if (any && any.d < thrOf(any.e) && (!mine || mine.d >= thrOf(mine.e)) &&
        any.e.letter !== sg.letter) {
      out.push({ key: `letter:${i}`, lvl: 'warn', rule: '字根比對', refs: [i],
        fix: { type: 'letter', i, to: any.e.letter,
               label: `改成 ${any.e.letter}` },
        reject: { letter: any.e.letter, zlabel: any.e.label, strokes: sg.strokes },
        msg: `第 ${i + 1} 個字根指派給 <b>${sg.letter}</b>，但它的形狀跟 ` +
             `<b>${any.e.letter}</b> 的既有字根 ${any.e.label} 幾乎一樣（距離 ${any.d.toFixed(3)}）。` });
    }
    /* 3. 全新的形狀：不是錯，只是提醒會新增一條字根 */
    else if (!mine || mine.d >= thrOf(mine.e)) {
      out.push({ key: `new:${i}`, lvl: 'info', rule: '新字根', refs: [i],
        msg: `第 ${i + 1} 個字根（${sg.letter}）是新形狀，儲存後會在 ${sg.letter} 底下新增一條字根。` });
    }
    /* 3b. 併進了既有字根 —— 但只是「勉強算同一個」的話，你有權不同意。
           不然它會悄悄被算成別的字根，字根表上只多一個計次，你根本看不到。 */
    else if (mine.d > thrOf(mine.e) * 0.35) {
      out.push({ key: `absorb:${i}`, lvl: 'info', rule: '併入既有字根', refs: [i],
        split: { i, letter: sg.letter, strokes: sg.strokes },
        msg: `第 ${i + 1} 個字根（${sg.letter}）會<b>併入既有字根 ${mine.e.label}</b>` +
             `（距離 ${mine.d.toFixed(3)}，門檻 ${thrOf(mine.e)}）—— ` +
             '不是新字根，字根表上只會多一個計次。如果你覺得這是不同的形狀，請另立新字根。' });
    }

    /* 4. 優次等原則：用了次／三等，但同一組筆畫也配得上某個優等字根。
          只有在那個優等字根屬於「別的字母」時才要緊 —— 同一個字母的話，
          取到哪一條字根都是同一個碼，沒有任何影響，不該拿來煩你。 */
    if (on('tier_priority') && mine && mine.d < thrOf(mine.e) && mine.e.tier !== 'primary') {
      const better = lib.filter(e => e.n === sg.strokes.length && e.tier === 'primary' &&
                                     e.letter !== sg.letter)
        .map(e => ({ e, d: Shape.dist(Shape.strokeVec(sg.strokes.map(k => medians[k])), e.vec) }))
        .filter(x => x.d < thrOf(x.e)).sort((a, b) => a.d - b.d)[0];
      if (better) out.push({ key: `tier:${i}`, lvl: 'warn', rule: '優次等原則', refs: [i],
        fix: { type: 'letter', i, to: better.e.letter,
               label: `改成 ${better.e.letter}` },
        reject: { letter: better.e.letter, zlabel: better.e.label, strokes: sg.strokes },
        msg: `第 ${i + 1} 個字根用的是 <b>${TIER_NAME[mine.e.tier]}</b>字根 ${mine.e.label}` +
             `（取 <b>${sg.letter}</b>），但同一組筆畫也配得上<b>優等</b>字根 ` +
             `${better.e.label}（取 <b>${better.e.letter}</b>）—— 碼會不一樣。` });
    }
  });

  /* 5. 能合不分：相鄰兩個字根若能併成一個既有字根，就不該分兩碼。
        編號用 segs 陣列裡的實際位置 —— 畫面上的序號是那個，不是筆順排序後的位置。 */
  if (on('merge_over_split')) {
    const order = segs.map((s, i) => ({ s, i }))
      .sort((a, b) => Math.min(...a.s.strokes) - Math.min(...b.s.strokes));
    for (let k = 0; k + 1 < order.length; k++) {
      const a = order[k], b = order[k + 1];
      const union = [...a.s.strokes, ...b.s.strokes].sort((x, y) => x - y);
      const m = bestMatch2(union);
      if (m && m.d < thrOf(m.e)) out.push({ key: `merge:${a.i}-${b.i}`, lvl: 'warn',
        rule: '能合不分原則', refs: [a.i, b.i],
        fix: { type: 'merge', a: a.i, b: b.i, to: m.e.letter,
               label: `合併成一個 ${m.e.letter}` },
        reject: { letter: m.e.letter, zlabel: m.e.label, strokes: union },
        msg: `第 ${a.i + 1}、${b.i + 1} 個字根合起來剛好是既有字根 ${m.e.label}` +
             `（<b>${m.e.letter}</b>）—— 可以一碼取盡，不必分兩碼。` });
    }
  }

  /* 6b. 孤筆略過原則：中途落單的橫／豎不該自己取一碼，應該略過 */
  const sk0 = on('skip_isolated_hv');
  if (sk0) segs.forEach((sg, i) => {
    if (sg.strokes.length !== 1) return;
    const st = sg.strokes[0];
    const kind = kindOf(medians[st]);
    if (!sk0.params.allow.includes(kind)) return;
    if (st === nStrokes - 1) return;                 /* 末筆有例外，另一條檢查管 */
    out.push({ key: `lone:${i}`, lvl: 'warn', rule: '孤筆略過原則', refs: [i],
      teach: { stroke: st, kind },
      fix: { type: 'skip', i, stroke: st, label: '略過這一筆' },
      msg: `第 ${i + 1} 個字根只有一筆（${kind}），而且不是末筆。` +
           `依原則，無法與其他筆畫組成字根的孤立${kind}應該<b>略過</b>，不取碼。` });
  });

  /* 6. 孤筆略過原則：只有指定的筆畫可以略過；末筆孤立的橫應取指定字母 */
  const sk = on('skip_isolated_hv');
  if (sk) for (const i of skipped) {
    const kind = kindOf(medians[i]);
    if (!sk.params.allow.includes(kind)) {
      out.push({ key: `skip:${i}`, lvl: 'warn', rule: '孤筆略過原則', strokeRefs: [i],
        msg: `第 ${i + 1} 筆是「${kind}」，不在可略過的筆畫（${sk.params.allow.join('、')}）之內。` });
    } else {
      const map = sk.params.last_stroke_letters ||
        (sk.params.last_stroke_letter ? { 橫: sk.params.last_stroke_letter } : {});
      const L = map[kind];
      if (L && i === nStrokes - 1)
        out.push({ key: `skiplast:${i}`, lvl: 'warn', rule: '孤筆略過原則', strokeRefs: [i],
          fix: { type: 'unskip', stroke: i, to: L, label: `改取 ${L}` },
          msg: `末筆是孤立的${kind}，依原則應取 <b>${L}</b>，不是略過。` });
    }
  }
  return out;
}

/* 「這其實不是 X」—— 把那個字根的門檻收緊到「配不上這組筆畫」為止。
   這不是把警告關掉而已：以後任何字裡，離它這麼遠的形狀都不會再被當成它。
   （字根的專屬門檻，不動全域，也不影響別的字根。） */
async function rejectMatch(r) {
  const vec = Shape.strokeVec(r.strokes.map(i => medians[i]));
  if (!vec) return;
  const globalThr = zigen.meta.merge_threshold || Zigen.SAME_SHAPE;
  const thrOf = e => (e.shape.thr != null) ? e.shape.thr : globalThr;

  /* 「這不是 X」＝ 這個字母底下，任何一個字根都不該配上這組筆畫。
     只收緊剛好被點名的那一個是不夠的：同一個字母常常有好幾個同筆數的字根
     （X 的 後[789] 與 戰[131415] 都是三筆），收緊一個，另一個馬上頂上來，
     警告看起來就「按了也不會消失」。所以要把「現在配得上的」全部收緊。 */
  const hits = lib
    .filter(e => e.letter === r.letter && e.n === r.strokes.length)
    .map(e => ({ e, d: Shape.dist(vec, e.vec) }))
    .filter(x => x.d < thrOf(x.e));
  if (!hits.length) {
    alert(`${r.letter} 底下已經沒有字根配得上這組筆畫了。`);
    return;
  }

  /* 收緊之後，本來靠這些字根取碼的字會不會配不上？先算給你看 */
  const casualties = new Set();
  const plans = [];
  for (const { e, d } of hits) {
    const cur = thrOf(e);
    const tight = Math.max(0.005, +(d * 0.9).toFixed(4));
    if (tight >= cur) continue;
    plans.push({ e, tight, cur, d });
    for (const [ch, rec] of Object.entries(codes)) {
      if (!rec.segments) continue;
      const g = await Zigen.getGlyph(ch);
      if (!g) continue;
      for (const sg of rec.segments) {
        if (sg.letter !== r.letter || sg.strokes.length !== e.n) continue;
        const v = Shape.strokeVec(sg.strokes.map(i => g.medians[i]));
        if (!v) continue;
        const dd = Shape.dist(v, e.vec);
        if (dd < cur && dd >= tight) { casualties.add(ch); break; }
      }
    }
  }
  if (!plans.length) { alert('不需要再收緊。'); return; }

  const cas = [...casualties];
  const msg =
    `把 ${r.letter} 底下這 ${plans.length} 個字根的門檻收緊，` +
    '以後都不會再把這組筆畫當成它們：\n\n' +
    plans.map(p => `　${p.e.label}：${p.cur} → ${p.tight}（這組筆畫距離 ${p.d.toFixed(3)}）`).join('\n') +
    '\n\n' +
    (cas.length
      ? `注意：有 ${cas.length} 個已取碼的字（${cas.slice(0, 10).join('')}${
          cas.length > 10 ? '…' : ''}）本來就是靠這些字根配上的，收緊之後會配不上，` +
        '會在佇列裡顯示警告。\n\n要繼續嗎？'
      : '沒有已取碼的字會受影響。');
  if (!confirm(msg)) return;

  for (const p of plans) p.e.shape.thr = p.tight;
  zigenDirty = true;
  await save();
  await resyncZigen();
  $('#status').textContent = `學會了：這不是 ${r.letter}`;
  $('#status').className = 'saved';
}

/* 改完字根表之後，一律從伺服器讀回再重建字根庫 —— 
   不然畫面會停在舊的比對結果（收緊了門檻，檢查卻還在講舊的字根）。 */
async function resyncZigen() {
  zigen = await fetch('/api/zigen').then(r => r.json());
  stamp = await fetchStamp();
  lib = await Zigen.buildLibrary(zigen);
  libInfo();
  renderSegs(); suggest(); predict(); auditAll();
}

/* 「這是不同的形狀，另立新字根」——
   把該字母底下所有「現在配得上它」的字根都收緊（不然收緊一個、另一個馬上頂上來），
   並把這個字從它們的例字／計次裡拿掉，然後重存 —— merge() 找不到對象，就會新增一條。 */
async function splitOutZigen(r) {
  const vec = Shape.strokeVec(r.strokes.map(i => medians[i]));
  if (!vec) return;
  const globalThr = zigen.meta.merge_threshold || Zigen.SAME_SHAPE;
  const thrOf = e => (e.shape.thr != null) ? e.shape.thr : globalThr;

  const hits = lib
    .filter(e => e.letter === r.letter && e.n === r.strokes.length)
    .map(e => ({ e, d: Shape.dist(vec, e.vec) }))
    .filter(x => x.d < thrOf(x.e));
  if (!hits.length) { alert('它本來就不會併入任何字根。'); return; }

  const plans = hits.map(({ e, d }) => ({
    e, d, cur: thrOf(e), tight: Math.max(0.005, +(d * 0.9).toFixed(4)),
  })).filter(p => p.tight < p.cur);
  if (!plans.length) { alert('不需要再收緊。'); return; }

  if (!confirm(
      `把「${cur}」的這組筆畫獨立成 ${r.letter} 的新字根。\n\n` +
      `同時收緊這些既有字根的門檻，免得它又被吸回去：\n` +
      plans.map(p => `　${p.e.label}：${p.cur} → ${p.tight}（距離 ${p.d.toFixed(3)}）`).join('\n') +
      '\n\n要繼續嗎？')) return;

  for (const p of plans) {
    p.e.shape.thr = p.tight;
    /* 這個字本來被算進那條字根，拿回來 */
    if (p.e.shape.seen) p.e.shape.seen = p.e.shape.seen.filter(c => c !== cur);
    if (p.e.shape.count) p.e.shape.count = Math.max(1, p.e.shape.count - 1);
  }
  zigenDirty = true;
  await save();                       /* merge() 這時找不到對象 → 自動新增一條 */
  await resyncZigen();                /* 從伺服器讀回，畫面才不會停在舊狀態 */
  $('#status').textContent = `已另立 ${r.letter} 的新字根`;
  $('#status').className = 'saved';
}

/* 把某一條檢查建議的改法直接套上去 */
function applyFix(f) {
  if (f.type === 'letter') {
    segs[f.i].letter = f.to;
  } else if (f.type === 'merge') {
    const a = segs[f.a], b = segs[f.b];
    const strokes = [...new Set([...a.strokes, ...b.strokes])].sort((x, y) => x - y);
    const keep = Math.min(f.a, f.b), drop = Math.max(f.a, f.b);
    segs[keep] = { strokes, letter: f.to };
    segs.splice(drop, 1);
  } else if (f.type === 'skip') {
    segs.splice(f.i, 1);
    skipped = [...new Set([...skipped, f.stroke])].sort((x, y) => x - y);
  } else if (f.type === 'unskip') {
    skipped = skipped.filter(i => i !== f.stroke);
    segs.push({ strokes: [f.stroke], letter: f.to });
    segs.sort((x, y) => Math.min(...x.strokes) - Math.min(...y.strokes));
  }
  sel = [];
  touch();
  drawGlyph(); renderSegs(); suggest(); predict();
}

function renderChecks() {
  const box = $('#checks'); box.innerHTML = '';
  const rec = codes[cur] || {};
  const ignored = new Set(rec.overrides || []);
  const list = checks({ segs, skipped, medians, nStrokes: strokes.length });
  const active = list.filter(c => !ignored.has(c.key));

  if (!segs.length) { box.innerHTML = '<div class="newz">還沒取碼。</div>'; return; }
  if (!active.length) {
    box.innerHTML = '<div class="chk ok"><span class="ic">✓</span>' +
      '<div class="body">符合目前所有「會執行」的取碼原則。</div></div>';
  }
  for (const c of active) {
    const d = el('div', 'chk ' + c.lvl);
    highlightOn(d, c);
    d.append(el('span', 'ic', c.lvl === 'warn' ? '⚠' : 'ℹ'));
    const body = el('div', 'body');
    body.innerHTML = `${c.msg} <span class="rule">— ${c.rule}</span>`;
    d.append(body);
    if (c.split) {
      const act = el('div', 'act');
      const sp = el('button', 'apply', '另立新字根');
      sp.title = '這是不同的形狀：獨立成一條新字根，並收緊會吸走它的既有字根';
      sp.onclick = () => splitOutZigen(c.split);
      act.append(sp);
      d.append(act);
    }
    if (c.lvl === 'warn') {
      const act = el('div', 'act');
      if (c.fix) {
        const ap = el('button', 'apply', c.fix.label);
        ap.title = '照建議改，碼會跟著更新';
        ap.onclick = () => applyFix(c.fix);
        act.append(ap);
      }
      if (c.reject) {
        const rj = el('button', '', `這不是 ${c.reject.letter}`);
        rj.title = '把那個字根的門檻收緊，以後不會再把這種形狀當成它';
        rj.onclick = () => rejectMatch(c.reject);
        act.append(rj);
      }
      /* 筆型判錯了？教它一次，以後所有字都受用 —— 不必每個字忽略一遍 */
      if (c.teach) {
        const fix = el('button', '', `這不是${c.teach.kind}`);
        fix.title = '糾正筆型，系統會記住這種形狀';
        fix.onclick = async () => {
          const k = prompt(
            `第 ${c.teach.stroke + 1} 筆，系統判成「${c.teach.kind}」。正確是？\n` +
            '（橫／豎／撇／捺／點／折／斜）', '撇');
          if (k && '橫豎撇捺點折斜'.includes(k)) await teachKind(c.teach.stroke, k);
        };
        act.append(fix);
      }
      const ig = el('button', '', '忽略');
      ig.title = '這個字是例外，不用再提醒';
      ig.onclick = async () => {
        rec.overrides = [...(rec.overrides || []), c.key];
        codes[cur] = rec;
        touch(); renderChecks();
        audit.set(cur, await auditChar(cur)); markQueue(cur);
      };
      act.append(ig);
      d.append(act);
    }
    box.append(d);
  }
  /* 已忽略的仍列出來（淡色），可以還原 */
  for (const c of list.filter(c => ignored.has(c.key))) {
    const d = el('div', 'chk muted');
    d.append(el('span', 'ic', '⊘'));
    const body = el('div', 'body');
    body.innerHTML = `${c.msg} <span class="rule">— ${c.rule}（已忽略）</span>`;
    d.append(body);
    const act = el('div', 'act');
    const un = el('button', '', '還原');
    un.onclick = async () => {
      rec.overrides = (rec.overrides || []).filter(k => k !== c.key);
      if (!rec.overrides.length) delete rec.overrides;
      touch(); renderChecks();
      audit.set(cur, await auditChar(cur)); markQueue(cur);
    };
    act.append(un); d.append(act);
    box.append(d);
  }
}

/* 滑過某條警告時，把它講的那幾個字根／筆畫在畫面上點亮 */
function highlightOn(elm, c) {
  const segRefs = c.refs || [];
  const stRefs = c.strokeRefs || segRefs.flatMap(i => segs[i] ? segs[i].strokes : []);
  elm.onmouseenter = () => {
    for (const i of segRefs)
      document.querySelector(`.seg[data-i="${i}"]`)?.classList.add('hl');
    const paths = document.querySelectorAll('#glyph g path');
    for (const i of stRefs) paths[i]?.classList.add('hl');
  };
  elm.onmouseleave = () => {
    document.querySelectorAll('.seg.hl').forEach(x => x.classList.remove('hl'));
    document.querySelectorAll('#glyph path.hl').forEach(x => x.classList.remove('hl'));
  };
}

/* ---------- 整字預測 ---------- */
let predBusy = false;
/* 還沒被指派、也沒被略過的筆畫 */
const restStrokes = () => strokes.map((_, i) => i)
  .filter(i => !segs.some(s => s.strokes.includes(i)) && !skipped.includes(i));

let partial = false;

async function predict() {
  const box = $('#predopts');
  if (!lib.length) {
    box.innerHTML = '<span class="newz">字根表還是空的 — 先手動取幾個字，我就能開始預測。</span>';
    return;
  }
  if (!medians.length || predBusy) return;

  const rest = restStrokes();
  partial = rest.length < strokes.length;      /* 已取了一部分 → 預測「接下來」 */
  $('#predtitle').textContent = partial
    ? `預測接下來的拆解（還剩 ${rest.length} 筆）`
    : '預測拆解（依你已建立的字根）';
  if (!rest.length) {
    box.innerHTML = '<span class="newz" style="color:var(--ok)">所有筆畫都處理完了。</span>';
    return;
  }

  predBusy = true;
  box.innerHTML = '<span class="newz">計算中…</span>';
  await new Promise(r => setTimeout(r, 10));       /* 讓瀏覽器先畫出「計算中」 */

  const thr = zigen.meta.merge_threshold || Zigen.SAME_SHAPE;
  const merge = rule('merge_over_split'), sk = rule('skip_isolated_hv'),
        tp = rule('tier_priority');
  /* 只拿剩下的筆畫去預測；索引壓縮後再映射回原本的筆序 */
  const raw = Zigen.predict(rest.map(i => medians[i]), lib, {
    thr,
    segPenalty: merge ? merge.params.seg_penalty : 0.05,
    skip: sk ? { penalty: sk.params.penalty, allow: sk.params.allow,
                 learned: learned.stroke_kinds,
                 lastLetters: sk.params.last_stroke_letters ||
                   (sk.params.last_stroke_letter ? { 橫: sk.params.last_stroke_letter } : {}) } : null,
    tierPenalty: tp ? (tp.params?.penalty ?? 0.05) : 0,
  });
  const out = raw.map(r => ({
    ...r,
    segments: r.segments.map(sg => ({ ...sg, strokes: sg.strokes.map(k => rest[k]) })),
    skipped: (r.skipped || []).map(k => rest[k]),
  }));

  predBusy = false;
  box.innerHTML = '';
  if (!out.length) {
    box.innerHTML = `<span class="newz">${partial ? '剩下的筆畫' : '這個字'}` +
      '用現有字根還拆不出來。</span>';
    return;
  }
  out.forEach((p, i) => {
    const full = p.covered === p.total;
    const b = el('div', 'po');
    b.append(el('span', 'c', p.segments.map(s => s.letter).join('')));
    b.append(el('span', 'm', (full ? p.segments.map(s => s.label).join(' + ')
      : `部分拆解 ${p.covered}/${p.total} 筆　其餘待你指派`) +
      (p.skipped && p.skipped.length ? `　（略過 ${p.skipped.length} 筆）` : '')));
    b.title = '套用此拆解';
    b.onclick = () => {
      const add = p.segments.map(s => ({ strokes: [...s.strokes], letter: s.letter }));
      segs = partial ? [...segs, ...add] : add;      /* 接續：接在已取的後面 */
      skipped = [...new Set([...(partial ? skipped : []), ...(p.skipped || [])])]
        .sort((a, b) => a - b);
      sel = []; touch(); drawGlyph(); renderSegs(); suggest(); predict();
    };
    box.append(b);
    if (i === 0 && full) b.style.borderColor = 'var(--accent)';
    if (!full) b.style.borderStyle = 'dashed';
  });
}
$('#repredict').onclick = predict;

/* ---------- 載入一個字 ---------- */
async function load(c) {
  cur = c; sel = []; segs = []; skipped = [];
  const g = await Zigen.getGlyph(c);
  if (!g) { $('#cur').textContent = `${c}：沒有筆畫資料`; strokes = []; medians = []; drawGlyph(); return; }
  strokes = g.strokes; medians = g.medians;
  const rec = codes[c];
  if (rec && rec.segments) segs = rec.segments.map(s => ({ strokes: [...s.strokes], letter: s.letter }));
  if (rec && rec.skipped) skipped = [...rec.skipped];
  $('#cur').innerHTML = `<b>${c}</b><span>${strokes.length} 筆</span>`;
  $('#note').value = (rec && rec.note) || '';
  drawGlyph(); renderSegs(); suggest(); renderQueue(); renderCangjie(c); strokeOrder(c);
  if (!segs.length) predict(); else $('#predopts').innerHTML =
    '<span class="newz">此字已有取碼。按「重新預測」可看模型的拆法。</span>';
}

/* ---------- 官方倉頡對照 ----------
   只是拿來比較「別人怎麼拆」，不影響你的取碼。倉頡 24 個字母各對應一個字根，
   所以可以把碼還原成字根（明＝ab＝日月）。 */
const CJ_RADICAL = {
  A: '日', B: '月', C: '金', D: '木', E: '水', F: '火', G: '土', H: '竹',
  I: '戈', J: '十', K: '大', L: '中', M: '一', N: '弓', O: '人', P: '心',
  Q: '手', R: '口', S: '尸', T: '廿', U: '山', V: '女', W: '田', X: '難',
  Y: '卜', Z: '重',
};
let cangjie = null;

/* 倉頡對照：預設收起，點開才載入拆碼圖。
   圖用倉頡字典的原圖，不自己重畫 —— 倉頡常常把「一筆切成兩半」分屬不同碼
   （例：囗的收口筆），我們的筆畫資料根本表達不了，重畫必然是錯的。 */
let cjOpen = false;

async function renderCangjie(c) {
  const box = $('#cj');
  if (!box) return;
  box.innerHTML = '';
  const code = cangjie && cangjie[c];
  if (!code) {
    box.innerHTML = '<span class="none">倉頡碼表沒有這個字。</span>';
    return;
  }

  const row = el('div', 'cj');
  const toggle = el('button', 'cjtoggle', cjOpen ? '▾ 拆碼圖' : '▸ 拆碼圖');
  toggle.onclick = () => { cjOpen = !cjOpen; renderCangjie(c); };
  for (const L of code) {
    const k = el('div', 'k');
    k.append(el('div', 'r', CJ_RADICAL[L] || '?'));
    k.append(el('div', 'l', L));
    row.append(k);
  }
  row.append(el('span', 'code', code));
  row.append(toggle);
  box.append(row);

  if (!cjOpen) return;

  const holder = el('div', 'cjmap');
  holder.innerHTML = '<span class="cjnote">拆碼圖載入中…</span>';
  box.append(holder);

  const url = '/api/cjimg?c=' + encodeURIComponent(c);
  const ok = await fetch(url, { method: 'GET' }).then(r => r.ok).catch(() => false);
  if (c !== cur) return;
  if (!ok) {
    holder.innerHTML = '<span class="cjnote">這個字沒有拆碼圖。</span>';
    return;
  }
  holder.innerHTML =
    `<img src="${url}" alt="${c} 倉頡拆碼圖" class="cjimg">` +
    '<div class="cjnote">拆碼圖來自 <a href="https://倉頡字典.com" target="_blank" ' +
    'rel="noopener">倉頡字典.com</a>。倉頡會把一筆切開分屬不同碼，' +
    '所以直接看原圖，不用我們的筆畫重畫。</div>';
}

/* ---------- 官方筆順參考 ----------
   大陸：makemeahanzi（PRC 筆順）。台灣：教育部《國字標準字體筆順學習網》資料（g0v/zh-stroke-data）。
   香港教育局的筆順沒有公開資料集，只能給查詢連結。 */
async function strokeOrder(c) {
  const box = $('#so'); box.innerHTML = '';
  const seq = (paths, viewBox) => {
    const g = el('div', 'so-g');
    paths.forEach((d, i) => {
      const s = el('div', 'so-s');
      s.innerHTML = `<svg viewBox="${viewBox}">` +
        paths.slice(0, i).map(p => `<path class="p" d="${p}"/>`).join('') +
        `<path class="c" d="${d}"/></svg><i>${i + 1}</i>`;
      g.append(s);
    });
    return g;
  };
  /* 大陸筆順：就是取碼用的這份資料 */
  const prc = el('div', 'so-row');
  const t1 = el('div', 'so-t');
  t1.innerHTML = `<b>大陸</b><span>PRC · ${strokes.length} 筆（本頁取碼所依據）</span>`;
  prc.append(t1);
  prc.append(seq(strokes.map(d => d), '0 0 1024 1024'));
  prc.querySelectorAll('svg').forEach(sv => {
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('transform', Shape.SVG_TF);
    while (sv.firstChild) g.append(sv.firstChild);
    sv.append(g);
  });
  box.append(prc);

  /* 台灣教育部筆順 */
  const tw = await fetch('/api/tw?c=' + encodeURIComponent(c)).then(r => r.ok ? r.json() : null);
  const twRow = el('div', 'so-row');
  const t2 = el('div', 'so-t');
  if (tw) {
    const diff = tw.strokes.length !== strokes.length;
    t2.innerHTML = `<b>台灣</b><span>教育部標準 · ${tw.strokes.length} 筆` +
      (diff ? ' <span style="color:var(--warn)">筆數與大陸不同</span>' : '') + '</span>';
    twRow.append(t2);
    twRow.append(seq(tw.strokes, '0 0 2048 2048'));
  } else {
    t2.innerHTML = '<b>台灣</b>';
    twRow.append(t2);
    twRow.append(el('div', 'so-miss', '教育部資料只涵蓋 4,847 個常用字，此字不在其中。'));
  }
  box.append(twRow);

  /* 香港教育局：從《香港小學學習字詞表》的筆順示範解碼而來（隨用隨抓） */
  const hkRow = el('div', 'so-row');
  hkRow.innerHTML = '<div class="so-t"><b>香港</b><span>教育局 · 讀取中…</span></div>';
  box.append(hkRow);
  const hk = await fetch('/api/hk?c=' + encodeURIComponent(c))
    .then(r => (r.ok ? r.json() : null)).catch(() => null);
  if (c !== cur) return;                       /* 已經換字了，別把舊結果貼上去 */
  hkRow.innerHTML = '';
  const t3 = el('div', 'so-t');
  if (hk) {
    const diff = hk.strokes.length !== strokes.length;
    t3.innerHTML = `<b>香港</b><span>教育局 · ${hk.strokes.length} 筆` +
      (diff ? ' <span style="color:var(--warn)">筆數與大陸不同</span>' : '') + '</span>';
    hkRow.append(t3);
    const g = el('div', 'so-g');
    hk.strokes.forEach((s, i) => {
      const cell = el('div', 'so-s');
      cell.innerHTML = `<svg viewBox="${hk.viewBox}">` +
        hk.strokes.slice(0, i).map(q =>
          `<g transform="translate(${q.tx},${q.ty})"><path class="p" d="${q.d}"/></g>`).join('') +
        `<g transform="translate(${s.tx},${s.ty})"><path class="c" d="${s.d}"/></g></svg><i>${i + 1}</i>`;
      g.append(cell);
    });
    hkRow.append(g);
  } else {
    t3.innerHTML = '<b>香港</b>';
    hkRow.append(t3);
    hkRow.append(el('div', 'so-miss', '《香港小學學習字詞表》沒有收錄此字。'));
  }
}

/* ---------- 佇列：把「還有未處理警告」的字標紅 ----------
   每個已取碼的字都用同一套檢查跑一遍（在背景做，算完就更新徽章）。
   字根表或原則改了、或某個字存檔了，就重算。 */
const audit = new Map();        /* 字 → 未忽略的警告數 */
let auditRun = 0;

async function auditChar(ch) {
  const rec = codes[ch];
  if (!rec || !rec.segments || !rec.segments.length) return 0;
  const g = await Zigen.getGlyph(ch);
  if (!g) return 0;
  const list = checks({
    segs: rec.segments, skipped: rec.skipped || [],
    medians: g.medians, nStrokes: g.strokes.length,
  });
  const ignored = new Set(rec.overrides || []);
  return list.filter(c => c.lvl === 'warn' && !ignored.has(c.key)).length;
}

async function auditAll() {
  const run = ++auditRun;
  const done = Object.keys(codes).filter(isDone);
  for (const ch of done) {
    if (run !== auditRun) return;        /* 有更新的一輪在跑了，這輪作廢 */
    audit.set(ch, await auditChar(ch));
    markQueue(ch);
  }
}
function markQueue(ch) {
  for (const q of document.querySelectorAll('.qi'))
    if (q.dataset.c === ch) q.classList.toggle('warn', (audit.get(ch) || 0) > 0);
}

/* ---------- queue ---------- */
const isDone = c => !!(codes[c] && codes[c].segments && codes[c].segments.length);
function pool() {
  const q = $('#search').value.trim();
  if (q) return [...q].filter(c => order.includes(c));
  return order.filter(c => filter === 'all' ? true : filter === 'done' ? isDone(c) : !isDone(c));
}
function renderQueue() {
  const box = $('#qlist'); box.innerHTML = '';
  for (const c of pool().slice(0, shown)) {
    const d = el('div', 'qi' + (c === cur ? ' on' : '') + (isDone(c) ? '' : ' todo') +
      ((audit.get(c) || 0) > 0 ? ' warn' : ''));
    d.dataset.c = c;
    if (audit.get(c)) d.title = `${audit.get(c)} 項未處理的警告`;
    d.append(el('div', 'c', c));
    d.append(el('div', 'cd', isDone(c)
      ? finalOf(codes[c].segments.map(s => s.letter).join('')) : '·'));
    d.onclick = () => load(c);
    box.append(d);
  }
  $('#prog').innerHTML = `已取碼 <b>${order.filter(isDone).length}</b> / ${order.length}`;
}
const libInfo = () => {
  const n = lib.length;
  const letters = new Set(lib.map(e => e.letter)).size;
  $('#libinfo').innerHTML = `字根 <b>${n}</b>（${letters} 個字母）`;
};

/* ---------- 新字根 → 其他字要不要跟著改？ ----------
   例：本來 的＝JBSQ（勺被拆成 S+Q），你改成 JBA（勺整個取 A）。
   那麼別的含「勺」的字（豹、約…）若還是拆成 S+Q，就是舊拆法留下來的。
   這裡把它們找出來，讓你逐一決定改不改。 */
function shapeFormsOf(shape) {
  return [shape.glyph, ...(shape.alts || [])].filter(Boolean);
}

async function vecOfForm(form) {
  const g = await Zigen.getGlyph(form.src);
  if (!g) return null;
  const med = form.strokes.map(i => g.medians[i]);
  if (med.some(m => !m)) return null;
  const st = [...form.strokes].sort((a, b) => a - b);
  let head = 1;
  while (head < st.length && st[head] === st[head - 1] + 1) head++;
  return { vec: Shape.strokeVec(med), n: med.length,
           gapped: head < st.length, head, tail: st.length - head };
}

/* 在某個字裡找出跟這個字根同形的筆畫組（依它自己的頭尾結構） */
function findShape(med, f, thr) {
  const n = med.length, hits = [];
  const test = idx => {
    const v = Shape.strokeVec(idx.map(i => med[i]));
    if (!v) return;
    const d = Shape.dist(v, f.vec);
    if (d < thr) hits.push({ idx, d });
  };
  if (!f.gapped) {
    for (let i = 0; i + f.n <= n; i++) test([...Array(f.n)].map((_, j) => i + j));
  } else {
    for (let i = 0; i + f.head <= n; i++) {
      const run = [...Array(f.head)].map((_, j) => i + j);
      for (let j = i + f.head; j + f.tail <= n; j++)
        test([...run, ...[...Array(f.tail)].map((_, k) => j + k)]);
    }
  }
  return hits.sort((a, b) => a.d - b.d);
}

async function propagate(newShapes) {
  const thr = zigen.meta.merge_threshold || Zigen.SAME_SHAPE;
  const proposals = [];

  for (const { letter, shape } of newShapes) {
    const forms = [];
    for (const f of shapeFormsOf(shape)) {
      const v = await vecOfForm(f);
      if (v) forms.push(v);
    }
    if (!forms.length) continue;

    for (const [ch, rec] of Object.entries(codes)) {
      if (ch === cur || !rec.segments || !rec.segments.length) continue;
      const g = await Zigen.getGlyph(ch);
      if (!g) continue;

      for (const f of forms) {
        for (const hit of findShape(g.medians, f, thr)) {
          const set = new Set(hit.idx);
          /* 哪些字根覆蓋到這組筆畫 */
          const covering = rec.segments.filter(sg => sg.strokes.some(i => set.has(i)));
          if (!covering.length) continue;
          /* 這些字根剛好只覆蓋這組筆畫（沒有跨出去）才好整併 */
          const union = new Set(covering.flatMap(sg => sg.strokes));
          if (union.size !== set.size || [...union].some(i => !set.has(i))) continue;
          /* 已經是一個字根、而且字母也對 → 沒事 */
          if (covering.length === 1 && covering[0].letter === letter) continue;

          const segs = rec.segments
            .filter(sg => !covering.includes(sg))
            .concat([{ strokes: [...hit.idx].sort((a, b) => a - b), letter }])
            .sort((a, b) => Math.min(...a.strokes) - Math.min(...b.strokes));
          proposals.push({ ch, rec, segs, strokes: hit.idx, letter,
                           before: rec.segments.map(s => s.letter).join(''),
                           after: segs.map(s => s.letter).join('') });
          break;
        }
      }
    }
  }
  if (proposals.length) await reviewProposals(proposals, newShapes);
}

function reviewProposals(list, newShapes) {
  return new Promise(async resolve => {
    const box = $('#plist'); box.innerHTML = '';
    const picked = new Set(list.map((_, i) => i));
    $('#ptitle').textContent = '其他字要不要跟著改？';
    const names = newShapes.map(x => x.letter).join('、');
    $('#psub').innerHTML =
      `你剛把一組筆畫取成 <b>${names}</b>。下面這些已取碼的字，含有同樣的形狀，` +
      '但還是用舊的拆法。勾起來的會一起改；不想動的就取消勾選。';

    for (const [i, p] of list.entries()) {
      const g = await Zigen.getGlyph(p.ch);
      const it = el('div', 'pitem');
      const cb = el('input'); cb.type = 'checkbox'; cb.checked = true;
      cb.onchange = () => cb.checked ? picked.add(i) : picked.delete(i);
      it.append(cb);
      it.append(el('span', 'c', p.ch));
      const sv = el('span');
      sv.innerHTML = `<svg viewBox="0 0 1024 1024"><g transform="${Shape.SVG_TF}">` +
        g.strokes.map((d, k) =>
          `<path class="${p.strokes.includes(k) ? 'on' : 'off'}" d="${d}"/>`).join('') +
        '</g></svg>';
      it.append(sv);
      const cd = el('span', 'cd');
      cd.innerHTML = `${p.before} <span class="arrow">→</span> <b>${p.after}</b>`;
      it.append(cd);
      box.append(it);
    }

    const done = async apply => {
      $('#propagate').classList.remove('on');
      if (apply && picked.size) {
        for (const i of picked) {
          const p = list[i];
          p.rec.segments = p.segs;
          p.rec.code = p.segs.map(s => s.letter).join('');
          delete p.rec.final;
        }
        await fetch('/api/codes', { method: 'PUT',
          headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(codes) });
        $('#status').textContent = `已更新 ${picked.size} 個字`;
        renderQueue(); auditAll();
      }
      resolve();
    };
    $('#papply').onclick = () => done(true);
    $('#pskip').onclick = () => done(false);
    $('#pall').onclick = () => { box.querySelectorAll('input').forEach((c, i) => {
      c.checked = true; picked.add(i); }); };
    $('#pnone').onclick = () => { box.querySelectorAll('input').forEach(c => c.checked = false);
      picked.clear(); };
    $('#propagate').classList.add('on');
  });
}

/* ---------- 儲存：碼表 + 學回字根表 ---------- */
async function save() {
  const newborn = [];                 /* 這次存檔新生的字根 */
  if (cur && segs.length) {
    /* 每個確認的字根都併入字根表（同形合併計次，新形新增） */
    for (const s of segs) {
      const vec = Shape.strokeVec(s.strokes.map(i => medians[i]));
      if (!vec) continue;
      const r = Zigen.merge(zigen, lib, { letter: s.letter, char: cur, strokeIdx: s.strokes, vec });
      zigenDirty = true;                            /* 新字根、或計次都要存 */
      if (!r.merged) newborn.push({ letter: s.letter, shape: r.shape });
    }
    const full = segs.map(s => s.letter).join('');
    codes[cur] = { ...(codes[cur] || {}), segments: segs.map(s => ({ ...s })),
                   code: full,              /* 完整碼：保留拆解的全貌 */
                   final: finalOf(full),    /* 實際要按的碼：統計、重碼、匯出都用它 */
                   skipped: skipped.length ? [...skipped] : undefined,
                   note: $('#note').value || undefined };
  } else if (cur && codes[cur]) {
    delete codes[cur].segments; delete codes[cur].code; delete codes[cur].final;
  }
  $('#status').textContent = '儲存中…';
  const puts = [fetch('/api/codes', { method: 'PUT',
    headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(codes) })];
  if (zigenDirty) puts.push(fetch('/api/zigen', { method: 'PUT',
    headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(zigen) }));
  const rs = await Promise.all(puts);
  if (rs.every(r => r.ok)) {
    dirty = false; zigenDirty = false;
    $('#status').textContent = '已儲存 ✓'; $('#status').className = 'saved';
    stamp = await fetchStamp();
  } else $('#status').textContent = '儲存失敗';
  libInfo(); renderQueue();
  if (cur) { audit.set(cur, await auditChar(cur)); markQueue(cur); }
  auditAll();                      /* 新字根可能讓別的字產生／解除警告 */
  if (newborn.length) await propagate(newborn);
}
async function saveNext() {
  await save();
  const p = pool();
  const next = filter === 'todo' ? p.find(c => !isDone(c)) : p[(p.indexOf(cur) + 1) % p.length];
  if (next) load(next);
}

/* ---------- 與字根表頁互通：偵測對方改動並重載 ---------- */
const fetchStamp = () => fetch('/api/state').then(r => r.json()).then(s => s.zigen);
async function pollZigen() {
  if (dirty || zigenDirty) return;
  const s = await fetchStamp();
  if (s === stamp) return;
  stamp = s;
  zigen = await fetch('/api/zigen').then(r => r.json());
  rules = await fetch('/api/rules').then(r => r.json());
  learned = await fetch('/api/learned').then(r => r.json())
    .catch(() => learned) || learned;
  lib = await Zigen.buildLibrary(zigen);
  libInfo(); suggest();
  if (!segs.length) predict();
  renderChecks();
  auditAll();
  $('#status').textContent = '字根表已更新';
}

$('#saveNext').onclick = saveNext;
/* 把整個字的取碼清空（套錯預測時不必一個一個刪） */
function clearAll() {
  if (!segs.length && !skipped.length && !sel.length) return;
  segs = []; skipped = []; sel = [];
  touch(); drawGlyph(); renderSegs(); suggest(); predict();
}

function toggleNums() {
  showNums = !showNums;
  $('#nums').classList.toggle('primary', showNums);
  drawGlyph();
}
$('#nums').onclick = toggleNums;
$('#skipSel').onclick = skipSelected;
$('#clearAll').onclick = clearAll;
$('#clearSel').onclick = () => { sel = []; drawGlyph(); suggest(); };
$('#undoSeg').onclick = () => { segs.pop(); touch(); drawGlyph(); renderSegs(); predict(); };
$('#note').oninput = touch;
$('#search').oninput = () => { shown = 120; renderQueue(); };
$('#more').onclick = () => { shown += 120; renderQueue(); };
for (const b of document.querySelectorAll('.filters button'))
  b.onclick = () => {
    filter = b.dataset.f; shown = 120;
    document.querySelectorAll('.filters button').forEach(x => x.classList.toggle('on', x === b));
    renderQueue();
  };
$('#export').onclick = () => {
  const lines = ['# 愛發筆碼表\t字\t碼(實際)\t完整碼\t筆畫分組'];
  for (const [c, r] of Object.entries(codes)) if (r.segments) {
    const full = r.segments.map(s => s.letter).join('');
    lines.push(`${c}\t${finalOf(full)}\t${full}\t` +
      r.segments.map(s => s.strokes.map(n => n + 1).join('')).join('+'));
  }
  const a = el('a');
  a.href = URL.createObjectURL(new Blob([lines.join('\n')], { type: 'text/plain' }));
  a.download = 'aiphabi.dict.txt'; a.click();
};
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  /* A–Z 全部留給字根指派，所以略過用 space，顯示筆順改用 / */
  if (e.key === ' ') { e.preventDefault(); skipSelected(); }
  else if (e.key === '/') { e.preventDefault(); toggleNums(); }
  else if (e.key === 'Enter') { e.preventDefault(); saveNext(); }
  else if (e.key === 'Backspace') {
    e.preventDefault(); segs.pop(); touch(); drawGlyph(); renderSegs(); predict();
  }
  else if (e.key === 'Escape') {
    if (sel.length) { sel = []; drawGlyph(); suggest(); }   /* 先清選取 */
    else clearAll();                                        /* 沒有選取時＝全部清除 */
  }
  else if (/^[a-zA-Z]$/.test(e.key)) { e.preventDefault(); commit(e.key); }
  else if ((e.metaKey || e.ctrlKey) && e.key === 's') { e.preventDefault(); save(); }
});
setInterval(() => { if (dirty || zigenDirty) save(); }, 20000);
setInterval(pollZigen, 3000);
window.onbeforeunload = e => { if (dirty || zigenDirty) return e.returnValue = '有未儲存的修改'; };

Promise.all([
  fetch('/api/freq').then(r => r.json()),
  fetch('/api/codes').then(r => r.json()),
  fetch('/api/zigen').then(r => r.json()),
  fetch('/api/rules').then(r => r.json()),
  fetch('/api/cangjie').then(r => r.json()).catch(() => ({})),
  fetch('/api/learned').then(r => r.json()).catch(() => ({ stroke_kinds: [] })),
  fetchStamp(),
]).then(async ([f, c, z, rl, cj, ln, s]) => {
  order = f.order; codes = c; zigen = z; rules = rl; cangjie = cj;
  learned = ln && ln.stroke_kinds ? ln : { stroke_kinds: [] };
  stamp = s;
  lib = await Zigen.buildLibrary(zigen);
  libInfo();
  $('#status').textContent = '已載入';
  renderQueue();
  const want = new URLSearchParams(location.search).get('c');
  await load(want && order.includes(want) ? want : (pool()[0] || '的'));
  auditAll();
});
</script>
</body>
