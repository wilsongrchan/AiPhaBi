<script>
/* 存檔前先問伺服器：我讀到的版本還是最新的嗎？不是的話就別蓋掉別人的改動。 */
window.__baseStamp = window.__baseStamp || {};

async function putGuarded(url, body, key) {
  const base = window.__baseStamp[key];
  const send = extra => fetch(url, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', ...extra },
    body,
  });

  let r = await send(base ? { 'X-Base-Stamp': String(base) } : {});

  if (r.status === 409) {
    const ok = confirm(
      '這份資料已經被「別的分頁或程式」改過了。\n\n' +
      '按「確定」＝用你這邊的版本覆蓋掉對方的改動。\n' +
      '按「取消」＝丟掉你這邊未儲存的改動，重新載入最新的資料。');
    if (!ok) { location.reload(); return { ok: false, reloaded: true }; }
    r = await send({});                      /* 不帶版本＝強制覆蓋 */
  }

  /* 只用回應裡回報的新版本更新這個檔案 —— 不要再去 /api/state 撈，
     併發寫入時會撈到另一個檔案還沒寫完的舊值，下次存檔就自己跟自己 409。 */
  if (r.ok) {
    const j = await r.clone().json().catch(() => null);
    if (j && j.stamp) window.__baseStamp[key] = j.stamp;
  }
  return r;
}
</script>
<script src="/assets/zigen.js"></script>
<script>
const $ = s => document.querySelector(s);
const el = (t, c, x) => { const e = document.createElement(t);
  if (c) e.className = c; if (x != null) e.textContent = x; return e; };

let order = [], codes = {}, zigen = null, lib = [], rules = null, learned = { stroke_kinds: [] };
let cur = '', strokes = [], medians = [], sel = [], segs = [], skipped = [], showNums = false;
let filter = 'todo', shown = 120, dirty = false, zigenDirty = false, stamp = null;

const touch = () => { dirty = true; $('#status').textContent = '未儲存'; $('#status').className = 'dirty'; };

/* 筆型：先看你糾正過的（learned），再看幾何 */
const kindOf = m => Zigen.strokeKind(m, learned.stroke_kinds);

async function teachKind(strokeIdx, kind) {
  const v = Shape.strokeVec([medians[strokeIdx]]);
  if (!v) return;
  learned.stroke_kinds.push({ vec: [...v], kind, from: cur, stroke: strokeIdx + 1 });
  await putGuarded('/api/learned', JSON.stringify(learned, null, 2), 'learned');
  $('#status').textContent = `已學會：這種筆是「${kind}」`;
  $('#status').className = 'saved';
  renderSegs(); predict(); auditAll();
}

/* 取碼原則（/rules 頁可改）— 只有 kind=enforced 且啟用的才會影響預測 */
const rule = id => {
  const r = rules && rules.rules.find(x => x.id === id);
  return r && r.enabled && r.kind === 'enforced' ? r : null;
};
const maxLen = () => (rule('max_code_length')?.params?.max) || zigen.meta.max_code_length || 4;

/* ---------- 畫字 ---------- */
function drawGlyph() {
  const g = $('#glyph');
  g.innerHTML = '<rect class="grid" x="2" y="2" width="1020" height="1020" rx="20"/>' +
    '<line class="grid" x1="512" y1="2" x2="512" y2="1022"/>' +
    '<line class="grid" x1="2" y1="512" x2="1022" y2="512"/>';
  const gg = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  gg.setAttribute('transform', Shape.SVG_TF);
  const segOf = i => segs.findIndex(s => s.strokes.includes(i));
  strokes.forEach((d, i) => {
    const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    p.setAttribute('d', d);
    const si = segOf(i);
    if (si >= 0) { p.setAttribute('fill', hue(si)); p.setAttribute('class', 'asg'); }
    else if (skipped.includes(i)) p.setAttribute('class', 'skip');
    else p.setAttribute('class', sel.includes(i) ? 'sel' : 'un');
    gg.append(p);
  });
  g.append(gg);
  /* 命中判定用「離哪一筆的中線最近」，不靠 SVG 疊放次序：
     十 的橫與豎交叉，靠圖形疊放會永遠點到後畫的那一筆。 */
  g.onclick = ev => {
    const i = nearestStroke(ev);
    if (i < 0 || segOf(i) >= 0) return;
    const sk = skipped.indexOf(i);
    if (sk >= 0) { skipped.splice(sk, 1); touch(); drawGlyph(); renderCode(); return; }
    const k = sel.indexOf(i);
    k < 0 ? sel.push(i) : sel.splice(k, 1);
    sel.sort((a, b) => a - b);
    drawGlyph(); suggest();
  };
  if (showNums) strokes.forEach((d, i) => {
    const c = pathCenter(d);
    const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    t.setAttribute('x', c.x); t.setAttribute('y', 900 - c.y + 12);
    t.setAttribute('text-anchor', 'middle'); t.textContent = i + 1;
    g.append(t);
  });
}
/* 把點擊位置換算到筆畫座標系，回傳中線最近的那一筆 */
function nearestStroke(ev) {
  const g = $('#glyph'), grp = g.querySelector('g');
  if (!grp || !medians.length) return -1;
  const pt = g.createSVGPoint();
  pt.x = ev.clientX; pt.y = ev.clientY;
  const q = pt.matrixTransform(grp.getScreenCTM().inverse());
  let best = -1, bd = Infinity;
  medians.forEach((m, i) => {
    for (let k = 0; k < m.length; k++) {
      const d = k === 0 ? Math.hypot(m[0][0] - q.x, m[0][1] - q.y)
                        : segDist(q, m[k - 1], m[k]);
      if (d < bd) { bd = d; best = i; }
    }
  });
  return bd < 90 ? best : -1;          /* 離所有筆畫都太遠 → 當作沒點到 */
}
function segDist(p, a, b) {
  const vx = b[0] - a[0], vy = b[1] - a[1];
  const L = vx * vx + vy * vy;
  const t = L ? Math.max(0, Math.min(1, ((p.x - a[0]) * vx + (p.y - a[1]) * vy) / L)) : 0;
  return Math.hypot(p.x - (a[0] + t * vx), p.y - (a[1] + t * vy));
}

const HUES = [18, 200, 140, 280, 45, 330, 95, 250];
const hue = i => `hsl(${HUES[i % HUES.length]} 62% 45%)`;
function pathCenter(d) {
  let n = 0, sx = 0, sy = 0;
  for (const m of d.matchAll(/(-?\d+(?:\.\d+)?)\s+(-?\d+(?:\.\d+)?)/g)) { sx += +m[1]; sy += +m[2]; n++; }
  return n ? { x: sx / n, y: sy / n } : { x: 512, y: 450 };
}
function subSvg(list) {
  let x0 = 1e9, y0 = 1e9, x1 = -1e9, y1 = -1e9;
  for (const i of list) for (const m of strokes[i].matchAll(/(-?\d+(?:\.\d+)?)\s+(-?\d+(?:\.\d+)?)/g)) {
    const x = +m[1], y = 900 - +m[2];
    if (x < x0) x0 = x; if (x > x1) x1 = x; if (y < y0) y0 = y; if (y > y1) y1 = y;
  }
  const p = 70, w = x1 - x0 + p * 2, h = y1 - y0 + p * 2, m = Math.max(w, h);
  const box = x1 < x0 ? '0 0 1024 1024'
    : `${x0 - p - (m - w) / 2} ${y0 - p - (m - h) / 2} ${m} ${m}`;
  return `<svg viewBox="${box}"><g transform="${Shape.SVG_TF}">` +
    strokes.map((d, i) => `<path class="${list.includes(i) ? 'on' : 'off'}" d="${d}"/>`).join('') +
    '</g></svg>';
}

/* ---------- 選取中的筆畫：既有字根建議 ---------- */
/* 建議字母：不是只看「最像的那一個字根」，而是拿你過去所有的指派來投票。
   每個字根按「有多像」和「你用過幾次」加權 —— 你把小點一直指派給 Q、
   把捺一直指派給 L，票就會越來越倒向你自己的習慣。 */
function suggest() {
  const box = $('#sugg'), nz = $('#newz');
  box.innerHTML = ''; nz.textContent = '';
  if (!sel.length) { box.innerHTML = '<span class="newz">先點選筆畫…</span>'; return; }
  const vec = Shape.strokeVec(sel.map(i => medians[i]));
  if (!vec) return;
  const thr = zigen.meta.merge_threshold || Zigen.SAME_SHAPE;

  const near = lib.filter(e => e.n === sel.length)
    .map(e => ({ e, d: Shape.dist(vec, e.vec) }))
    .sort((a, b) => a.d - b.d)
    .slice(0, 8);                                   /* 最像的幾個，一起投票 */

  const votes = new Map();
  for (const m of near) {
    const w = (1 / (m.d + 0.03)) * Math.sqrt(m.e.shape.count || 1);
    const v = votes.get(m.e.letter) || { letter: m.e.letter, w: 0, best: m };
    v.w += w;
    if (m.d < v.best.d) v.best = m;
    votes.set(m.e.letter, v);
  }
  const ranked = [...votes.values()].sort((a, b) => b.w - a.w).slice(0, 5);
  const total = ranked.reduce((n, v) => n + v.w, 0) || 1;

  for (const v of ranked) {
    const b = el('div', 'sg');
    b.append(el('span', 'L', v.letter));
    const pct = Math.round(v.w / total * 100);
    b.append(el('span', 'm', `${v.best.e.label}　${pct}%`));
    b.title = `最近的距離 ${v.best.d.toFixed(3)}　（依你過去的指派加權）`;
    b.onclick = () => commit(v.letter);
    box.append(b);
  }

  const top = ranked[0];
  const topThr = top && top.best.e.shape && top.best.e.shape.thr != null
    ? top.best.e.shape.thr : thr;
  if (!top || top.best.d >= topThr) {
    nz.innerHTML = '<b>新字根</b> — 按任一字母鍵，這個形狀就會加入該字母的字根表。';
  } else if (ranked.length > 1 && ranked[1].w / total > 0.3) {
    /* 兩個字母都很有話講 → 這正是 L 還是 Q 那種需要你裁決的情況 */
    nz.innerHTML = `<b>拿不定</b>：<b>${ranked[0].letter}</b> 與 <b>${ranked[1].letter}</b> ` +
      `都很像（${ranked[0].best.d.toFixed(3)} / ${ranked[1].best.d.toFixed(3)}）。你選哪個，我就往哪邊學。`;
  } else {
    nz.textContent = `與 ${top.letter} 的既有字根同形（距離 ${top.best.d.toFixed(3)}）。`;
  }
}

/* ---------- 指派 ---------- */
function commit(letter) {
  if (!sel.length) return;
  segs.push({ strokes: [...sel], letter: letter.toUpperCase() });
  sel = [];
  touch(); drawGlyph(); renderSegs(); suggest();
  predict();                     /* 立刻預測剩下的筆畫 */
}
/* 孤筆略過原則：選取的筆畫不取碼（例：無法與人成根的一橫一豎） */
function skipSelected() {
  if (!sel.length) return;
  skipped = [...new Set([...skipped, ...sel])].sort((a, b) => a - b);
  sel = [];
  touch(); drawGlyph(); renderSegs(); suggest();
  predict();
}
function renderSegs() {
  const box = $('#segs'); box.innerHTML = '';
  segs.forEach((s, i) => {
    const d = el('div', 'seg');
    d.dataset.i = i;
    const no = el('div', 'no', String(i + 1));       /* 序號＝警告訊息裡的「第 N 個字根」 */
    no.style.background = hue(i);
    d.append(no);
    const sv = el('div'); sv.innerHTML = subSvg(s.strokes);
    d.append(sv);
    const inp = el('input'); inp.value = s.letter; inp.maxLength = 1;
    inp.oninput = () => { s.letter = inp.value.toUpperCase(); touch(); renderCode(); };
    d.append(inp);
    d.append(el('span', 'n', `第 ${s.strokes.map(n => n + 1).join(',')} 筆`));
    const up = el('span', 'mv', '↑');
    up.onclick = () => { if (i > 0) { [segs[i - 1], segs[i]] = [segs[i], segs[i - 1]]; touch(); drawGlyph(); renderSegs(); } };
    const x = el('span', 'mv', '✕');
    x.onclick = () => { segs.splice(i, 1); touch(); drawGlyph(); renderSegs(); };
    d.append(up, x);
    box.append(d);
  });
  renderCode();          /* 它會順帶重畫兼容碼面板 */
  renderChecks();
}
/* 打字實際要按的碼：超過上限時取前 head 碼 + 尾 tail 碼 */
const finalOf = code => Zigen.shorten(code, rules && rules.rules.find(r =>
  r.id === 'max_code_length' && r.enabled && r.kind === 'enforced'));

function renderCode() {
  renderAlts();          /* 碼一變，「能不能收成兼容碼」就跟著變 */
  const code = segs.map(s => s.letter).join('');
  const fin = finalOf(code);
  const max = maxLen();
  const cut = code.length > max;

  /* 完整碼保留在畫面上（看得到拆解），箭頭後是實際要按的碼 */
  $('#code').innerHTML = !code ? '—'
    : cut ? `<span class="full">${code}</span><span class="arrow">→</span>` +
            `<span class="short">${fin}</span>`
          : code;
  $('#code').classList.toggle('cut', cut);

  const left = strokes.length - segs.reduce((n, s) => n + s.strokes.length, 0) - skipped.length;
  const bits = [];
  if (cut) {
    /* 講出「實際的」縮碼規則，不要自己猜 head/tail —— 你在取碼原則頁改成
       「前 3 碼 + 末 2 碼」，這裡就該這樣說。 */
    const r = rule('max_code_length');
    const head = r?.params?.head ?? Math.max(1, max - 1);
    const tail = r?.params?.tail ?? 1;
    bits.push(`<span style="color:var(--warn)">${code.length} 碼超過上限 ${max}</span>` +
      `　取前 ${head} 碼` + (tail ? `加末 ${tail} 碼` : '') +
      ` → <b style="color:var(--accent)">${fin}</b>`);
  }
  if (skipped.length) bits.push(`略過 ${skipped.length} 筆`);
  /* 約定表上有這個字的話，把「該取的碼」擺出來當靶子 */
  const cvr = convOf(cur);
  if (cvr) bits.push(`約定碼 <b style="color:var(--accent)">${finalOf(cvr.code)}</b>` +
    `（${cvr.group}${cvr.compCode && cvr.compCode !== cvr.code
      ? `；作為偏旁取 ${cvr.compCode}` : ''}）`);
  bits.push(left ? `尚有 ${left} 筆未指派`
    : '<span style="color:var(--ok)">全部筆畫已處理</span>');
  $('#ref').innerHTML = bits.join('　');

  /* 重碼提醒：以「實際要按的碼」判斷，不是完整碼。
     而且要等整個字拆完才報 —— 拆到一半的碼本來就是殘碼，跟人家撞在一起
     是必然的，這時候跳出來只是噪音。 */
  const complete = strokes.length > 0 && left === 0;
  /* 別的字的兼容碼（含自動兼容的完整碼）一樣佔碼位 —— 撞到它，打字時照樣要多選一次 */
  const clash = (fin && complete)
    ? Object.keys(codes).filter(ch => ch !== cur && codesFor(ch).includes(fin))
    : [];
  const w = $('#clash');
  if (clash.length) {
    w.style.display = 'block';
    w.innerHTML = `⚠ <b>重碼</b>：<code>${fin}</code> 已經是 ` +
      clash.map(ch => `<span class="ch go" data-c="${ch}" title="去看「${ch}」怎麼拆">${ch}</span>`).join('、') +
      ` 的碼。可以接受（打字時多選一次），或改用別的拆法／字根。`;
    /* 撞到誰，就要能點進去看它 —— 而且回得來（← 返回） */
    for (const s of w.querySelectorAll('.ch.go')) s.onclick = () => goTo(s.dataset.c);
  } else w.style.display = 'none';
}

/* ---------- 兼容碼 ----------
   一個字只有一個「正確」的拆法，是這套系統最貴的假設：實測電腦照著原則重推，
   只有 ~67% 的字跟你拆得一樣。打字的人也一樣 —— 他把「訴」拆成 IIO+R+F 還是
   IIO+RF，其實都合理。

   兼容碼＝這個字「也接受」的碼。主碼不變（統計、字根表都以主碼為準），
   但打兼容碼一樣打得出這個字。代價是它會佔掉碼空間，可能製造新的重碼 ——
   所以碼表分析頁把「主碼重碼率」跟「含兼容碼」分開算，看得到代價。 */
const altsOf = ch => (codes[ch] && codes[ch].alts) || [];

/* 一個字「打得出來」的所有碼：主碼（縮短後）＋ 完整碼 ＋ 手動收的兼容碼。
   完整碼永遠算兼容碼 —— 使用者把整個字拆完、老實把每一碼都打出來，沒有道理
   打不出這個字。它不必存進 codes.json，本來就推得出來。 */
function codesFor(ch) {
  const r = codes[ch];
  if (!r || !r.code) return [];
  const out = [finalOf(r.code)];
  if (r.code !== out[0]) out.push(r.code);              /* 完整碼（自動兼容） */
  for (const a of r.alts || []) {
    const f = finalOf(a.code);
    if (!out.includes(f)) out.push(f);
    if (a.code !== f && !out.includes(a.code)) out.push(a.code);
  }
  return out;
}

/* 完整碼被縮短時，在面板上把它列出來（自動兼容，不必手動收） */
function autoFullRow(box, rec) {
  if (!rec.code || finalOf(rec.code) === rec.code) return;
  const d = el('div', 'alt auto');
  d.innerHTML = `<b>${rec.code}</b><span>完整碼 · 自動兼容（打完整碼也打得出來）</span>`;
  d.title = '超過碼長上限才會縮短；完整碼一律接受，不必手動收';
  box.append(d);
}

/* 編兼容碼是一個「模式」：進去之後畫的東西不會動到主碼，出來時明確地收下或丟掉。
   （本來是「你先把主碼改掉，再按收下」—— 看起來就像在刪主碼，誰敢按。） */
let altMode = false;
let altEditing = null;        /* 正在改的那條兼容碼；null＝正在新增 */

/* alt = 要修改的既有兼容碼；不給就是新增一條 */
function enterAltMode(alt) {
  const rec = codes[cur] || {};
  if (!rec.code) { $('#status').textContent = '先存一個主碼，才能再收兼容碼'; return; }
  altMode = true;
  altEditing = alt || null;
  document.body.classList.add('altmode');
  $('#altbar').classList.remove('hide');
  $('#altbarmsg').innerHTML = (alt
    ? `正在改兼容碼 <code>${finalOf(alt.code)}</code>`
    : '正在畫<b>另一種拆法</b>') +
    `　主碼 <code>${finalOf(rec.code)}</code> 不會被動到 ——` +
    `　改字根、清掉重畫都可以，畫完按「${alt ? '存回這條兼容碼' : '收為兼容碼'}」。`;
  if (alt) {                  /* 把那條兼容碼的拆法載進編輯區 */
    segs = alt.segments.map(s => ({ strokes: [...s.strokes], letter: s.letter }));
    skipped = [...(alt.skipped || [])];
    sel = [];
    drawGlyph(); suggest(); predict();
  }
  $('#altDone').textContent = alt ? '✓ 存回這條兼容碼' : '✓ 收為兼容碼';
  renderSegs();
}
function exitAltMode(keep) {
  const rec = codes[cur] || {};
  if (keep) {
    const code = segs.map(s => s.letter).join('');
    const left = strokes.length - (segs.flatMap(s => s.strokes).length + skipped.length);
    if (!segs.length || left > 0) { $('#status').textContent = '還沒拆完，收不了'; return; }
    if (code === rec.code) { $('#status').textContent = '這跟主碼一樣，不必收'; return; }
    /* 撞到「別條」兼容碼才算重複 —— 正在改的這條當然跟自己一樣 */
    if ((rec.alts || []).some(a => a !== altEditing && a.code === code)) {
      $('#status').textContent = '這個兼容碼已經有了'; return;
    }
    const body = { code,
      segments: segs.map(s => ({ strokes: [...s.strokes], letter: s.letter })),
      skipped: skipped.length ? [...skipped] : undefined };
    if (altEditing) Object.assign(altEditing, body);        /* 改回原來那一條 */
    else rec.alts = [...(rec.alts || []), body];
    codes[cur] = rec;
    touch();
    $('#status').textContent = (altEditing ? '已更新兼容碼 ' : '已收兼容碼 ') +
      `${finalOf(code)}（主碼 ${finalOf(rec.code)} 不變）`;
  }
  altMode = false;
  altEditing = null;
  document.body.classList.remove('altmode');
  $('#altbar').classList.add('hide');
  /* 一律把畫面還原成主碼 —— 編兼容碼從頭到尾都不該動到它 */
  segs = (rec.segments || []).map(s => ({ strokes: [...s.strokes], letter: s.letter }));
  skipped = [...(rec.skipped || [])];
  sel = [];
  drawGlyph(); renderSegs(); suggest(); predict();
}
$('#newAlt').onclick = () => enterAltMode();
$('#altDone').onclick = () => exitAltMode(true);
$('#altCancel').onclick = () => exitAltMode(false);

function renderAlts() {
  const box = $('#alts'); box.innerHTML = '';
  const rec = codes[cur] || {};
  const alts = rec.alts || [];
  $('#newAlt').disabled = !rec.code || altMode;
  $('#newAlt').style.opacity = (!rec.code || altMode) ? .4 : 1;

  if (!alts.length) {
    box.innerHTML = '<div class="newz">沒有手動收的兼容碼。' +
      '別人拆得跟你不一樣但也合理時，按上面的「＋ 新增一種拆法」畫給它看，' +
      '他一樣打得出這個字（主碼不變）。</div>';
    autoFullRow(box, rec);
    return;
  }
  if (rec.code) {
    const m = el('div', 'alt main');
    m.innerHTML = `<b>${finalOf(rec.code)}</b><span>主碼</span>`;
    box.append(m);
  }
  autoFullRow(box, rec);
  for (const a of alts) {
    const d = el('div', 'alt edit');
    const fin = finalOf(a.code);
    d.innerHTML = `<b>${fin}</b>` + (fin !== a.code ? `<i>完整 ${a.code}</i>` : '') +
      `<span>${a.segments.map(s => s.strokes.map(k => k + 1).join(',')).join(' / ')}</span>`;
    d.title = '點一下改這個兼容碼';
    /* 點整列＝進編輯模式改它（按鈕自己有 stopPropagation，不會誤觸） */
    d.onclick = () => enterAltMode(a);
    const act = el('div', 'aact');
    act.onclick = e => e.stopPropagation();   /* 點整列＝改它，所以按鈕要擋住冒泡 */
    const up = el('button', '', '設為主碼');
    up.title = '跟主碼對調：這個變成主碼，原本的主碼變成兼容碼';
    up.onclick = () => {
      const old = { code: rec.code, segments: rec.segments.map(s => ({ ...s })),
                    skipped: rec.skipped ? [...rec.skipped] : [] };
      segs = a.segments.map(s => ({ strokes: [...s.strokes], letter: s.letter }));
      skipped = [...(a.skipped || [])];
      rec.alts = alts.filter(x => x !== a);
      if (old.code) rec.alts.push(old);
      codes[cur] = rec;
      sel = []; touch(); drawGlyph(); renderSegs(); suggest(); predict();
    };
    const rm = el('button', '', '✕');
    rm.title = '刪掉這個兼容碼';
    rm.onclick = () => {
      rec.alts = alts.filter(x => x !== a);
      if (!rec.alts.length) delete rec.alts;
      codes[cur] = rec; touch(); renderAlts();
    };
    act.append(up, rm);
    d.append(act);
    box.append(d);
  }
}

/* 把一組拆法收為兼容碼（來源可以是目前的拆法，也可以是預測給的另一種拆法） */
function addAlt(segments, skips) {
  const rec = codes[cur] || (codes[cur] = {});
  const code = segments.map(s => s.letter).join('');
  if (!rec.code) { $('#status').textContent = '先存一個主碼再收兼容碼'; return; }
  if (code === rec.code) return;
  rec.alts = rec.alts || [];
  if (rec.alts.some(a => a.code === code)) return;
  rec.alts.push({ code,
    segments: segments.map(s => ({ strokes: [...s.strokes], letter: s.letter })),
    skipped: skips && skips.length ? [...skips] : undefined });

  /* 收完要把畫面上的拆法還原成主碼 —— 不然編輯區還留著剛剛那個「另一種拆法」，
     一存檔它就變成主碼了（主碼跟兼容碼會變成同一個）。「兼容」的意思是
     「主碼不動，另外也接受」。 */
  if (rec.segments) {
    segs = rec.segments.map(s => ({ strokes: [...s.strokes], letter: s.letter }));
    skipped = [...(rec.skipped || [])];
    sel = [];
    drawGlyph(); suggest();
  }
  touch(); renderSegs();
  $('#status').textContent = `已收兼容碼 ${finalOf(code)}（主碼 ${finalOf(rec.code)} 不變）`;
}
/* addAlt 只剩預測面板那顆「＋ 收為兼容碼」在用（一鍵收下，不必進編輯模式）；
   手動畫另一種拆法走 enterAltMode()。 */

/* ---------- 字與字之間的來回 ----------
   從「天」點進撞碼的「夫」，看完要回得了「天」。載入的路徑很多（佇列、相關字、
   重碼、預測…），所以不在 load() 裡記，而是「明確跳轉」時才推入堆疊。 */
let backStack = [];
async function goTo(c) {
  if (!c || c === cur) return;
  if (dirty || zigenDirty) await save();
  if (cur) backStack.push(cur);
  await load(c);
}
function renderBack() {
  const b = $('#back');
  const prev = backStack[backStack.length - 1];
  b.classList.toggle('hide', !prev);
  if (prev) b.textContent = `← 返回 ${prev}`;
}
$('#back').onclick = async () => {
  const prev = backStack.pop();
  if (!prev) return;
  if (dirty || zigenDirty) await save();
  await load(prev);            /* 返回不再推堆疊，不然兩個字之間會無限來回 */
};

/* ---------- 檢查：這個拆解有沒有違反已訂的原則 ----------
   每一條都可以「忽略」——記在該字的 overrides 裡，下次不再提醒。 */
function bestMatch(strokeIdx, letter, med = medians) {
  const vec = Shape.strokeVec(strokeIdx.map(i => med[i]));
  if (!vec) return null;
  const pool = lib.filter(e => e.n === strokeIdx.length &&
    (letter === undefined || e.letter === letter));
  let best = null;
  for (const e of pool) {
    const d = Shape.dist(vec, e.vec);
    if (!best || d < best.d) best = { d, e };
  }
  return best;
}

/* ---------- 約定表 ----------
   取碼原則裡的「約定原則」是一張表（數字類、木字類…）。凡是列在表上的字，
   本來就明說了「凌駕筆順、能合不分」—— 那些原則對它不成立，不該再報成違規。 */
function convOf(ch) {
  const r = rules && rules.rules.find(x => x.id === 'convention' && x.enabled);
  if (!r || !r.groups) return null;
  for (const g of r.groups)
    for (const row of g.chars || [])
      if (row.c === ch && row.code) return { ...row, group: g.name || '約定' };
  return null;
}
/* 約定表裡「作為偏旁時另有取法」的字，不能拿去當別的字的偏旁範本
   —— 跟該字的 notComponent 是同一件事（例：二 單獨 II，當偏旁只算一個 I）。 */
const convStandaloneOnly = ch => {
  const c = convOf(ch);
  return !!(c && c.compCode && c.compCode !== c.code);
};

/* 這幾條原則講的是「怎麼切、怎麼合」—— 約定原則明說凌駕它們 */
const OVERRIDDEN_BY_CONVENTION = ['order', 'merge', 'lone', 'skip', 'skiplast', 'tier'];

/* 備註欄：這個字在約定表上的話，就不要再給一個「約定特例」的勾勾 ——
   同一件事有兩個地方可以填，兩邊就一定會不一致。約定表是唯一的來源。 */
function renderConv() {
  const box = $('#convbox');
  const cv = convOf(cur);
  box.innerHTML = '';
  $('#convlab').classList.toggle('hide', !!cv);
  if (!cv) return;
  const asComp = cv.compCode && cv.compCode !== cv.code;
  box.innerHTML =
    `<div class="convchip"><b>約定字</b>` +
    `<span class="g">${cv.group}</span>` +
    `<span>單獨成字 <code>${finalOf(cv.code)}</code></span>` +
    (asComp ? `<span>作為偏旁 <code>${cv.compCode}</code>（不當偏旁範本）</span>`
            : '<span class="m">作為偏旁時同上</span>') +
    `<a href="/rules" target="_blank">去約定表改 →</a></div>` +
    '<div class="newz">筆順、能合不分、孤筆略過、優次等對這個字都不適用（約定原則凌駕）。</div>';
}

/* 教它「這個部件作為偏旁時另有取法」：寫進約定表的「作為偏旁時的碼」。
   例：金 單獨成字 AFV，作為偏旁（銀、鐵）YFV —— 兩者都對，看它站在哪裡。 */
async function teachCompCode(ch, compCode) {
  const r = rules && rules.rules.find(x => x.id === 'convention');
  if (!r) return;
  const rec = codes[ch] || {};
  const standalone = rec.code ? finalOf(rec.code) : '';
  const code = (prompt(
    `「${ch}」作為偏旁時取什麼碼？\n\n` +
    `單獨成字：${standalone || '（還沒取碼）'}\n` +
    `你在「${cur}」裡取的是：${compCode}`, compCode) || '').toUpperCase().replace(/[^A-Z]/g, '');
  if (!code) return;

  r.groups = r.groups || [];
  let g = r.groups.find(x => (x.chars || []).some(y => y.c === ch));
  if (!g) {
    const names = r.groups.map((x, i) => `${i + 1}. ${x.name || '（未命名）'}`).join('\n');
    const pick = prompt(`「${ch}」要放進約定表的哪一類？\n\n${names}\n\n` +
      '輸入編號；或直接輸入新的分類名稱。', '偏旁另有取法');
    if (pick === null) return;
    const n = parseInt(pick, 10);
    if (!isNaN(n) && n >= 1 && n <= r.groups.length) g = r.groups[n - 1];
    else { g = { name: pick.trim() || '偏旁另有取法', note: '單獨成字與作為偏旁時取法不同', chars: [] };
           r.groups.push(g); }
  }
  g.chars = g.chars || [];
  const row = g.chars.find(x => x.c === ch);
  if (row) { row.code = row.code || standalone; row.compCode = code; row.standaloneOnly = true; }
  else g.chars.push({ c: ch, code: standalone, compCode: code, standaloneOnly: true });

  await putGuarded('/api/rules', JSON.stringify(rules, null, 2), 'rules');
  window.__baseStamp.rules = await fetch('/api/state').then(s => s.json()).then(s => s.rules);
  compIndex = null;                 /* 部件庫要用新的偏旁碼重建 */
  $('#status').textContent = `已記住：「${ch}」作為偏旁取 ${code}（單獨成字 ${standalone || '—'}）`;
  $('#status').className = 'saved';
  renderChecks(); auditAll();
}

/* 把一個字加進約定表：檢查列的「約定特例」按鈕會走這條路 ——
   與其在這個字身上偷偷插一個旗標，不如讓它出現在那張大家都看得到的表上。 */
async function addToConvention(ch) {
  const r = rules && rules.rules.find(x => x.id === 'convention');
  if (!r) return false;
  r.groups = r.groups || [];
  const names = r.groups.map((g, i) => `${i + 1}. ${g.name || '（未命名）'}`).join('\n');
  const pickTxt = prompt(
    `把「${ch}」加進約定表的哪一類？\n\n${names}\n\n` +
    '輸入編號；或直接輸入新的分類名稱。', String(r.groups.length || 1));
  if (pickTxt === null) return false;
  let g;
  const n = parseInt(pickTxt, 10);
  if (!isNaN(n) && n >= 1 && n <= r.groups.length) g = r.groups[n - 1];
  else { g = { name: pickTxt.trim() || '約定', note: '', chars: [] }; r.groups.push(g); }
  g.chars = g.chars || [];
  const code = codes[ch] && codes[ch].code ? finalOf(codes[ch].code) : '';
  const row = g.chars.find(x => x.c === ch);
  if (row) row.code = row.code || code;
  else g.chars.push({ c: ch, code });
  await putGuarded('/api/rules', JSON.stringify(rules, null, 2), 'rules');
  window.__baseStamp.rules = await fetch('/api/state').then(s => s.json()).then(s => s.rules);
  $('#status').textContent = `「${ch}」已加進約定表（${g.name}）`;
  $('#status').className = 'saved';
  return true;
}

/* ctx = {ch, segs, skipped, medians, nStrokes} —— 目前這個字，或佇列裡任何一個字 */
function checks(ctx) {
  const { segs, skipped, medians, nStrokes } = ctx;
  const bestMatch2 = (idx, letter) => bestMatch(idx, letter, medians);
  const out = [];
  const thr = zigen.meta.merge_threshold || Zigen.SAME_SHAPE;
  /* 每個字根有自己的門檻（你說過「這不是 X」就會收緊）—— 檢查必須照它的，
     不然收緊了警告還在，等於沒學到。 */
  const thrOf = e => (e && e.shape && e.shape.thr != null) ? e.shape.thr : thr;
  const on = id => rules && rules.rules.find(r =>
    r.id === id && r.enabled && r.kind === 'enforced');
  const TIER_NAME = { primary: '優等', secondary: '次等', tertiary: '三等' };
  /* 警告一定要講清楚「是哪幾筆」——只說「第 3 個字根」，等於要你自己去數 */
  const SN = idx => `第 ${[...idx].sort((a, b) => a - b).map(i => i + 1).join('、')} 筆`;

  /* 1. 筆順原則：字根要按首筆先後排列 */
  if (on('stroke_order') && segs.length > 1) {
    const firsts = segs.map(s => Math.min(...s.strokes));
    const sorted = [...firsts].every((v, i) => i === 0 || firsts[i - 1] <= v);
    if (!sorted) out.push({ key: 'order', lvl: 'warn', rule: '筆順原則',
      msg: '字根沒有按首筆先後排列。' });
  }

  segs.forEach((sg, i) => {
    const mine = bestMatch2(sg.strokes, sg.letter);
    const any = bestMatch2(sg.strokes);

    /* 2. 這組筆畫跟你選的字母的既有字根對不上，但很像別的字母的字根 */
    if (any && any.d < thrOf(any.e) && (!mine || mine.d >= thrOf(mine.e)) &&
        any.e.letter !== sg.letter) {
      out.push({ key: `letter:${i}`, lvl: 'warn', rule: '字根比對', refs: [i],
        fix: { type: 'letter', i, to: any.e.letter,
               label: `改成 ${any.e.letter}` },
        reject: { letter: any.e.letter, zlabel: any.e.label, strokes: sg.strokes },
        msg: `第 ${i + 1} 個字根（${SN(sg.strokes)}）指派給 <b>${sg.letter}</b>，但它的形狀跟 ` +
             `<b>${any.e.letter}</b> 的既有字根 ${any.e.label} 幾乎一樣（距離 ${any.d.toFixed(3)}）。` });
    }
    /* 3. 全新的形狀：不是錯，只是提醒會新增一條字根 */
    else if (!mine || mine.d >= thrOf(mine.e)) {
      out.push({ key: `new:${i}`, lvl: 'info', rule: '新字根', refs: [i],
        msg: `第 ${i + 1} 個字根（${SN(sg.strokes)}，${sg.letter}）是新形狀，` +
             `儲存後會在 ${sg.letter} 底下新增一條字根。` });
    }
    /* 3b. 併進了既有字根 —— 但只是「勉強算同一個」的話，你有權不同意。
           不然它會悄悄被算成別的字根，字根表上只多一個計次，你根本看不到。 */
    else if (mine.d > thrOf(mine.e) * 0.35) {
      out.push({ key: `absorb:${i}`, lvl: 'info', rule: '併入既有字根', refs: [i],
        split: { i, letter: sg.letter, strokes: sg.strokes },
        msg: `第 ${i + 1} 個字根（${SN(sg.strokes)}，${sg.letter}）會<b>併入既有字根 ${mine.e.label}</b>` +
             `（距離 ${mine.d.toFixed(3)}，門檻 ${thrOf(mine.e)}）—— ` +
             '不是新字根，字根表上只會多一個計次。如果你覺得這是不同的形狀，請另立新字根。' });
    }

    /* 4. 優次等原則：用了次／三等，但同一組筆畫也配得上某個優等字根。
          只有在那個優等字根屬於「別的字母」時才要緊 —— 同一個字母的話，
          取到哪一條字根都是同一個碼，沒有任何影響，不該拿來煩你。 */
    if (on('tier_priority') && mine && mine.d < thrOf(mine.e) && mine.e.tier !== 'primary') {
      const better = lib.filter(e => e.n === sg.strokes.length && e.tier === 'primary' &&
                                     e.letter !== sg.letter)
        .map(e => ({ e, d: Shape.dist(Shape.strokeVec(sg.strokes.map(k => medians[k])), e.vec) }))
        .filter(x => x.d < thrOf(x.e)).sort((a, b) => a.d - b.d)[0];
      if (better) out.push({ key: `tier:${i}`, lvl: 'warn', rule: '優次等原則', refs: [i],
        fix: { type: 'letter', i, to: better.e.letter,
               label: `改成 ${better.e.letter}` },
        reject: { letter: better.e.letter, zlabel: better.e.label, strokes: sg.strokes },
        msg: `第 ${i + 1} 個字根（${SN(sg.strokes)}）用的是 <b>${TIER_NAME[mine.e.tier]}</b>字根 ${mine.e.label}` +
             `（取 <b>${sg.letter}</b>），但同一組筆畫也配得上<b>優等</b>字根 ` +
             `${better.e.label}（取 <b>${better.e.letter}</b>）—— 碼會不一樣。` });
    }
  });

  /* 5. 能合不分：相鄰兩個字根若能併成一個既有字根，就不該分兩碼。
        編號用 segs 陣列裡的實際位置 —— 畫面上的序號是那個，不是筆順排序後的位置。 */
  if (on('merge_over_split')) {
    const order = segs.map((s, i) => ({ s, i }))
      .sort((a, b) => Math.min(...a.s.strokes) - Math.min(...b.s.strokes));
    for (let k = 0; k + 1 < order.length; k++) {
      const a = order[k], b = order[k + 1];
      const union = [...a.s.strokes, ...b.s.strokes].sort((x, y) => x - y);
      const m = bestMatch2(union);
      if (m && m.d < thrOf(m.e)) out.push({ key: `merge:${a.i}-${b.i}`, lvl: 'warn',
        rule: '能合不分原則', refs: [a.i, b.i],
        fix: { type: 'merge', a: a.i, b: b.i, to: m.e.letter,
               label: `合併成一個 ${m.e.letter}` },
        reject: { letter: m.e.letter, zlabel: m.e.label, strokes: union },
        msg: `第 ${a.i + 1}、${b.i + 1} 個字根（${SN(union)}）合起來剛好是既有字根 ${m.e.label}` +
             `（<b>${m.e.letter}</b>）—— 可以一碼取盡，不必分兩碼。` });
    }
  }

  /* 6b. 孤筆略過原則：中途落單的橫／豎不該自己取一碼，應該略過 */
  const sk0 = on('skip_isolated_hv');
  if (sk0) segs.forEach((sg, i) => {
    if (sg.strokes.length !== 1) return;
    const st = sg.strokes[0];
    const kind = kindOf(medians[st]);
    if (!sk0.params.allow.includes(kind)) return;
    if (st === nStrokes - 1) return;                 /* 末筆有例外，另一條檢查管 */
    out.push({ key: `lone:${i}`, lvl: 'warn', rule: '孤筆略過原則', refs: [i],
      teach: { stroke: st, kind },
      fix: { type: 'skip', i, stroke: st, label: '略過這一筆' },
      msg: `第 ${i + 1} 個字根只有一筆（${SN([st])}，${kind}），而且不是末筆。` +
           `依原則，無法與其他筆畫組成字根的孤立${kind}應該<b>略過</b>，不取碼。` });
  });

  /* 6. 孤筆略過原則：只有指定的筆畫可以略過；末筆孤立的橫應取指定字母 */
  const sk = on('skip_isolated_hv');
  if (sk) for (const i of skipped) {
    const kind = kindOf(medians[i]);
    if (!sk.params.allow.includes(kind)) {
      out.push({ key: `skip:${i}`, lvl: 'warn', rule: '孤筆略過原則', strokeRefs: [i],
        msg: `第 ${i + 1} 筆是「${kind}」，不在可略過的筆畫（${sk.params.allow.join('、')}）之內。` });
    } else {
      const map = sk.params.last_stroke_letters ||
        (sk.params.last_stroke_letter ? { 橫: sk.params.last_stroke_letter } : {});
      const L = map[kind];
      if (L && i === nStrokes - 1)
        out.push({ key: `skiplast:${i}`, lvl: 'warn', rule: '孤筆略過原則', strokeRefs: [i],
          fix: { type: 'unskip', stroke: i, to: L, label: `改取 ${L}` },
          msg: `末筆是孤立的${kind}，依原則應取 <b>${L}</b>，不是略過。` });
    }
  }

  /* 這個字列在約定表上嗎？約定原則明說「凌駕筆順、能合不分」——
     那就不該再把「沒照筆順、沒合起來」報成違規；降成說明，不再要求你處理。 */
  const cv = convOf(ctx.ch);
  if (cv) {
    const code = segs.map(s => s.letter).join('');
    for (const c of out) {
      if (!OVERRIDDEN_BY_CONVENTION.includes(c.key.split(':')[0])) continue;
      c.lvl = 'info';
      c.conv = true;
      c.rule = `${c.rule}　←　被「約定原則」凌駕（${cv.group}）`;
      c.msg += `　<b>「${ctx.ch}」在約定表上（${cv.group}：${cv.code}）</b>，` +
               '約定原則凌駕筆順與能合不分 —— 這不算違規。';
    }
    /* 但如果拆出來的碼跟約定表上寫的不一樣，那就真的要講一聲 */
    if (code && finalOf(code) !== finalOf(cv.code))
      out.unshift({ key: 'conv', lvl: 'warn', rule: '約定原則',
        msg: `約定表上「${ctx.ch}」是 <b>${finalOf(cv.code)}</b>（${cv.group}），` +
             `這裡卻取成 <b>${finalOf(code)}</b> —— 兩邊要一致。`,
        fix: null });
  }
  return out;
}

/* 「這其實不是 X」—— 把那個字根的門檻收緊到「配不上這組筆畫」為止。
   這不是把警告關掉而已：以後任何字裡，離它這麼遠的形狀都不會再被當成它。
   （字根的專屬門檻，不動全域，也不影響別的字根。） */
async function rejectMatch(r) {
  const vec = Shape.strokeVec(r.strokes.map(i => medians[i]));
  if (!vec) return;
  const globalThr = zigen.meta.merge_threshold || Zigen.SAME_SHAPE;
  const thrOf = e => (e.shape.thr != null) ? e.shape.thr : globalThr;

  /* 「這不是 X」＝ 這個字母底下，任何一個字根都不該配上這組筆畫。
     只收緊剛好被點名的那一個是不夠的：同一個字母常常有好幾個同筆數的字根
     （X 的 後[789] 與 戰[131415] 都是三筆），收緊一個，另一個馬上頂上來，
     警告看起來就「按了也不會消失」。所以要把「現在配得上的」全部收緊。 */
  const hits = lib
    .filter(e => e.letter === r.letter && e.n === r.strokes.length)
    .map(e => ({ e, d: Shape.dist(vec, e.vec) }))
    .filter(x => x.d < thrOf(x.e));
  if (!hits.length) {
    alert(`${r.letter} 底下已經沒有字根配得上這組筆畫了。`);
    return;
  }

  /* 收緊之後，本來靠這些字根取碼的字會不會配不上？先算給你看 */
  const casualties = new Set();
  const plans = [];
  for (const { e, d } of hits) {
    const cur = thrOf(e);
    const tight = Math.max(0.005, +(d * 0.9).toFixed(4));
    if (tight >= cur) continue;
    plans.push({ e, tight, cur, d });
    for (const [ch, rec] of Object.entries(codes)) {
      if (!rec.segments) continue;
      const g = await Zigen.getGlyph(ch);
      if (!g) continue;
      for (const sg of rec.segments) {
        if (sg.letter !== r.letter || sg.strokes.length !== e.n) continue;
        const v = Shape.strokeVec(sg.strokes.map(i => g.medians[i]));
        if (!v) continue;
        const dd = Shape.dist(v, e.vec);
        if (dd < cur && dd >= tight) { casualties.add(ch); break; }
      }
    }
  }
  if (!plans.length) { alert('不需要再收緊。'); return; }

  const cas = [...casualties];
  const msg =
    `把 ${r.letter} 底下這 ${plans.length} 個字根的門檻收緊，` +
    '以後都不會再把這組筆畫當成它們：\n\n' +
    plans.map(p => `　${p.e.label}：${p.cur} → ${p.tight}（這組筆畫距離 ${p.d.toFixed(3)}）`).join('\n') +
    '\n\n' +
    (cas.length
      ? `注意：有 ${cas.length} 個已取碼的字（${cas.slice(0, 10).join('')}${
          cas.length > 10 ? '…' : ''}）本來就是靠這些字根配上的，收緊之後會配不上，` +
        '會在佇列裡顯示警告。\n\n要繼續嗎？'
      : '沒有已取碼的字會受影響。');
  if (!confirm(msg)) return;

  for (const p of plans) p.e.shape.thr = p.tight;
  zigenDirty = true;
  await save();
  await resyncZigen();
  $('#status').textContent = `學會了：這不是 ${r.letter}`;
  $('#status').className = 'saved';
}

/* 改完字根表之後，一律從伺服器讀回再重建字根庫 —— 
   不然畫面會停在舊的比對結果（收緊了門檻，檢查卻還在講舊的字根）。 */
async function resyncZigen() {
  zigen = await fetch('/api/zigen').then(r => r.json());
  stamp = await fetchStamp();
  window.__baseStamp = await fetch('/api/state').then(r => r.json());
  lib = await Zigen.buildLibrary(zigen);
  libInfo();
  renderSegs(); suggest(); predict(); auditAll();
}

/* 「這是不同的形狀，另立新字根」——
   把該字母底下所有「現在配得上它」的字根都收緊（不然收緊一個、另一個馬上頂上來），
   並把這個字從它們的例字／計次裡拿掉，然後重存 —— merge() 找不到對象，就會新增一條。 */
async function splitOutZigen(r) {
  const vec = Shape.strokeVec(r.strokes.map(i => medians[i]));
  if (!vec) return;
  const globalThr = zigen.meta.merge_threshold || Zigen.SAME_SHAPE;
  const thrOf = e => (e.shape.thr != null) ? e.shape.thr : globalThr;

  const hits = lib
    .filter(e => e.letter === r.letter && e.n === r.strokes.length)
    .map(e => ({ e, d: Shape.dist(vec, e.vec) }))
    .filter(x => x.d < thrOf(x.e));
  if (!hits.length) { alert('它本來就不會併入任何字根。'); return; }

  const plans = hits.map(({ e, d }) => ({
    e, d, cur: thrOf(e), tight: Math.max(0.005, +(d * 0.9).toFixed(4)),
  })).filter(p => p.tight < p.cur);
  if (!plans.length) { alert('不需要再收緊。'); return; }

  if (!confirm(
      `把「${cur}」的這組筆畫獨立成 ${r.letter} 的新字根。\n\n` +
      `同時收緊這些既有字根的門檻，免得它又被吸回去：\n` +
      plans.map(p => `　${p.e.label}：${p.cur} → ${p.tight}（距離 ${p.d.toFixed(3)}）`).join('\n') +
      '\n\n要繼續嗎？')) return;

  for (const p of plans) {
    p.e.shape.thr = p.tight;
    /* 這個字本來被算進那條字根，拿回來 */
    if (p.e.shape.seen) p.e.shape.seen = p.e.shape.seen.filter(c => c !== cur);
    if (p.e.shape.count) p.e.shape.count = Math.max(1, p.e.shape.count - 1);
  }
  zigenDirty = true;
  await save();                       /* merge() 這時找不到對象 → 自動新增一條 */
  await resyncZigen();                /* 從伺服器讀回，畫面才不會停在舊狀態 */
  $('#status').textContent = `已另立 ${r.letter} 的新字根`;
  $('#status').className = 'saved';
}

/* 把某一條檢查建議的改法直接套上去 */
function applyFix(f) {
  if (f.type === 'letter') {
    segs[f.i].letter = f.to;
  } else if (f.type === 'merge') {
    const a = segs[f.a], b = segs[f.b];
    const strokes = [...new Set([...a.strokes, ...b.strokes])].sort((x, y) => x - y);
    const keep = Math.min(f.a, f.b), drop = Math.max(f.a, f.b);
    segs[keep] = { strokes, letter: f.to };
    segs.splice(drop, 1);
  } else if (f.type === 'skip') {
    segs.splice(f.i, 1);
    skipped = [...new Set([...skipped, f.stroke])].sort((x, y) => x - y);
  } else if (f.type === 'component') {
    const set = new Set(f.strokes);
    segs = segs.filter(sg => !sg.strokes.some(i => set.has(i)));
    skipped = skipped.filter(i => !set.has(i));
    for (const sg of f.segs) segs.push({ strokes: [...sg.strokes], letter: sg.letter });
    skipped = [...new Set([...skipped, ...f.skipped])].sort((a, b) => a - b);
    segs.sort((a, b) => Math.min(...a.strokes) - Math.min(...b.strokes));
  } else if (f.type === 'unskip') {
    skipped = skipped.filter(i => i !== f.stroke);
    segs.push({ strokes: [f.stroke], letter: f.to });
    segs.sort((x, y) => Math.min(...x.strokes) - Math.min(...y.strokes));
  }
  sel = [];
  touch();
  drawGlyph(); renderSegs(); suggest(); predict();
}

function renderCheckRow(c, rec) {
  const d = el('div', 'chk ' + c.lvl);
  d.dataset.key = c.key;
  highlightOn(d, c);
  d.append(el('span', 'ic', c.lvl === 'warn' ? '⚠' : 'ℹ'));
  const body = el('div', 'body');
  body.innerHTML = `${c.msg} <span class="rule">— ${c.rule}</span>`;
  d.append(body);

  const act = el('div', 'act');
  if (c.split) {
    const sp = el('button', 'apply', '另立新字根');
    sp.title = '這是不同的形狀：獨立成一條新字根，並收緊會吸走它的既有字根';
    sp.onclick = () => splitOutZigen(c.split);
    act.append(sp);
  }
  if (c.lvl === 'warn') {
    if (c.fix) {
      const ap = el('button', 'apply', c.fix.label);
      ap.title = '照建議改，碼會跟著更新';
      ap.onclick = () => applyFix(c.fix);
      act.append(ap);
    }
    if (c.reject) {
      const rj = el('button', '', `這不是 ${c.reject.letter}`);
      rj.title = '把那個字根的門檻收緊，以後不會再把這種形狀當成它';
      rj.onclick = () => rejectMatch(c.reject);
      act.append(rj);
    }
    /* 筆型判錯了？教它一次，以後所有字都受用 —— 不必每個字忽略一遍 */
    if (c.teach) {
      const fx = el('button', '', `這不是${c.teach.kind}`);
      fx.title = '糾正筆型，系統會記住這種形狀';
      fx.onclick = async () => {
        const k = prompt(
          `第 ${c.teach.stroke + 1} 筆，系統判成「${c.teach.kind}」。正確是？\n` +
          '（橫／豎／撇／捺／點／折／斜）', '撇');
        if (k && '橫豎撇捺點折斜'.includes(k)) await teachKind(c.teach.stroke, k);
      };
      act.append(fx);
    }
    /* 「金」單獨成字是 AFV（上面是人字頭 A），但作為偏旁（銀、鐵）人字頭壓扁了取 Y，
       整個是 YFV —— 這不是誰錯了，是這個部件本來就有兩種取法。
       說一聲，寫進約定表的「作為偏旁時的碼」，以後所有含它的字都照這個比。 */
    if (c.compConv) {
      const cc = el('button', 'apply', `「${c.compConv.ch}」作為偏旁取 ${c.compConv.code}`);
      cc.title = `「${c.compConv.ch}」單獨成字取 ${c.compConv.standalone}，` +
                 `作為偏旁時取 ${c.compConv.code} —— 寫進約定表，以後不再提醒`;
      cc.onclick = () => teachCompCode(c.compConv.ch, c.compConv.code);
      act.append(cc);
    }
    /* 它根本認錯了部件：形狀像不代表就是它（碼 的前兩筆像「厂」，其實是「石」的頭）。
       這不是破例，是誤判 —— 說一聲，這個字以後就不再拿那個部件來比。 */
    if (c.notComp) {
      const nb = el('button', '', `這不是「${c.notComp}」`);
      nb.title = `這幾筆只是長得像「${c.notComp}」，並不是它；` +
                 `以後在「${cur}」裡不要再拿「${c.notComp}」來比對（不算破例）`;
      nb.onclick = () => excludeComponent(rec, c.notComp);
      act.append(nb);
    }
    /* 那個「範本字」本身才是特例（例：二 單獨成字取 II，但作為部件只算一個 I）*/
    if (c.except) {
      const ex = el('button', '', `「${c.except}」是特例`);
      ex.title = `把「${c.except}」標成約定特例：它自己這樣拆，但不再當別的字的偏旁範本`;
      ex.onclick = () => markNotComponent(c.except);
      act.append(ex);
    }
    /* 一條警告可以有三種下場，意思完全不同，所以分開記（分析頁也分開列）：
         約定特例  這個字（多半是簡單的獨體字，例：上、二）就是約定這樣拆，
                   明知違反原則也照做，而且不當別的字的偏旁範本
         忽略      這個字確實破例，理由不成體系，就是不想理
         確認遵守  拆法其實沒違反原則，是檢查看錯了（誤判，該修的是我們的邏輯）
       前兩者是真的特例，最後一個不是。 */
    for (const [label, title, act_] of [
      ['約定特例', `「${cur}」是約定這樣拆的（多半是簡單獨體字）：明知違反這條原則也照做，` +
                   '而且不再拿它當別的字的偏旁範本', 'conventional'],
      ['忽略', '這個字確實破例，但我要它這樣，不用再提醒', 'overrides'],
      ['確認遵守原則', '我的拆法其實沒有違反這條原則，是系統判斷錯了（記成誤判，不算特例）', 'compliant'],
    ]) {
      const bt = el('button', '', label);
      bt.title = title;
      bt.onclick = () => setDisposition(rec, c, act_);
      act.append(bt);
    }
  }
  if (act.children.length) d.append(act);
  return d;
}

/* 一條警告的三種下場（都不再提醒，但意思不同，見 renderCheckRow 的說明） */
const DISPOS = {
  conventional: { ic: '約', tag: '約定特例：這個字就是這樣拆，不當別人的偏旁範本' },
  overrides:    { ic: '⊘', tag: '已忽略：這個字破例' },
  compliant:    { ic: '✓', tag: '你已確認：其實遵守原則，是系統誤判' },
};
const FIELDS = Object.keys(DISPOS);
const muted = rec => new Set(FIELDS.flatMap(f => rec[f] || []));
const disposOf = (rec, key) => FIELDS.find(f => (rec[f] || []).includes(key));

async function setDisposition(rec, c, field) {
  let why = null;
  if (field === 'compliant') {
    why = prompt(`確認這個拆法其實遵守「${c.rule}」。系統哪裡看錯了？（可留空）\n\n` +
      `它說：${c.msg.replace(/<[^>]+>/g, '')}`, '');
    if (why === null) return;                       /* 按取消就當沒事 */
  }
  for (const f of FIELDS) {                         /* 三選一，先清掉舊的 */
    if (!rec[f]) continue;
    rec[f] = rec[f].filter(k => k !== c.key);
    if (!rec[f].length) delete rec[f];
  }
  rec[field] = [...(rec[field] || []), c.key];
  if (why && why.trim()) rec.compliantWhy = { ...(rec.compliantWhy || {}), [c.key]: why.trim() };
  /* 約定特例＝這個字自己說了算 —— 那就把它寫進「約定表」，而不是在這個字身上
     偷偷插一個旗標。約定要寫在一個大家都看得到的地方，才不會兩邊講不一樣的話。 */
  if (field === 'conventional' && !convOf(cur)) {
    await addToConvention(cur);
    compIndex = null;
    renderConv();
  }
  await muteCheck(rec);
}
/* key 前綴 → 原則名（用來描述已經不再出現的舊警告，那時拿不到 c.rule） */
const RULE_OF = { order: '筆順原則', letter: '字根比對', new: '新字根', absorb: '併入既有字根',
  tier: '優次等原則', merge: '能合不分原則', lone: '孤筆略過原則', skip: '孤筆略過原則',
  skiplast: '孤筆略過原則', comp: '偏旁一致性' };

/* 「這幾筆不是『厂』」—— 認錯部件，不是破例。記在這個字上，以後不再拿它比對。 */
async function excludeComponent(rec, ch) {
  rec.excludeComp = [...new Set([...(rec.excludeComp || []), ch])];
  compIndex = null;
  await muteCheck(rec);
}
async function unexcludeComponent(rec, ch) {
  rec.excludeComp = (rec.excludeComp || []).filter(x => x !== ch);
  if (!rec.excludeComp.length) delete rec.excludeComp;
  compIndex = null;
  await muteCheck(rec);
}

async function unmute(rec, key) {
  for (const f of FIELDS) {
    if (!rec[f]) continue;
    rec[f] = rec[f].filter(k => k !== key);
    if (!rec[f].length) delete rec[f];
  }
  if (rec.compliantWhy) {
    delete rec.compliantWhy[key];
    if (!Object.keys(rec.compliantWhy).length) delete rec.compliantWhy;
  }
  await muteCheck(rec, key);          /* 還原之後，把那條警告指的地方點亮給他看 */
}
async function muteCheck(rec, flashKey) {   /* 壓下／還原／改判之後都要做的事 */
  codes[cur] = rec;
  touch(); renderChecks();
  if (flashKey) flashCheck(flashKey);
  audit.set(cur, await auditChar(cur)); markQueue(cur);
}

/* 還原一條警告，卻沒有任何動靜，等於沒還原 —— 所以：捲到那一列、框起來、
   標成「未處理」，並把它指的筆畫「釘住」點亮（不是閃一下就沒了），
   直到你去碰別的東西為止。 */
let pinned = null;
function unpin() {
  if (!pinned) return;
  pinned.row.classList.remove('flash');
  pinned.row.querySelector('.pinbadge')?.remove();
  pinned.row.onmouseleave?.();
  pinned = null;
}
function flashCheck(key, tries = 0) {
  const row = document.querySelector(`.chk[data-key="${CSS.escape(key)}"]`);
  if (!row) {                       /* 偏旁一致性是非同步算的，晚一點才會出現 */
    if (tries < 12) setTimeout(() => flashCheck(key, tries + 1), 250);
    return;
  }
  unpin();
  row.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  row.classList.add('flash');
  const b = el('span', 'pinbadge', '↩ 已還原：這條警告回到未處理，圖上標出的就是它說的筆畫');
  row.querySelector('.body').append(b);
  row.onmouseenter?.();                        /* 點亮它指的那幾筆，並且釘住 */
  pinned = { row, key };
}
/* 碰到別的地方就取消釘選（點字、滑過別條警告都算） */
document.addEventListener('pointerdown', e => {
  if (pinned && !pinned.row.contains(e.target)) unpin();
}, true);

/* 已壓下的警告仍要看得見 —— 否則點進字裡只看到一片安靜，
   根本不知道自己當初到底放過了什麼。滑過去一樣會點亮它指的筆畫。 */
function renderMutedRow(c, rec) {
  const field = disposOf(rec, c.key) || 'overrides';
  const d = el('div', 'chk muted');
  d.dataset.key = c.key;
  highlightOn(d, c);
  d.append(el('span', 'ic', DISPOS[field].ic));
  const body = el('div', 'body');
  const why = rec.compliantWhy && rec.compliantWhy[c.key];
  body.innerHTML = `${c.msg} <span class="rule">— ${c.rule}（${DISPOS[field].tag}` +
    `${field === 'compliant' && why ? '：' + why.replace(/</g, '&lt;') : ''}）</span>`;
  d.append(body);
  const act = el('div', 'act');
  const un = el('button', '', '還原');
  un.title = '恢復提醒這條警告（會標出它指的筆畫）';
  un.onclick = () => unmute(rec, c.key);
  act.append(un);
  /* 改判成另外兩種 */
  const NAME = { conventional: '約定特例', overrides: '忽略', compliant: '其實遵守原則' };
  for (const f of FIELDS) {
    if (f === field) continue;
    const sw = el('button', '', `改成：${NAME[f]}`);
    sw.onclick = () => setDisposition(rec, c, f);
    act.append(sw);
  }
  d.append(act);
  return d;
}

let compRun = 0;
async function renderChecksAsync(syncList) {
  const run = ++compRun;
  const extra = await componentWarnings();
  if (run !== compRun) return;
  const rec = codes[cur] || {};
  const off = muted(rec);
  const box = $('#checks'), zone = box.querySelector('.mutedzone');
  if (!zone) return;
  const ok = box.querySelector('.chk.ok');
  if (ok && extra.some(c => !off.has(c.key))) ok.remove();
  for (const c of extra) if (!off.has(c.key)) box.prepend(renderCheckRow(c, rec));
  for (const c of extra) if (off.has(c.key)) zone.append(renderMutedRow(c, rec));

  /* 舊的壓制紀錄：警告已經不再出現（拆法改了、規則改了），但紀錄還在。
     列出來，不然它會永遠躺在檔案裡，分析頁還一直把這個字算成特例。 */
  const live = new Set([...syncList, ...extra].map(c => c.key));
  for (const key of off) {
    if (live.has(key)) continue;
    zone.append(renderMutedRow({ key, msg: '<i>這條警告目前已經不會出現了</i>',
      rule: RULE_OF[key.split(':')[0]] || key.split(':')[0] }, rec));
  }
  if (zone.children.length) zone.prepend(el('div', 'mutedhd', '已處理（不再提醒）'));
}

function renderChecks() {
  const box = $('#checks'); box.innerHTML = '';
  pinned = null;                    /* 舊的列已經被砍掉了，別再抓著它 */
  const rec = codes[cur] || {};
  const off = muted(rec);
  const list = checks({ ch: cur, segs, skipped, medians, nStrokes: strokes.length });
  const active = list.filter(c => !off.has(c.key));

  /* 碼有了、筆畫分組還沒有：從約定表寫進來的碼會這樣（現有字根拼不出那個碼時，
     只寫了碼）。畫面本來一片空白，什麼都不說 —— 至少要告訴他還缺什麼。 */
  if (!segs.length && rec.code && !rec.segments) {
    const cv = convOf(cur);
    box.innerHTML = `<div class="chk warn"><span class="ic">⚠</span><div class="body">` +
      `碼表裡「${cur}」的碼是 <b>${finalOf(rec.code)}</b>` +
      (cv ? `（來自約定表的「${cv.group}」）` : '') +
      '，但<b>還沒有筆畫分組</b> —— 現有字根拼不出這個碼，所以當初只寫了碼。<br>' +
      '請直接點筆畫、按字母，把它湊出來（湊出來的字根會自動進字根表）。' +
      '</div></div>';
    return;
  }
  if (!segs.length) { box.innerHTML = '<div class="newz">還沒取碼。</div>'; return; }
  if (!active.length) {
    box.innerHTML = '<div class="chk ok"><span class="ic">✓</span>' +
      '<div class="body">符合目前所有「會執行」的取碼原則。</div></div>';
  }
  for (const c of active) box.append(renderCheckRow(c, rec));

  const zone = el('div', 'mutedzone');
  box.append(zone);
  for (const c of list) if (off.has(c.key)) zone.append(renderMutedRow(c, rec));
  /* 被你排除掉的部件也要看得見，不然它是一條看不到的隱形規則 */
  for (const ch of rec.excludeComp || []) {
    const d = el('div', 'chk muted');
    d.append(el('span', 'ic', '✓'));
    const body = el('div', 'body');
    body.innerHTML = `這個字裡沒有「<b>${ch}</b>」—— 你說過那幾筆只是長得像它。` +
      '<span class="rule">— 偏旁一致性（不再拿這個部件比對；不算破例）</span>';
    d.append(body);
    const act = el('div', 'act');
    const un = el('button', '', '還原');
    un.title = `以後又拿「${ch}」來比對這個字`;
    un.onclick = () => unexcludeComponent(rec, ch);
    act.append(un); d.append(act);
    zone.append(d);
  }
  renderChecksAsync(list);            /* 偏旁一致性要查別的字，慢，所以非同步補上 */
}

/* 滑過某條警告時，把它講的那幾個字根／筆畫在畫面上點亮 */
function highlightOn(elm, c) {
  const segRefs = c.refs || [];
  const stRefs = c.strokeRefs || segRefs.flatMap(i => segs[i] ? segs[i].strokes : []);
  elm.onmouseenter = () => {
    for (const i of segRefs)
      document.querySelector(`.seg[data-i="${i}"]`)?.classList.add('hl');
    const paths = document.querySelectorAll('#glyph g path');
    for (const i of stRefs) paths[i]?.classList.add('hl');
  };
  elm.onmouseleave = () => {
    document.querySelectorAll('.seg.hl').forEach(x => x.classList.remove('hl'));
    document.querySelectorAll('#glyph path.hl').forEach(x => x.classList.remove('hl'));
    /* 有釘住的那條就把它的亮點放回去，不然滑過別條警告一次，釘選就白釘了 */
    if (pinned && pinned.row !== elm && document.contains(pinned.row)) pinned.row.onmouseenter();
  };
}

/* ---------- 偏旁一致性：同一個部件，在別的字裡你是怎麼拆的？ ----------
   「主」你取 QE，那「住」裡的主（第 3-7 筆）也該是 QE；如果取成 IF 就是不一致。
   作法：把已取碼的字當成「部件庫」，看看它們有沒有整個嵌在目前這個字裡；
   有的話，比較那幾筆在兩邊的取法。 */
let compIndex = null;
let compStamp = null;

function buildComponentIndex() {
  const byLen = new Map();
  for (const [ch, rec] of Object.entries(codes)) {
    if (!rec.segments || !rec.segments.length) continue;
    /* 約定特例：這個字自己這樣拆，但不能當別的字的偏旁範本。
       例：「二」單獨成字取 I I，但兩橫作為部件只取一個 I —— 拿它當範本只會一直誤報。
       約定表裡填了「作為偏旁時的碼」而且跟單獨成字不同的，也是同一回事。 */
    if (rec.notComponent) continue;
    const g = _medCache.get(ch);
    if (!g) continue;
    const n = g.length;
    if (n < 2 || n > 14) continue;                 /* 太短沒意義、太長不會是部件 */
    const vec = Shape.strokeVec(g);
    if (!vec) continue;
    if (!byLen.has(n)) byLen.set(n, []);
    /* 「作為偏旁時的碼」—— 金 單獨成字是 AFV（上面那個人字頭取 A），
       但作為偏旁（銀、鐵）人字頭壓扁了，取 Y，整個是 YFV。
       約定表上填了偏旁碼的字，比對時就要拿偏旁碼去比，不是拿它單獨成字的碼。 */
    const cv = convOf(ch);
    const asComp = cv && cv.compCode ? cv.compCode : null;
    byLen.get(n).push({ ch, vec, segs: rec.segments, skipped: rec.skipped || [],
                        code: asComp || rec.code || rec.segments.map(s => s.letter).join(''),
                        convComp: !!asComp });
  }
  compIndex = byLen;
  compStamp = window.__baseStamp && window.__baseStamp.codes;
}

/* ctx = {ch, segs, skipped, medians}；不給就是畫面上這個字。
   （要能替「任何一個字」算，清理失效紀錄時要把 800 個字都跑一遍。） */
async function componentWarnings(ctx) {
  const { ch: CH, segs: SG, skipped: SK, medians: MED } =
    ctx || { ch: cur, segs, skipped, medians };
  if (!MED || !MED.length || !SG.length) return [];
  /* 部件庫要用到別的字的中線 */
  const need = Object.keys(codes).filter(c => c !== CH && codes[c].segments);
  await primeMedians(need);
  if (!compIndex || compStamp !== (window.__baseStamp && window.__baseStamp.codes))
    buildComponentIndex();

  const n = MED.length;
  const out = [];
  const usedRanges = [];
  /* 你說過「這幾筆不是那個部件」的，就別再拿它來比 ——
     形狀像不等於就是它：碼 的前兩筆長得像「厂」，但那是「石」的頭。 */
  const excluded = new Set((codes[CH] && codes[CH].excludeComp) || []);

  /* 由大到小找：住 的第 3-7 筆同時「像三」也「像主」，該報的是主（比較大的那個部件），
     不然會一直被更小的部件搶走。 */
  const sizes = [...compIndex.keys()].filter(k => k < n).sort((a, b) => b - a);
  for (const k of sizes) {
    const list = compIndex.get(k);
    for (let i = 0; i + k <= n; i++) {
      const idx = [...Array(k)].map((_, j) => i + j);
      if (usedRanges.some(r => idx.some(x => r.includes(x)))) continue;
      const v = Shape.strokeVec(idx.map(x => MED[x]));
      if (!v) continue;

      /* 這一段筆畫「長得像」哪些已取碼的字？門檻收緊一點 ——
         整字比對用全域門檻太鬆，主 與 立 都會互相配上。 */
      const cands = list
        .filter(c => c.ch !== CH && !excluded.has(c.ch))
        .map(c => ({ c, d: Shape.dist(v, c.vec) }))
        .filter(x => x.d < 0.15)
        .sort((a, b) => a.d - b.d);
      if (!cands.length) continue;

      /* 我這邊怎麼取這幾筆？ */
      const set = new Set(idx);
      const mineSegs = SG.filter(sg => sg.strokes.some(x => set.has(x)));
      const union = new Set(mineSegs.flatMap(sg => sg.strokes));
      const mineSkip = SK.filter(x => set.has(x));
      /* 只有「我的字根剛好蓋住這幾筆、沒有跨出去」時才好比較 */
      if (!mineSegs.length) continue;
      if ([...union].some(x => !set.has(x))) continue;
      if (union.size + mineSkip.length !== set.size) continue;

      const mineCode = mineSegs
        .sort((a, b) => Math.min(...a.strokes) - Math.min(...b.strokes))
        .map(sg => sg.letter).join('');

      /* 部件的碼會隨「它站在哪裡」而變 —— 而且這不是特例，是同一條原則的必然結果：
         孤筆略過原則說「孤立的橫略過，除非它是末筆，末筆取 I」。
         「畫」自己那一橫是末筆 → 取 I → EFOTI；
         「劃」裡的畫不在字尾（後面還有刂）→ 那一橫就是中途的孤筆 → 略過 → EFOT。
         所以比對前要按位置把樣板的碼重算一次，不能拿它單獨成字的碼硬比。 */
      const atEnd = idx[idx.length - 1] === n - 1;
      const expected = c => {
        if (atEnd || !c.segs || !c.segs.length) return c.code;
        const sk = rule('skip_isolated_hv');
        if (!sk) return c.code;
        const lastLetters = sk.params.last_stroke_letters ||
          (sk.params.last_stroke_letter ? { 橫: sk.params.last_stroke_letter } : {});
        const tail = c.segs[c.segs.length - 1];
        const tn = Math.max(...c.segs.flatMap(s => s.strokes),
                            ...(c.skipped || [])) + 1;      /* 樣板字的筆數 */
        /* 樣板的最後一碼，是不是「單獨一筆、而且就是末筆、而且靠末筆規則才取到」？ */
        const isLastStrokeRule = tail.strokes.length === 1 &&
          tail.strokes[0] === tn - 1 &&
          Object.values(lastLetters).includes(tail.letter);
        return isLastStrokeRule ? c.code.slice(0, -1) : c.code;
      };

      /* 只要跟其中任何一個「長得像」的字取法一致，就算一致 —— 不必都一樣 */
      if (cands.some(x => expected(x.c) === mineCode)) { usedRanges.push(idx); continue; }

      const best = cands[0].c;
      const want = expected(best);
      out.push({
        key: `comp:${best.ch}:${i}`, lvl: 'warn', rule: '偏旁一致性',
        refs: mineSegs.map(sg => SG.indexOf(sg)),
        strokeRefs: idx,
        /* 偏旁碼是約定表填的，那個字自己的筆畫分組拆出來是別的碼 ——
           拿它去「照著拆」只會拆出錯的碼，所以這種情況不給自動修正 */
        fix: best.convComp ? null : {
          type: 'component', strokes: idx, from: best.ch,
          /* 樣板的末筆規則在這裡不成立時，那一筆要改成「略過」，不能照抄 */
          segs: best.segs
            .filter(sg => want === best.code || sg !== best.segs[best.segs.length - 1])
            .map(sg => ({ letter: sg.letter, strokes: sg.strokes.map(x => i + x) })),
          skipped: [...best.skipped.map(x => i + x),
                    ...(want === best.code ? []
                        : best.segs[best.segs.length - 1].strokes.map(x => i + x))],
          label: `照「${best.ch}」的拆法（${want}）`,
        },
        /* 「金」單獨成字是 AFV，作為偏旁才是 YFV —— 一鍵把這件事寫進約定表 */
        compConv: best.convComp ? null : { ch: best.ch, code: mineCode, standalone: best.code },
        except: best.ch,
        notComp: best.ch,        /* 也可能是「這幾筆根本不是那個部件」—— 見 excludeComp */
        msg: `第 ${idx.map(x => x + 1).join('、')} 筆就是「<b>${best.ch}</b>」，` +
             (best.convComp
               ? `約定表說它<b>作為偏旁時取 ${best.code}</b>，這裡卻取成 <b>${mineCode}</b> —— 不一致。`
               : want !== best.code
                 ? `「${best.ch}」單獨成字取 <b>${best.code}</b>，但它不在這個字的字尾，` +
                   `末筆的孤立筆畫要略過 → 這裡應該取 <b>${want}</b>，你卻取成 <b>${mineCode}</b>。`
                 : `但你在「${best.ch}」裡取的是 <b>${best.code}</b>，這裡卻取成 <b>${mineCode}</b> —— 不一致。`),
      });
      usedRanges.push(idx);
    }
  }
  return out;
}

/* 把某個字標成「約定特例」：它自己怎麼拆是它的事，但不再當別的字的偏旁範本 */
async function markNotComponent(ch) {
  const rec = codes[ch];
  if (!rec) return;
  if (!confirm(
      `把「${ch}」標成約定特例。\n\n` +
      `它自己的碼（${rec.code || ''}）不變，但以後不會再拿它去比對別的字的偏旁 ——\n` +
      '也就是不會再問你「這裡為什麼跟它拆得不一樣」。\n\n' +
      '（例：二 單獨成字取 II，但兩橫作為部件只算一個 I。）')) return;
  rec.notComponent = true;
  compIndex = null;
  await putGuarded('/api/codes', JSON.stringify(codes), 'codes');
  $('#status').textContent = `「${ch}」已標為約定特例`;
  $('#status').className = 'saved';
  renderSegs(); renderRelated(cur); auditAll();
}

/* ---------- 相關字 ----------
   訴 → 言、斥、斤（這個字由哪些部件組成），外加「同「言」旁的字」一整組。

   部件用的是 makemeahanzi 的 IDS 結構拆分（訴 = ⿰言斥），不是拿形狀去猜。
   以前用形狀猜，訴 的下半在幾何上很像「下」，就真的把「下」報成部件 —— 而且
   「斤」「斥」只要沒取過碼就永遠不會出現（那時的部件庫只認已取碼的字）。
   結構是查得到的事實，沒有理由用猜的。 */
const IDS_OPS = '⿰⿱⿲⿳⿴⿵⿶⿷⿸⿹⿺⿻';
let ids = {};                 /* 字 → 拆分字串 */
let compOf = null;            /* 部件 → 用到它的字（只算已取碼的） */

/* 單筆的「部件」不是偏旁，是筆畫 —— 列出來只是雜訊 */
const STROKEISH = new Set([...'丶一丨丿乀乁乚亅㇏丷丶']);

/* 拆到哪裡為止？—— 拆到「你已經取過碼的東西」為止。
   訴 = ⿰言斥：言 你取過碼（IIO），停；斥 沒取過，再拆 → 斤（＋丶，丟掉）。
   結果正好是 言、斥、斤 —— 你要的那三個。
   反過來如果無腦遞迴，言 會再被拆成 亠、二、口，整排都是廢話。 */
function partsOf(ch, depth = 2, seen = new Set()) {
  const d = ids[ch];
  if (!d || depth <= 0) return [];
  const out = [];
  for (const c of d) {
    if (IDS_OPS.includes(c) || c === ch || seen.has(c)) continue;
    if (!/[㐀-鿿]/.test(c) || STROKEISH.has(c)) continue;
    seen.add(c);
    out.push(c);
    /* 已經取過碼的部件就是終點：它對你已經是一個「認得的東西」，不必再拆 */
    const coded = codes[c] && codes[c].segments && codes[c].segments.length;
    if (!coded) for (const sub of partsOf(c, depth - 1, seen)) out.push(sub);
  }
  return out;
}

/* 「同偏旁」只看第一層 —— 議、論、識 都是 ⿰言X，言 就在第一層。
   若跟著遞迴下去，「口」會把 189 個字都算成同偏旁，那不叫偏旁，叫巧合。 */
function topParts(ch) {
  const d = ids[ch];
  if (!d) return [];
  return [...new Set([...d].filter(c =>
    !IDS_OPS.includes(c) && c !== ch && /[㐀-鿿]/.test(c) && !STROKEISH.has(c)))];
}

function buildCompIndex() {
  compOf = new Map();
  for (const [c, rec] of Object.entries(codes)) {
    if (!rec.segments || !rec.segments.length) continue;
    for (const p of topParts(c)) {
      if (!compOf.has(p)) compOf.set(p, []);
      compOf.get(p).push(c);
    }
  }
}

let relRun = 0;
async function renderRelated(ch) {
  const box = $('#related');
  box.innerHTML = '';
  const run = ++relRun;
  if (!ids[ch]) return;
  if (!compOf) buildCompIndex();
  if (run !== relRun) return;

  const go = c => goTo(c);        /* 相關字也走同一條路，這樣一樣回得來 */
  const chip = (c, cls = '') => {
    const rec = codes[c] || {};
    const a = el('a', cls + (rec.code ? '' : ' todo'));
    a.append(el('span', 'rc', c));
    a.append(el('span', 'rk', rec.code || '未取碼'));
    a.title = rec.code ? `${c} = ${rec.code} —— 點一下去看它怎麼拆` : `${c} 還沒取碼 —— 點一下去取`;
    a.onclick = () => go(c);
    return a;
  };

  const parts = partsOf(ch, 2).filter(p => p !== ch);
  if (parts.length) {
    box.append(el('span', 'lab', '部件：'));
    for (const p of parts) box.append(chip(p));
  }

  /* 同偏旁的一整組：同「言」旁的字（議、論、識…）—— 收起來，要看再展開。
     只對這個字「第一層」的部件開組，不然 訴 會冒出一個「同口旁」的 189 字。 */
  const top = new Set(topParts(ch));
  for (const p of parts) {
    if (!top.has(p)) continue;
    const fam = (compOf.get(p) || []).filter(c => c !== ch);
    if (fam.length < 2) continue;
    const wrap = el('span', 'fam');
    const bt = el('button', '', `同「${p}」旁　${fam.length} 字 ▾`);
    const list = el('span', 'famlist hide');
    for (const c of fam.slice(0, 80)) list.append(chip(c, 'up'));
    bt.onclick = () => {
      const opening = list.classList.contains('hide');
      /* 一次只開一個，不然兩個浮層疊在一起 */
      for (const other of box.querySelectorAll('.famlist')) other.classList.add('hide');
      for (const b2 of box.querySelectorAll('.fam > button'))
        b2.textContent = b2.textContent.replace('▴', '▾');
      list.classList.toggle('hide', !opening);
      bt.textContent = `同「${p}」旁　${fam.length} 字 ${opening ? '▴' : '▾'}`;
    };
    wrap.append(bt, list);
    box.append(wrap);
  }

  /* 反過來：哪些字把「這個字」當部件用 */
  const usedIn = (compOf.get(ch) || []).slice(0, 10);
  if (usedIn.length) {
    box.append(el('span', 'lab', '　用到它：'));
    for (const c of usedIn) box.append(chip(c, 'up'));
  }
}

/* ---------- 整字預測 ---------- */
let predBusy = false;
/* 還沒被指派、也沒被略過的筆畫 */
const restStrokes = () => strokes.map((_, i) => i)
  .filter(i => !segs.some(s => s.strokes.includes(i)) && !skipped.includes(i));

let partial = false;

async function predict() {
  const box = $('#predopts');
  if (!lib.length) {
    box.innerHTML = '<span class="newz">字根表還是空的 — 先手動取幾個字，我就能開始預測。</span>';
    return;
  }
  if (!medians.length || predBusy) return;

  const rest = restStrokes();
  partial = rest.length < strokes.length;      /* 已取了一部分 → 預測「接下來」 */
  $('#predtitle').textContent = partial
    ? `預測接下來的拆解（還剩 ${rest.length} 筆）`
    : '預測拆解（依你已建立的字根）';
  if (!rest.length) {
    box.innerHTML = '<span class="newz" style="color:var(--ok)">所有筆畫都處理完了。</span>';
    return;
  }

  predBusy = true;
  box.innerHTML = '<span class="newz">計算中…</span>';
  await new Promise(r => setTimeout(r, 10));       /* 讓瀏覽器先畫出「計算中」 */

  const thr = zigen.meta.merge_threshold || Zigen.SAME_SHAPE;
  const merge = rule('merge_over_split'), sk = rule('skip_isolated_hv'),
        tp = rule('tier_priority');
  /* 只拿剩下的筆畫去預測；索引壓縮後再映射回原本的筆序 */
  const raw = Zigen.predict(rest.map(i => medians[i]), lib, {
    thr,
    segPenalty: merge ? merge.params.seg_penalty : 0.05,
    skip: sk ? { penalty: sk.params.penalty, allow: sk.params.allow,
                 learned: learned.stroke_kinds,
                 lastLetters: sk.params.last_stroke_letters ||
                   (sk.params.last_stroke_letter ? { 橫: sk.params.last_stroke_letter } : {}) } : null,
    tierPenalty: tp ? (tp.params?.penalty ?? 0.05) : 0,
  });
  const out = raw.map(r => ({
    ...r,
    segments: r.segments.map(sg => ({ ...sg, strokes: sg.strokes.map(k => rest[k]) })),
    skipped: (r.skipped || []).map(k => rest[k]),
  }));

  predBusy = false;
  box.innerHTML = '';
  if (!out.length) {
    box.innerHTML = `<span class="newz">${partial ? '剩下的筆畫' : '這個字'}` +
      '用現有字根還拆不出來。</span>';
    return;
  }
  out.forEach((p, i) => {
    const full = p.covered === p.total;
    const row = el('div', 'prow');

    /* 整組套用 */
    const b = el('div', 'po');
    b.append(el('span', 'c', p.segments.map(s => s.letter).join('')));
    b.append(el('span', 'm', (full ? '整組套用'
      : `部分拆解 ${p.covered}/${p.total} 筆`) +
      (p.skipped && p.skipped.length ? `　略過 ${p.skipped.length} 筆` : '')));
    b.title = '套用整組拆解';
    b.onclick = () => {
      const add = p.segments.map(s => ({ strokes: [...s.strokes], letter: s.letter }));
      segs = partial ? [...segs, ...add] : add;
      skipped = [...new Set([...(partial ? skipped : []), ...(p.skipped || [])])]
        .sort((a, b) => a - b);
      sel = []; touch(); drawGlyph(); renderSegs(); suggest(); predict();
    };
    if (i === 0 && full) b.style.borderColor = 'var(--accent)';
    if (!full) b.style.borderStyle = 'dashed';
    row.append(b);

    /* 預測出來、但跟你的主碼不同的完整拆法 —— 正是最該收成兼容碼的東西：
       電腦照原則推出來的拆法，別的使用者也很可能這樣拆。 */
    const rec = codes[cur] || {};
    const pcode = p.segments.map(s => s.letter).join('');
    if (full && !partial && rec.code && pcode !== rec.code &&
        !(rec.alts || []).some(a => a.code === pcode)) {
      const ab = el('button', 'addalt', '＋ 收為兼容碼');
      ab.title = `把 ${pcode} 也收為可接受的碼（主碼 ${rec.code} 不變）`;
      ab.onclick = () => addAlt(p.segments, p.skipped);
      row.append(ab);
    }

    /* 逐個字根：你只認同前面幾個的話，就只點那幾個 */
    const one = el('div', 'pseg');
    for (const sg of p.segments) {
      const t = el('button', '');
      t.innerHTML = `<b>${sg.letter}</b><span>第 ${sg.strokes.map(k => k + 1).join(',')} 筆</span>`;
      t.title = `只採用這一個字根（${sg.label}）`;
      t.onclick = () => applyOneSegment(sg);
      one.append(t);
    }
    for (const st of (p.skipped || [])) {
      const t = el('button', 'sk');
      t.innerHTML = `<b>略</b><span>第 ${st + 1} 筆</span>`;
      t.title = '只採用這個「略過」';
      t.onclick = () => {
        if (segs.some(s => s.strokes.includes(st)) || skipped.includes(st)) return;
        skipped = [...skipped, st].sort((a, b) => a - b);
        sel = []; touch(); drawGlyph(); renderSegs(); suggest(); predict();
      };
      one.append(t);
    }
    row.append(one);
    box.append(row);
  });
}
$('#repredict').onclick = predict;

/* 只採用預測裡的某一個字根（其餘照你自己的意思拆）*/
function applyOneSegment(sg) {
  /* 那幾筆若已經被指派或略過，就不能再取 */
  if (sg.strokes.some(i => segs.some(s => s.strokes.includes(i)) || skipped.includes(i))) return;
  segs.push({ strokes: [...sg.strokes], letter: sg.letter });
  segs.sort((a, b) => Math.min(...a.strokes) - Math.min(...b.strokes));
  sel = [];
  touch(); drawGlyph(); renderSegs(); suggest(); predict();
}

/* ---------- 載入一個字 ---------- */
async function load(c) {
  cur = c; sel = []; segs = []; skipped = [];
  const g = await Zigen.getGlyph(c);
  if (!g) { $('#cur').textContent = `${c}：沒有筆畫資料`; strokes = []; medians = []; drawGlyph(); return; }
  strokes = g.strokes; medians = g.medians;
  const rec = codes[c];
  if (rec && rec.segments) segs = rec.segments.map(s => ({ strokes: [...s.strokes], letter: s.letter }));
  if (rec && rec.skipped) skipped = [...rec.skipped];
  $('#cur').innerHTML = `<b>${c}</b><span>${strokes.length} 筆</span>`;
  $('#note').value = (rec && rec.note) || '';
  $('#notcomp').checked = !!(rec && rec.notComponent);
  renderConv();          /* 約定表上有這個字的話，備註欄改成指過去的連結 */
  drawGlyph(); renderSegs(); suggest(); renderQueue(); renderCangjie(c); strokeOrder(c);
  renderRelated(c); renderBack();
  predict();          /* 已取碼的字也要預測：還沒指派的筆畫才有「接下來」可看 */
}

/* ---------- 官方倉頡對照 ----------
   只是拿來比較「別人怎麼拆」，不影響你的取碼。倉頡 24 個字母各對應一個字根，
   所以可以把碼還原成字根（明＝ab＝日月）。 */
const CJ_RADICAL = {
  A: '日', B: '月', C: '金', D: '木', E: '水', F: '火', G: '土', H: '竹',
  I: '戈', J: '十', K: '大', L: '中', M: '一', N: '弓', O: '人', P: '心',
  Q: '手', R: '口', S: '尸', T: '廿', U: '山', V: '女', W: '田', X: '難',
  Y: '卜', Z: '重',
};
let cangjie = null;

/* 倉頡對照：預設收起，點開才載入拆碼圖。
   圖用倉頡字典的原圖，不自己重畫 —— 倉頡常常把「一筆切成兩半」分屬不同碼
   （例：囗的收口筆），我們的筆畫資料根本表達不了，重畫必然是錯的。 */
let cjOpen = false;

async function renderCangjie(c) {
  const box = $('#cj');
  if (!box) return;
  box.innerHTML = '';
  const code = cangjie && cangjie[c];
  if (!code) {
    box.innerHTML = '<span class="none">倉頡碼表沒有這個字。</span>';
    return;
  }

  const row = el('div', 'cj');
  const toggle = el('button', 'cjtoggle', cjOpen ? '▾ 拆碼圖' : '▸ 拆碼圖');
  toggle.onclick = () => { cjOpen = !cjOpen; renderCangjie(c); };
  for (const L of code) {
    const k = el('div', 'k');
    k.append(el('div', 'r', CJ_RADICAL[L] || '?'));
    k.append(el('div', 'l', L));
    row.append(k);
  }
  row.append(el('span', 'code', code));
  row.append(toggle);
  box.append(row);

  if (!cjOpen) return;

  const holder = el('div', 'cjmap');
  holder.innerHTML = '<span class="cjnote">拆碼圖載入中…</span>';
  box.append(holder);

  const url = '/api/cjimg?c=' + encodeURIComponent(c);
  const ok = await fetch(url, { method: 'GET' }).then(r => r.ok).catch(() => false);
  if (c !== cur) return;
  if (!ok) {
    holder.innerHTML = '<span class="cjnote">這個字沒有拆碼圖。</span>';
    return;
  }
  holder.innerHTML =
    `<img src="${url}" alt="${c} 倉頡拆碼圖" class="cjimg">` +
    '<div class="cjnote">拆碼圖來自 <a href="https://倉頡字典.com" target="_blank" ' +
    'rel="noopener">倉頡字典.com</a>。倉頡會把一筆切開分屬不同碼，' +
    '所以直接看原圖，不用我們的筆畫重畫。</div>';
}

/* ---------- 官方筆順參考 ----------
   大陸：makemeahanzi（PRC 筆順）。台灣：教育部《國字標準字體筆順學習網》資料（g0v/zh-stroke-data）。
   香港教育局的筆順沒有公開資料集，只能給查詢連結。 */
async function strokeOrder(c) {
  const box = $('#so'); box.innerHTML = '';
  const seq = (paths, viewBox) => {
    const g = el('div', 'so-g');
    paths.forEach((d, i) => {
      const s = el('div', 'so-s');
      s.innerHTML = `<svg viewBox="${viewBox}">` +
        paths.slice(0, i).map(p => `<path class="p" d="${p}"/>`).join('') +
        `<path class="c" d="${d}"/></svg><i>${i + 1}</i>`;
      g.append(s);
    });
    return g;
  };
  /* 大陸筆順：就是取碼用的這份資料 */
  const prc = el('div', 'so-row');
  const t1 = el('div', 'so-t');
  t1.innerHTML = `<b>大陸</b><span>PRC · ${strokes.length} 筆（本頁取碼所依據）</span>`;
  prc.append(t1);
  prc.append(seq(strokes.map(d => d), '0 0 1024 1024'));
  prc.querySelectorAll('svg').forEach(sv => {
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('transform', Shape.SVG_TF);
    while (sv.firstChild) g.append(sv.firstChild);
    sv.append(g);
  });
  box.append(prc);

  /* 台灣教育部筆順 */
  const tw = await fetch('/api/tw?c=' + encodeURIComponent(c)).then(r => r.ok ? r.json() : null);
  const twRow = el('div', 'so-row');
  const t2 = el('div', 'so-t');
  if (tw) {
    const diff = tw.strokes.length !== strokes.length;
    t2.innerHTML = `<b>台灣</b><span>教育部標準 · ${tw.strokes.length} 筆` +
      (diff ? ' <span style="color:var(--warn)">筆數與大陸不同</span>' : '') + '</span>';
    twRow.append(t2);
    twRow.append(seq(tw.strokes, '0 0 2048 2048'));
  } else {
    t2.innerHTML = '<b>台灣</b>';
    twRow.append(t2);
    twRow.append(el('div', 'so-miss', '教育部資料只涵蓋 4,847 個常用字，此字不在其中。'));
  }
  box.append(twRow);

  /* 香港教育局：從《香港小學學習字詞表》的筆順示範解碼而來（隨用隨抓） */
  const hkRow = el('div', 'so-row');
  hkRow.innerHTML = '<div class="so-t"><b>香港</b><span>教育局 · 讀取中…</span></div>';
  box.append(hkRow);
  const hk = await fetch('/api/hk?c=' + encodeURIComponent(c))
    .then(r => (r.ok ? r.json() : null)).catch(() => null);
  if (c !== cur) return;                       /* 已經換字了，別把舊結果貼上去 */
  hkRow.innerHTML = '';
  const t3 = el('div', 'so-t');
  if (hk) {
    const diff = hk.strokes.length !== strokes.length;
    t3.innerHTML = `<b>香港</b><span>教育局 · ${hk.strokes.length} 筆` +
      (diff ? ' <span style="color:var(--warn)">筆數與大陸不同</span>' : '') + '</span>';
    hkRow.append(t3);
    const g = el('div', 'so-g');
    hk.strokes.forEach((s, i) => {
      const cell = el('div', 'so-s');
      cell.innerHTML = `<svg viewBox="${hk.viewBox}">` +
        hk.strokes.slice(0, i).map(q =>
          `<g transform="translate(${q.tx},${q.ty})"><path class="p" d="${q.d}"/></g>`).join('') +
        `<g transform="translate(${s.tx},${s.ty})"><path class="c" d="${s.d}"/></g></svg><i>${i + 1}</i>`;
      g.append(cell);
    });
    hkRow.append(g);
  } else {
    t3.innerHTML = '<b>香港</b>';
    hkRow.append(t3);
    hkRow.append(el('div', 'so-miss', '《香港小學學習字詞表》沒有收錄此字。'));
  }
}

/* ---------- 佇列：把「還有未處理警告」的字標紅 ----------
   每個已取碼的字都用同一套檢查跑一遍（在背景做，算完就更新徽章）。
   字根表或原則改了、或某個字存檔了，就重算。 */
const audit = new Map();        /* 字 → 未忽略的警告數 */
let auditRun = 0;

async function auditChar(ch) {
  const rec = codes[ch];
  if (!rec || !rec.segments || !rec.segments.length) return 0;
  const g = await Zigen.getGlyph(ch);
  if (!g) return 0;
  const list = checks({
    ch, segs: rec.segments, skipped: rec.skipped || [],
    medians: g.medians, nStrokes: g.strokes.length,
  });
  const off = muted(rec);
  return list.filter(c => c.lvl === 'warn' && !off.has(c.key)).length;
}

async function auditAll() {
  const run = ++auditRun;
  const done = Object.keys(codes).filter(isDone);
  for (const ch of done) {
    if (run !== auditRun) return;        /* 有更新的一輪在跑了，這輪作廢 */
    audit.set(ch, await auditChar(ch));
    markQueue(ch);
  }
  if (run === auditRun) pruneStale();
}

/* ---------- 清掉失效的壓制紀錄 ----------
   你「忽略」過的警告，後來因為改了拆法／字根／規則而不再觸發 —— 紀錄卻還躺在
   codes.json 裡。分析頁照樣把它算成一條特例，於是列出一長串嚇人的破例，點進去
   卻是「這條警告目前已經不會出現了」。

   所以：把每個字的檢查（含偏旁一致性）重跑一遍，凡是壓制紀錄對不上任何一條
   現存警告的，就刪掉。整份掃完只寫一次檔。 */
let pruning = false;
async function pruneStale() {
  if (pruning || dirty || zigenDirty) return;
  pruning = true;
  try {
    const chars = Object.keys(codes).filter(isDone);
    let removed = 0, touched = 0;
    for (const ch of chars) {
      const rec = codes[ch];
      const keys = new Set([...(rec.overrides || []), ...(rec.conventional || []),
                            ...(rec.compliant || [])]);
      if (!keys.size) continue;
      const g = await Zigen.getGlyph(ch);
      if (!g) continue;
      const ctx = { ch, segs: rec.segments, skipped: rec.skipped || [],
                    medians: g.medians, nStrokes: g.strokes.length };
      const live = new Set(checks(ctx).map(c => c.key));
      /* 偏旁一致性是另外算的（要比對別的字），但它也會留下 comp:… 紀錄 */
      if ([...keys].some(k => k.startsWith('comp:')))
        for (const c of await componentWarnings({ ch, segs: rec.segments,
              skipped: rec.skipped || [], medians: g.medians })) live.add(c.key);

      let hit = false;
      for (const f of ['overrides', 'conventional', 'compliant']) {
        if (!rec[f]) continue;
        const keep = rec[f].filter(k => live.has(k));
        if (keep.length === rec[f].length) continue;
        removed += rec[f].length - keep.length;
        hit = true;
        if (keep.length) rec[f] = keep; else delete rec[f];
      }
      if (hit) {
        touched++;
        if (rec.compliantWhy) {                      /* 理由也跟著走 */
          for (const k of Object.keys(rec.compliantWhy))
            if (!live.has(k)) delete rec.compliantWhy[k];
          if (!Object.keys(rec.compliantWhy).length) delete rec.compliantWhy;
        }
      }
    }
    if (removed && !dirty && !zigenDirty) {
      await putGuarded('/api/codes', JSON.stringify(codes), 'codes');
      $('#status').textContent = `清掉 ${removed} 條失效的紀錄（${touched} 個字）`;
      renderQueue();
    }
  } finally { pruning = false; }
}
function markQueue(ch) {
  for (const q of document.querySelectorAll('.qi'))
    if (q.dataset.c === ch) q.classList.toggle('warn', (audit.get(ch) || 0) > 0);
}
