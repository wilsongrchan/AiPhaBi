<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>愛發筆 — 碼表分析</title>
<style>
  :root {
    --bg:#faf9f7; --card:#fff; --ink:#1c1a17; --muted:#7c7568; --line:#e3ded4;
    --accent:#b4531f; --warn:#d98324; --ok:#2e7d4f; --bad:#c0392b;
    --bar:#c9c2b6;                 /* 一般長條：低調的灰（單一名目類別，不做深淺漸層） */
    /* 兩個系列（愛發筆 vs 倉頡）才需要第二個顏色。這一組通過了色盲分離檢查
       （最差 ΔE 74.7 protan）、亮度帶與對比檢查 —— 別隨手換色。 */
    --s1:#b4531f; --s2:#3a6ea5;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#16150f; --card:#1f1e18; --ink:#ece7dc; --muted:#9a9284; --line:#33312a;
            --accent:#e0894f; --warn:#e0a95c; --ok:#6bbd8e; --bad:#e57373;
            --bar:#4a463c;
            --s1:#cf7a45; --s2:#4f8ccc; }   /* 深色模式另外選過，不是把亮色反過來 */
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
    font:15px/1.6 -apple-system,"PingFang TC","Helvetica Neue",sans-serif; }
  header { position:sticky; top:0; z-index:5; background:var(--bg);
    border-bottom:1px solid var(--line); padding:12px 20px; display:flex; gap:12px;
    align-items:center; }
  h1 { font-size:16px; margin:0; font-weight:650; }
  nav { display:flex; gap:5px; }
  nav a { font-size:13px; color:var(--muted); text-decoration:none; padding:4px 9px;
    border:1px solid var(--line); border-radius:7px; }
  nav a.on { color:#fff; background:var(--accent); border-color:var(--accent); }
  .grow { flex:1; }
  button { font:inherit; font-size:13px; padding:5px 11px; border-radius:7px;
    border:1px solid var(--line); background:var(--card); color:var(--ink); cursor:pointer; }
  button:hover { border-color:var(--accent); color:var(--accent); }
  button.on { background:var(--accent); border-color:var(--accent); color:#fff; }

  main { max-width:1080px; margin:0 auto; padding:20px; }
  section { background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:16px 18px; margin-bottom:16px; }
  h2 { font-size:14px; margin:0 0 2px; font-weight:650; }
  .sub { font-size:12px; color:var(--muted); margin-bottom:14px; }

  /* KPI */
  .kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px;
    margin-bottom:16px; }
  .kpi { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px 14px; }
  .kpi .v { font:650 30px/1.1 ui-monospace,Menlo,monospace; }
  .kpi .l { font-size:12px; color:var(--muted); margin-top:3px; }
  .kpi.alert .v { color:var(--bad); }

  /* 長條圖 */
  .chart { display:grid; grid-template-columns:repeat(26,1fr); gap:6px; align-items:end;
    height:170px; position:relative; }
  .col { display:flex; flex-direction:column; justify-content:flex-end; align-items:center;
    height:100%; position:relative; cursor:default; }
  .bar { width:100%; max-width:24px; background:var(--bar);
    border-radius:4px 4px 0 0; min-height:2px; transition:background .1s; }
  .col.hot .bar { background:var(--accent); }
  .col.zero .bar { background:transparent; border-top:1px dashed var(--line); min-height:0; }
  .col:hover .bar { filter:brightness(.92); }
  .vlab { font:600 10px ui-monospace,monospace; color:var(--ink); margin-bottom:3px; height:12px; }
  .axis { display:grid; grid-template-columns:repeat(26,1fr); gap:6px; margin-top:5px; }
  .axis div { text-align:center; font:600 11px ui-monospace,monospace; color:var(--muted);
    display:flex; flex-direction:column; align-items:center; line-height:1.35; }
  .axis div.hot { color:var(--accent); }
  .axis .cjkey { font:12px "PingFang TC",serif; color:var(--s2); }   /* 倉頡字根：跟它的長條同色 */
  .meanline { position:absolute; left:0; right:0; border-top:1px dashed var(--line);
    pointer-events:none; }
  .meanline span { position:absolute; right:0; top:-15px; font-size:10px; color:var(--muted);
    background:var(--card); padding:0 3px; }

  /* 均勻度：一條線畫不出「平不平均」（平均值是算術定死的 100%÷26，任何分佈都一樣）。
     真正要看的是分散程度 —— 用「等效字母數」表示：熵取 2 的次方，直接讀成
     「這 26 個鍵，實際上只等於幾個鍵在平均分擔」。 */
  .evenness { display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    font-size:12px; color:var(--muted); margin:2px 0 10px; }
  .meter { position:relative; width:190px; height:7px; border-radius:4px;
    background:var(--bar); overflow:hidden; }
  .meter i { position:absolute; top:0; bottom:0; left:0; border-radius:4px; display:block; }
  .meter i.m1 { background:var(--s1); }
  .meter i.m2 { background:var(--s2); height:3px; top:auto; bottom:0; }
  .evenness b { color:var(--ink); font-weight:650; }
  .tip { position:fixed; z-index:20; background:var(--ink); color:var(--bg); font-size:12px;
    padding:5px 8px; border-radius:6px; pointer-events:none; display:none; white-space:nowrap; }

  table { width:100%; border-collapse:collapse; font-size:13px; }
  th, td { text-align:left; padding:6px 8px; border-bottom:1px solid var(--line); }
  th { font-size:11px; color:var(--muted); font-weight:600; letter-spacing:.05em; }
  td.code { font:700 14px ui-monospace,monospace; color:var(--accent); }
  td.chars { font-size:18px; font-family:"PingFang TC",serif; letter-spacing:.15em; }
  .pill { font-size:10px; padding:1px 6px; border-radius:20px; border:1px solid var(--line);
    color:var(--muted); }
  .pill.bad { color:var(--bad); border-color:var(--bad); }
  .empty { color:var(--muted); font-size:13px; font-style:italic; }
  .hide { display:none; }

  /* 特例：字要大到看得清筆畫，又要一眼數得出有幾個 */
  .exchars a { display:inline-block; font:20px/1.4 "PingFang TC",serif; color:inherit;
    text-decoration:none; padding:1px 4px; border-radius:6px; }
  .exchars a:hover { background:var(--bar); }
  .exgrp { padding:9px 0; border-bottom:1px solid var(--line); }
  .exgrp:last-child { border-bottom:0; }
  .exgrp .hd { font-size:12px; color:var(--muted); margin-bottom:3px; }
  .exgrp .hd b { color:var(--ink); font-weight:600; }
  .exgrp.bad .hd b { color:var(--bad); }
  .exhead { font-size:11px; font-weight:650; letter-spacing:.06em; color:var(--muted);
    margin:14px 0 0; padding-top:10px; border-top:1px solid var(--line); }
  .exhead:first-child { margin-top:0; padding-top:0; border-top:0; }
  .exhead.bad { color:var(--bad); }
  .revbtn { margin-left:8px; font-size:11px; padding:2px 8px; border-radius:20px;
    border:1px solid var(--line); background:var(--card); color:var(--ink); cursor:pointer; }
  .revbtn:hover { border-color:var(--accent); color:var(--accent); }

  /* 逐字複審：整個取碼頁嵌進來 —— 與其在這裡重寫一遍檢查邏輯，不如直接用那一頁 */
  .revwrap { position:fixed; inset:0; z-index:50; background:rgba(0,0,0,.45);
    display:flex; align-items:center; justify-content:center; }
  .revwrap.hide { display:none; }        /* 不然 .revwrap 的 flex 會蓋掉 .hide */
  .revbox { width:96vw; height:94vh; display:flex; flex-direction:column;
    background:var(--bg); border:1px solid var(--line); border-radius:14px; overflow:hidden; }
  .revhd { display:flex; align-items:center; gap:10px; padding:10px 14px;
    border-bottom:1px solid var(--line); background:var(--card); }
  .revhd button { font-size:12px; padding:4px 10px; border-radius:8px;
    border:1px solid var(--line); background:var(--bg); color:var(--ink); cursor:pointer; }
  .revhd button:hover { border-color:var(--accent); }
  .revstrip { display:flex; gap:4px; flex-wrap:wrap; padding:7px 14px;
    border-bottom:1px solid var(--line); background:var(--card); max-height:78px; overflow-y:auto; }
  .revstrip span { font:16px/1.2 "PingFang TC",serif; padding:2px 6px; border-radius:6px;
    cursor:pointer; border:1px solid transparent; }
  .revstrip span:hover { background:var(--bar); }
  .revstrip span.on { border-color:var(--accent); color:var(--accent); font-weight:600; }
  .revstrip span.done { color:var(--ok); }        /* 這個字的那條警告已經處理掉了 */
  .revwrap iframe { flex:1; width:100%; border:0; background:var(--bg); }

  /* 對照倉頡：同一個字母兩根細棒並排（不是疊在一起，疊了就看不出誰是誰） */
  .col .pair { display:flex; gap:2px; width:100%; max-width:26px; align-items:flex-end;
    height:100%; justify-content:center; }
  .col .pair .bar { max-width:11px; }
  .col .bar.s1 { background:var(--s1); }
  .col .bar.s2 { background:var(--s2); }
  .legend { display:flex; gap:14px; align-items:center; font-size:12px; color:var(--muted);
    margin:2px 0 8px; }
  .legend i { display:inline-block; width:11px; height:11px; border-radius:3px;
    margin-right:5px; vertical-align:-1px; }
</style>
</head>
<body>
<header>
  <h1>愛發筆</h1>
  <nav>
    <a href="/">字根表</a><a href="/annotate">逐字取碼</a><a href="/stats" class="on">碼表分析</a><a href="/rules">取碼原則</a><a href="/type">試打</a>
  </nav>
  <div class="grow"></div>
  <span id="meta" style="font-size:12px;color:var(--muted)"></span>
</header>

<main>
  <div class="kpis" id="kpis"></div>

  <section>
    <div style="display:flex;align-items:baseline;gap:10px">
      <div>
        <h2>字母使用頻率</h2>
        <div class="sub" id="freqsub">每個字母在碼表中出現的次數。橘色＝用得比平均多的字母。</div>
      </div>
      <div class="grow"></div>
      <button id="cjFreq">對照倉頡</button>
      <button id="tabFreq">表格</button>
    </div>
    <div class="legend hide" id="legAll"></div>
    <div class="evenness" id="evenAll"></div>
    <div class="chart" id="chartAll"></div>
    <div class="axis" id="axisAll"></div>
    <div id="tableAll" class="hide" style="margin-top:12px"></div>
  </section>

  <section>
    <div style="display:flex;align-items:baseline;gap:10px">
      <div>
        <h2>首碼分佈</h2>
        <div class="sub">每個字母作為「第一碼」的次數 — 這決定打字時第一下按鍵的負擔是否平均。</div>
      </div>
      <div class="grow"></div>
      <button id="cjFirst">對照倉頡</button>
      <button id="tabFirst">表格</button>
    </div>
    <div class="legend hide" id="legFirst"></div>
    <div class="evenness" id="evenFirst"></div>
    <div class="chart" id="chartFirst"></div>
    <div class="axis" id="axisFirst"></div>
    <div id="tableFirst" class="hide" style="margin-top:12px"></div>
  </section>

  <section>
    <h2>重碼</h2>
    <div class="sub" id="dupsub"></div>
    <div id="bylen" style="margin-bottom:14px"></div>
    <div id="dups"></div>
  </section>

  <section>
    <h2>特例</h2>
    <div class="sub">哪些字不照原則走。特例愈少，這套輸入法愈好教、也愈好記
      —— 這一節就是讓你看得見它們在累積。
      點「逐字複審」可以在這一頁裡把整組翻完，不必來回跳頁。</div>
    <div id="exceptions"></div>
  </section>
</main>

<!-- 逐字複審：把取碼頁整個嵌進來，翻頁不必離開分析頁 -->
<div id="rev" class="revwrap hide">
  <div class="revbox">
    <div class="revhd">
      <b id="revTitle"></b>
      <span id="revCount" class="sub" style="margin:0"></span>
      <span style="flex:1"></span>
      <button id="revPrev">← 上一個</button>
      <button id="revNext">下一個 →</button>
      <button id="revClose">關閉 (Esc)</button>
    </div>
    <div id="revStrip" class="revstrip"></div>
    <iframe id="revFrame"></iframe>
  </div>
</div>
<div class="tip" id="tip"></div>

<script src="/assets/shape.js"></script>
<script src="/assets/zigen.js"></script>
<script>
const $ = s => document.querySelector(s);
const el = (t, c, x) => { const e = document.createElement(t);
  if (c) e.className = c; if (x != null) e.textContent = x; return e; };
const LETTERS = [...'ABCDEFGHIJKLMNOPQRSTUVWXYZ'];
/* 倉頡的字母 → 字根（哲理／筆劃／人體／字形四類）。對照時標在字母底下，
   才知道自己的 J 是在跟人家的「十」比。X＝難（特殊碼）、Z 官方沒用。 */
const CJ_KEY = { A:'日', B:'月', C:'金', D:'木', E:'水', F:'火', G:'土', H:'竹', I:'戈',
  J:'十', K:'大', L:'中', M:'一', N:'弓', O:'人', P:'心', Q:'手', R:'口', S:'尸',
  T:'廿', U:'山', V:'女', W:'田', X:'難', Y:'卜', Z:'' };

let codes = {}, zigen = null, rules = null, cangjie = null, rank = new Map();

/* 打字實際要按的碼（超過上限的取前 head 碼 + 末碼）。統計、重碼都以它為準，
   而不是完整碼 —— 使用者按的是縮短後那幾個鍵。 */
const maxRule = () => rules && rules.rules.find(r =>
  r.id === 'max_code_length' && r.enabled && r.kind === 'enforced');
const finalOf = r => Zigen.shorten(r.code, maxRule());   /* 永遠現算，免得規則改了還用舊值 */

/* ---------- 長條圖 ----------
   一個系列時：名目類別 → 單一顏色，用得多的才染強調色 + 直接標數字。
   對照倉頡時：兩根細棒並排（不疊）。兩邊的字數不一樣多，所以一律以「佔比」比高低，
   不能比次數 —— 次數只有在同一個系列裡才有意義。 */
function bars(counts, chartId, axisId, tableId, cjCounts) {
  const chart = $(chartId), axis = $(axisId);
  chart.innerHTML = ''; axis.innerHTML = '';
  const cmp = !!cjCounts;
  const vals = LETTERS.map(L => counts[L] || 0);
  const total = vals.reduce((a, b) => a + b, 0);
  const cvals = cmp ? LETTERS.map(L => cjCounts[L] || 0) : [];
  const ctotal = cmp ? cvals.reduce((a, b) => a + b, 0) : 0;
  const pctOf = (v, t) => t ? v / t * 100 : 0;
  /* 比高低的量：單一系列看次數，對照時看佔比 */
  const my = vals.map(v => cmp ? pctOf(v, total) : v);
  const cj = cvals.map(v => pctOf(v, ctotal));
  const max = Math.max(1, ...my, ...cj);
  const mean = cmp ? 100 / 26 : total / 26;
  /* 資料太少時不做「偏重」判斷：三五個字就把半數字母染成橘色，只是雜訊 */
  const enough = total >= 40;
  const hot = i => !cmp && enough && vals[i] > mean * 1.5;

  LETTERS.forEach((L, i) => {
    const col = el('div', 'col' + (hot(i) ? ' hot' : '') + (!cmp && !vals[i] ? ' zero' : ''));
    /* 只標「過熱」的字母：每根都標數字反而沒人看。對照模式不標，兩排數字會打架 */
    col.append(el('div', 'vlab', hot(i) ? String(vals[i]) : ''));
    if (cmp) {
      const pair = el('div', 'pair');
      for (const [v, cls] of [[my[i], 's1'], [cj[i], 's2']]) {
        const b = el('div', 'bar ' + cls);
        b.style.height = `calc(${(v / max) * 100}% - 15px)`;
        pair.append(b);
      }
      col.append(pair);
    } else {
      const bar = el('div', 'bar');
      bar.style.height = `calc(${(my[i] / max) * 100}% - 15px)`;
      col.append(bar);
    }
    col.onmousemove = e => {
      const t = $('#tip');
      t.style.display = 'block';
      t.style.left = (e.clientX + 12) + 'px';
      t.style.top = (e.clientY - 30) + 'px';
      t.textContent = cmp
        ? `${L}　愛發筆 ${my[i].toFixed(1)}%（${vals[i]} 次）　` +
          `倉頡${CJ_KEY[L] ? `「${CJ_KEY[L]}」` : ''} ${cj[i].toFixed(1)}%（${cvals[i]} 次）`
        : `${L}　${vals[i]} 次　佔 ${pctOf(vals[i], total).toFixed(1)}%　（平均 ${mean.toFixed(1)}）`;
    };
    col.onmouseleave = () => $('#tip').style.display = 'none';
    chart.append(col);
    const ax = el('div', hot(i) ? 'hot' : '');
    ax.append(el('span', '', L));
    /* 對照時把倉頡的字根標在字母底下 —— 不然不知道自己的 J 是在跟人家的「十」比 */
    if (cmp) ax.append(el('span', 'cjkey', CJ_KEY[L] || '·'));
    axis.append(ax);
  });

  /* 這條線不是「資料的平均」——它是「若 26 個鍵完全平均分擔會在哪」的基準線
     （100% ÷ 26，任何分佈都畫在同一個地方）。只拿來讀「誰在線上、誰在線下」。
     真正的平不平均看上面的均勻度。 */
  if (total) {
    const ml = el('div', 'meanline');
    ml.style.bottom = `${(mean / max) * 100}%`;
    ml.append(el('span', '', cmp ? `均分基準 ${mean.toFixed(1)}%` : `均分基準 ${mean.toFixed(1)}`));
    chart.append(ml);
  }

  /* 表格檢視（無障礙：顏色以外的第二條路；對照時也把倉頡那一欄一起給） */
  const tbl = $(tableId);
  const head = cmp
    ? '<tr><th>字母</th><th>倉頡字根</th><th>愛發筆 次數</th><th>愛發筆 佔比</th><th>倉頡 佔比</th><th>差</th></tr>'
    : '<tr><th>字母</th><th>次數</th><th>佔比</th><th>字根數</th></tr>';
  const rows = LETTERS.map((L, i) => cmp
    ? `<tr><td>${L}</td><td>${CJ_KEY[L] || '—'}</td><td>${vals[i]}</td><td>${my[i].toFixed(1)}%</td>
         <td>${cj[i].toFixed(1)}%</td>
         <td style="color:var(--muted)">${(my[i] - cj[i] >= 0 ? '+' : '') + (my[i] - cj[i]).toFixed(1)}</td></tr>`
    : `<tr><td>${L}</td><td>${vals[i]}</td>
         <td>${pctOf(vals[i], total).toFixed(1)}%</td><td>${zigenCount[L] || 0}</td></tr>`).join('');
  tbl.innerHTML = `<table><thead>${head}</thead><tbody>${rows}</tbody></table>`;
}

let zigenCount = {};
let myAll = {}, myFirst = {}, cjAll = {}, cjFirst = {}, cjN = 0;
/* 兩張圖各自可以開關「對照倉頡」—— 疊在同一張圖上反而看不出誰是誰，
   所以是並排的兩根細棒，而且比的是佔比（兩邊的碼數不一樣多）。 */
const cmpOn = { all: false, first: false };

/* 「等效字母數」＝ 2^熵。26 個鍵完全平均分擔＝26；若只有一個鍵在用＝1。
   比平均線有用得多 —— 平均線是 100%÷26，任何分佈都畫在同一個地方，看不出平不平均。 */
function effLetters(counts) {
  const tot = LETTERS.reduce((s, L) => s + (counts[L] || 0), 0);
  if (!tot) return 0;
  let H = 0;
  for (const L of LETTERS) {
    const p = (counts[L] || 0) / tot;
    if (p > 0) H -= p * Math.log2(p);
  }
  return Math.pow(2, H);
}

function drawCharts() {
  const shots = [
    ['all', myAll, cjAll, '#chartAll', '#axisAll', '#tableAll', '#legAll', '#evenAll'],
    ['first', myFirst, cjFirst, '#chartFirst', '#axisFirst', '#tableFirst', '#legFirst', '#evenFirst'],
  ];
  for (const [k, mine, cj, c, a, t, lg, ev] of shots) {
    const on = cmpOn[k] && cjN > 0;
    bars(mine, c, a, t, on ? cj : null);
    $(lg).classList.toggle('hide', !on);
    if (on) $(lg).innerHTML =
      `<span><i style="background:var(--s1)"></i>愛發筆</span>` +
      `<span><i style="background:var(--s2)"></i>官方倉頡</span>` +
      `<span>—— 同一批 ${cjN} 個字，比的是<b>佔比</b>（兩邊碼數不同，比次數沒意義）</span>`;

    const e1 = effLetters(mine), e2 = effLetters(cj);
    $(ev).innerHTML = !e1 ? '' :
      `<span>均勻度</span>
       <span class="meter" title="等效字母數 ÷ 26">
         <i class="m1" style="width:${e1 / 26 * 100}%"></i>
         ${on ? `<i class="m2" style="width:${e2 / 26 * 100}%"></i>` : ''}
       </span>
       <span>26 個鍵，實際上只等於 <b>${e1.toFixed(1)}</b> 個鍵在平均分擔` +
      (on ? `（倉頡 <b>${e2.toFixed(1)}</b>）` : '') +
      `　—— 愈接近 26 愈平均。</span>`;
  }
}

function render() {
  const entries = Object.entries(codes).filter(([, r]) => r.code);
  const all = {}, first = {}, byCode = new Map();
  let codeLen = 0, cut = 0;
  for (const [ch, r] of entries) {
    const code = finalOf(r);                 /* ← 縮短後的碼 */
    if (code.length < r.code.length) cut++;
    codeLen += code.length;
    for (const L of code) all[L] = (all[L] || 0) + 1;
    first[code[0]] = (first[code[0]] || 0) + 1;
    if (!byCode.has(code)) byCode.set(code, []);
    byCode.get(code).push(ch);
  }

  /* 倉頡的字母分佈 —— 只數「我也取過碼」的那些字，不然是拿兩批不同的字在比 */
  cjAll = {}; cjFirst = {}; cjN = 0;
  if (cangjie) for (const [ch] of entries) {
    const code = (cangjie[ch] || '').toUpperCase();
    if (!code) continue;
    cjN++;
    for (const L of code) cjAll[L] = (cjAll[L] || 0) + 1;
    cjFirst[code[0]] = (cjFirst[code[0]] || 0) + 1;
  }
  zigenCount = {};
  for (const L of zigen.letters)
    zigenCount[L.letter] = L.intentions.reduce((n, i) => n + i.shapes.length, 0);

  const dups = [...byCode.entries()].filter(([, cs]) => cs.length > 1)
    .map(([code, cs]) => ({ code, chars: cs,
      best: Math.min(...cs.map(c => rank.get(c) ?? 99999)) }))
    .sort((a, b) => a.best - b.best);
  const dupChars = dups.reduce((n, d) => n + d.chars.length, 0);

  /* 兼容碼：同一個字也接受的另一種碼。它讓「拆錯也打得出來」，但也佔碼位 ——
     所以要把它造成的額外重碼算出來，代價要看得見。
     兩種來源：(1) 完整碼（被縮短的字自動兼容）(2) 你手動收的另一種拆法。 */
  const altN = entries.reduce((n, [, r]) => n + (r.alts || []).length, 0);
  const altChars = entries.filter(([, r]) => (r.alts || []).length).length;
  const withAlts = new Map(byCode);            /* 所有打得出字的碼一起佔的碼空間 */
  const put = (code, ch) => {
    if (!withAlts.has(code)) withAlts.set(code, []);
    if (!withAlts.get(code).includes(ch)) withAlts.get(code).push(ch);
  };
  for (const [ch, r] of entries) {
    if (r.code !== finalOf(r)) put(r.code, ch);            /* 完整碼：自動兼容 */
    for (const a of r.alts || []) {
      const f = Zigen.shorten(a.code, maxRule());
      put(f, ch);
      if (a.code !== f) put(a.code, ch);
    }
  }
  const dupAll = [...withAlts.values()].filter(cs => cs.length > 1)
    .reduce((n, cs) => n + cs.length, 0);

  const exN = renderExceptions(entries);

  /* KPI —— 一排數字，不需要做成圖 */
  const kpi = (v, l, alert) =>
    `<div class="kpi${alert ? ' alert' : ''}"><div class="v">${v}</div><div class="l">${l}</div></div>`;
  $('#kpis').innerHTML =
    kpi(entries.length, '已取碼字數') +
    kpi(entries.length ? (codeLen / entries.length).toFixed(2) : '—', '平均碼長') +
    kpi(dups.length, '重碼組', dups.length > 0) +
    kpi(entries.length ? (dupChars / entries.length * 100).toFixed(1) + '%' : '0%',
        '重碼率（重碼字 ÷ 已取碼字）', dupChars > 0) +
    kpi(Object.values(zigenCount).reduce((a, b) => a + b, 0), '字根總數') +
    kpi(`${cut}+${altN}`, `兼容碼（${cut} 個完整碼自動兼容＋${altN} 個手動收）`) +
    kpi(cut, '被縮短的字（超過碼長上限）') +
    kpi(entries.length ? (exN / entries.length * 100).toFixed(1) + '%' : '0%',
        `特例率（${exN} 字沒照原則走）`, entries.length > 0 && exN / entries.length > 0.2);

  myAll = all; myFirst = first;
  drawCharts();

  const hot = codeLen >= 40
    ? Object.entries(all).filter(([, v]) => v > (codeLen / 26) * 1.5)
        .sort((a, b) => b[1] - a[1]).map(([L]) => L)
    : [];
  $('#freqsub').innerHTML = '每個字母在碼表中出現的次數。橘色＝用得比平均多 50% 以上的字母。' +
    (codeLen < 40
      ? `　（取碼字數還太少，先取夠 ${Math.ceil((40 - codeLen) / 2.5)} 個字左右再看分佈才有意義。）`
      : hot.length
        ? `　目前偏重：<b>${hot.join(' ')}</b> — 可考慮把這些字母底下的字根拆到用得少的字母。`
        : '　目前分佈算平均。');

  /* 重碼發生在哪個碼長？—— 這是決定「要不要加識別碼」的關鍵診斷。
     短碼撞得多，就表示取的碼太少，資訊被丟掉了。 */
  const lenStat = {};
  for (const [ch, r] of entries) {
    const n = finalOf(r).length;
    lenStat[n] = lenStat[n] || { total: 0, dup: 0 };
    lenStat[n].total++;
    if (byCode.get(finalOf(r)).length > 1) lenStat[n].dup++;
  }
  /* 同一批字，官方倉頡的重碼率 —— 拿來當標準 */
  let cjRate = null;
  if (cangjie) {
    const cjBy = new Map();
    let n = 0;
    for (const [ch] of entries) {
      const code = cangjie[ch];
      if (!code) continue;
      n++;
      if (!cjBy.has(code)) cjBy.set(code, 0);
      cjBy.set(code, cjBy.get(code) + 1);
    }
    const dupN = [...cjBy.values()].filter(v => v > 1).reduce((a, b) => a + b, 0);
    if (n) cjRate = { n, pct: dupN / n * 100 };
  }

  $('#bylen').innerHTML =
    '<table><thead><tr><th>碼長</th><th>字數</th><th>其中重碼</th><th>該碼長的重碼率</th></tr></thead><tbody>' +
    Object.keys(lenStat).sort().map(n => {
      const v = lenStat[n];
      const pct = v.total ? (v.dup / v.total * 100) : 0;
      return `<tr><td>${n} 碼</td><td>${v.total}</td><td>${v.dup}</td>` +
        `<td${pct > 15 ? ' style="color:var(--bad);font-weight:600"' : ''}>${pct.toFixed(0)}%</td></tr>`;
    }).join('') + '</tbody></table>' +
    (cjRate ? `<div class="sub" style="margin-top:8px">同一批 ${cjRate.n} 字，` +
      `<b>官方倉頡的重碼率是 ${cjRate.pct.toFixed(1)}%</b>。` +
      '短碼的重碼率若明顯偏高，代表取的碼太少 —— 那是「加末筆識別碼」或「少合多分」能解決的問題。</div>' : '');

  /* 重碼 */
  $('#dupsub').innerHTML = entries.length
    ? `同一組碼對應多於一個字，打字時就要再選一次。以<b>實際要按的碼</b>（縮短後）計算。
       目前 <b>${dups.length}</b> 組重碼、涉及 <b>${dupChars}</b> 個字。
       依最常用的成員排序 —— 排在前面的最值得處理。` +
      `<br>把兼容碼（${cut} 個自動兼容的完整碼${altN ? ` ＋ ${altN} 個手動收的` : ''}）` +
      `一起算進碼空間，重碼字是 <b>${dupAll}</b> 個` +
      `（${(dupAll / entries.length * 100).toFixed(1)}%，只算主碼是 ${(dupChars / entries.length * 100).toFixed(1)}%）` +
      ` —— 這就是「打得出來的路多一條」的代價。`
    : '還沒有取碼資料。';
  const box = $('#dups');
  if (!dups.length) {
    box.innerHTML = entries.length
      ? '<div class="empty" style="color:var(--ok);font-style:normal">目前沒有重碼。</div>'
      : '<div class="empty">—</div>';
    return;
  }
  box.innerHTML = `<table><thead><tr><th>碼</th><th>字</th><th>字數</th><th>常用度</th></tr></thead>
    <tbody>${dups.map(d => {
      const common = d.best < 800;
      return `<tr>
        <td class="code">${d.code}</td>
        <td class="chars">${d.chars.map(c =>
          `<a href="/annotate?c=${encodeURIComponent(c)}" style="color:inherit">${c}</a>`).join('')}</td>
        <td>${d.chars.length}</td>
        <td><span class="pill${common ? ' bad' : ''}">${
          common ? `常用字（第 ${d.best + 1} 名）` : `第 ${d.best + 1} 名`}</span></td>
      </tr>`;
    }).join('')}</tbody></table>`;
}

/* ---------- 特例 ----------
   「特例」＝這個字沒有照原則走，而你明確說了「就這樣」。分兩種：
     1. 約定特例（notComponent）—— 整個字的拆法是約定的，別的字不要跟它學
        （例：「二」單獨成字是 I I，但當偏旁時兩橫只取一個 I）
     2. 忽略的警告（overrides）—— 某條原則在這個字身上被你按掉了
   兩者都會讓「這套規則能不能自動推出全部的碼」打折，所以要看得見它們在長。 */
const RULE_NAME = {                         /* overrides 的 key 前綴 → 原則 */
  order: '筆順原則', letter: '字根比對', tier: '優次等原則',
  merge: '能合不分原則', lone: '孤筆略過原則', skip: '孤筆略過原則',
  skiplast: '孤筆略過原則', comp: '偏旁一致性', new: '新字根', absorb: '併入既有字根',
};
const RULE_WHY = {
  '筆順原則': '取碼順序沒照筆順',
  '字根比對': '這一碼配不上字根表裡的字根',
  '優次等原則': '有更「優等」的字根可用卻沒用',
  '能合不分原則': '兩碼合起來剛好是一個既有字根，卻分開取了',
  '孤筆略過原則': '孤立的一橫／一豎照理要略過（或最後一筆該取）',
  '偏旁一致性': '同偏旁的字，拆法跟這個字不一致',
  '新字根': '這一碼是字根表裡沒有的新形',
  '併入既有字根': '這一碼被併進了既有字根',
};
const link = ch => `<a href="/annotate?c=${encodeURIComponent(ch)}">${ch}</a>`;

/* 依原則歸類（同一個字在同一條原則下只算一次）。
   每個字順便記下它在這條原則底下的 key，複審面板要靠它直接跳到那條警告。 */
function groupByRule(entries, field) {
  const m = new Map();
  for (const [ch, r] of entries) {
    const byRule = new Map();
    for (const k of r[field] || []) {
      const rule = RULE_NAME[k.split(':')[0]] || k.split(':')[0];
      if (!byRule.has(rule)) byRule.set(rule, []);
      byRule.get(rule).push(k);
    }
    for (const [rule, keys] of byRule) {
      if (!m.has(rule)) m.set(rule, []);
      m.get(rule).push({ ch, keys });
    }
  }
  return [...m.entries()].sort((a, b) => b[1].length - a[1].length);
}
const has = (r, f) => !!(r[f] && r[f].length);

let QUEUES = [];                    /* 每次重畫都重建：複審面板要拿的字＋警告 key */

function renderExceptions(entries) {
  QUEUES = [];
  const conv = entries.filter(([, r]) => r.notComponent).map(([ch]) => ch);
  const notes = entries.filter(([, r]) => r.note).map(([ch, r]) => [ch, r.note]);
  const agreed = groupByRule(entries, 'conventional'); /* 約定這樣拆，明知破例也照做 */
  const ignored = groupByRule(entries, 'overrides');   /* 這個字真的破例 */
  const disputed = groupByRule(entries, 'compliant');  /* 其實沒破例，是檢查看錯了 */

  const noComp = entries.filter(([, r]) => has(r, 'excludeComp'));   /* 認錯部件 */

  const exChars = new Set([...conv,
    ...entries.filter(([, r]) => has(r, 'overrides') || has(r, 'conventional')).map(([ch]) => ch)]);
  const dpChars = new Set(entries.filter(([, r]) => has(r, 'compliant') || has(r, 'excludeComp'))
    .map(([ch]) => ch));
  const pct = n => entries.length ? (n / entries.length * 100).toFixed(1) : '0.0';

  /* items = [{ch, keys}]（可複審）或 ['字',…]（純列表，例如約定特例整字）。
     可複審的群組給一個「逐字複審」按鈕：在這裡直接翻，不必來回跳頁。 */
  const grp = (title, hint, items, cls = '', field = null) => {
    if (!items.length) return '';
    const revable = typeof items[0] === 'object';
    const chars = revable ? items.map(x => x.ch) : items;
    const id = revable ? QUEUES.push({ title, items, field }) - 1 : -1;
    return `<div class="exgrp${cls}">
      <div class="hd"><b>${title}　${chars.length} 字</b>　${hint}
        ${revable ? `<button class="revbtn" data-q="${id}">逐字複審 →</button>` : ''}</div>
      <div class="exchars">${chars.map((c, i) =>
        revable ? `<a href="#" data-q="${id}" data-i="${i}">${c}</a>` : link(c)).join('')}</div>
    </div>`;
  };

  if (!entries.length) { $('#exceptions').innerHTML = '<div class="empty">還沒有取碼資料。</div>'; return 0; }
  if (!exChars.size && !dpChars.size) {
    $('#exceptions').innerHTML =
      '<div class="empty" style="color:var(--ok);font-style:normal">目前沒有任何特例，全部的字都照原則走。</div>';
    return 0;
  }

  /* 「確認遵守原則」不是特例 —— 那是檢查誤判的紀錄：原則沒問題、拆法也沒問題，
     是系統看錯了。同一條檢查一直誤判，該修的是檢查邏輯，不是那些字。 */
  $('#exceptions').innerHTML =
    `<div class="sub" style="margin:-4px 0 10px">
       <b>${exChars.size}</b> 字是特例（${pct(exChars.size)}%）；
       另有 <b>${dpChars.size}</b> 字你已<b>確認遵守原則</b>（${pct(dpChars.size)}%）—— 那是系統誤判，不算特例。</div>` +

    (disputed.length || noComp.length
      ? `<div class="exhead bad">系統誤判 —— 這些字其實沒破例，是檢查看錯了；該修的是我們的邏輯</div>` +
        disputed.map(([rule, chars]) => grp(`「${rule}」誤判`,
          `${chars.length} 個字其實沒違反這條原則，是檢查看錯了。數字愈大，愈該回頭修這條檢查。`,
          chars, ' bad', 'compliant')).join('') +
        (noComp.length ? `<div class="exgrp bad">
            <div class="hd"><b>認錯部件　${noComp.length} 字</b>
              檢查把某幾筆當成某個部件，其實只是形狀像（例：「碼」的前兩筆像「厂」，那其實是「石」的頭）。</div>
            ${noComp.map(([ch, r]) =>
              `<div class="exchars" style="display:flex;align-items:center;gap:4px;margin-top:2px">
                 ${link(ch)}<span style="font-size:12px;color:var(--muted)">裡沒有 ${r.excludeComp.join('、')}</span>
               </div>`).join('')}
          </div>` : '')
      : '') +

    `<div class="exhead">真正的特例 —— 這些字確實不照原則走</div>` +
    grp('約定特例', '整個字的拆法是約定的（多半是簡單的獨體字），其他字不會拿它當偏旁的範本。', conv) +
    agreed.map(([rule, chars]) => grp(`約定違反「${rule}」`,
      `這些字明知違反這條原則，仍照約定這樣拆（例：「上」的前兩筆本該合成一個 T，但獨體字就取 J I）。`,
      chars, '', 'conventional')).join('') +
    ignored.map(([rule, chars]) => grp(`忽略「${rule}」`,
      RULE_WHY[rule] ? `原則說：${RULE_WHY[rule]}；這些字你選擇不理。` : '',
      chars, '', 'overrides')).join('') +

    (notes.length ? `<div class="exgrp">
        <div class="hd"><b>有備註　${notes.length} 字</b>　你自己寫下的說明。</div>
        ${notes.map(([ch, n]) =>
          `<div class="exchars" style="display:flex;align-items:center;gap:4px;margin-top:2px">
             ${link(ch)}
             <span style="font-size:12px;color:var(--muted)">${n.replace(/</g, '&lt;')}</span></div>`).join('')}
      </div>` : '');
  return exChars.size;
}

/* ---------- 逐字複審 ----------
   本來要複審一組（例：84 個「忽略能合不分」）得一個一個點進取碼頁、再退回來、
   再捲到原位找下一個。現在把取碼頁嵌成 iframe，在這裡直接翻：
   ←／→ 換字，字串上還會標出哪些已經處理掉了。
   （不在這頁重寫檢查邏輯 —— 那一定會跟取碼頁走鐘。） */
let rev = null;      /* {title, items:[{ch,keys}], i} */

function openReview(qi, i = 0) {
  const q = QUEUES[qi];
  if (!q) return;
  rev = { ...q, i };
  $('#rev').classList.remove('hide');
  renderReview();
}
function closeReview() {
  rev = null;
  $('#rev').classList.add('hide');
  $('#revFrame').src = 'about:blank';
  load();                       /* 面板裡改過的東西，回來要看得到 */
}
function moveReview(d) {
  if (!rev) return;
  rev.i = (rev.i + d + rev.items.length) % rev.items.length;
  renderReview();
}
/* 這個字還留在這一組裡嗎？只看它原本那一格：改判成別的下場（忽略→約定特例）、
   或改了拆法讓警告消失，對這一組來說都算處理完了。 */
const stillOpen = it => {
  const arr = new Set(((codes[it.ch] || {})[rev.field] || []));
  return it.keys.some(k => arr.has(k));
};

/* 字串（strip）要能單獨重畫：面板裡存檔之後只更新「已處理」的標記，
   絕不能順手重設 iframe 的網址 —— 那會把使用者正在改的東西沖掉。 */
function renderStrip() {
  if (!rev) return;
  const left = rev.items.filter(stillOpen).length;
  $('#revTitle').textContent = rev.title;
  $('#revCount').textContent =
    `第 ${rev.i + 1} / ${rev.items.length} 個　（還有 ${left} 個沒處理）`;
  const strip = $('#revStrip');
  strip.innerHTML = '';
  rev.items.forEach((x, i) => {
    const open = stillOpen(x);
    const s = el('span', (i === rev.i ? 'on ' : '') + (open ? '' : 'done'), x.ch);
    s.title = open ? '' : '已處理';
    s.onclick = () => { rev.i = i; renderReview(); };
    strip.append(s);
  });
  strip.querySelector('.on')?.scrollIntoView({ block: 'nearest' });
}
function renderReview() {
  if (!rev) return;
  renderStrip();
  const it = rev.items[rev.i];
  $('#revFrame').src = `/annotate?embed=1&c=${encodeURIComponent(it.ch)}` +
    `&focus=${encodeURIComponent(it.keys[0])}`;
}

$('#revPrev').onclick = () => moveReview(-1);
$('#revNext').onclick = () => moveReview(1);
$('#revClose').onclick = closeReview;
$('#rev').onclick = e => { if (e.target.id === 'rev') closeReview(); };
document.addEventListener('keydown', e => {
  if (!rev) return;
  if (e.key === 'Escape') closeReview();
  /* iframe 有焦點時鍵盤事件不會傳到這裡，所以還是留著上一個／下一個按鈕 */
  else if (e.key === 'ArrowLeft') moveReview(-1);
  else if (e.key === 'ArrowRight') moveReview(1);
});
$('#exceptions').addEventListener('click', e => {
  const b = e.target.closest('.revbtn');
  if (b) return openReview(+b.dataset.q, 0);
  const a = e.target.closest('a[data-q]');
  if (a) { e.preventDefault(); openReview(+a.dataset.q, +a.dataset.i); }
});

for (const [btn, key] of [['#cjFreq', 'all'], ['#cjFirst', 'first']]) {
  $(btn).onclick = () => {
    cmpOn[key] = !cmpOn[key];
    $(btn).classList.toggle('on', cmpOn[key]);
    drawCharts();
  };
}

for (const [btn, tbl, chart, axis] of [
  ['#tabFreq', '#tableAll', '#chartAll', '#axisAll'],
  ['#tabFirst', '#tableFirst', '#chartFirst', '#axisFirst'],
]) {
  $(btn).onclick = () => {
    const on = $(tbl).classList.toggle('hide');
    $(btn).classList.toggle('on', !on);
    $(chart).classList.toggle('hide', !on);
    $(axis).classList.toggle('hide', !on);
  };
}

let stamp = null;
const fetchStamp = () => fetch('/api/state').then(r => r.json());
async function load() {
  [codes, zigen, rules, cangjie] = await Promise.all([
    fetch('/api/codes').then(r => r.json()),
    fetch('/api/zigen').then(r => r.json()),
    fetch('/api/rules').then(r => r.json()),
    fetch('/api/cangjie').then(r => r.json()).catch(() => null),
  ]);
  render();
  renderStrip();      /* 複審面板開著的話：更新「已處理」標記，但不動 iframe */
  $('#meta').textContent = '隨字根表／碼表自動更新';
}
fetch('/api/freq').then(r => r.json()).then(f => {
  f.order.forEach((c, i) => rank.set(c, i));
  return load();
}).then(() => fetchStamp()).then(s => { stamp = JSON.stringify(s); });

setInterval(async () => {
  const s = JSON.stringify(await fetchStamp());
  if (s !== stamp) { stamp = s; load(); }
}, 3000);
</script>
</body>
</html>
